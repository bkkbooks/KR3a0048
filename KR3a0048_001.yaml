body:
  text: 戒子通録卷一宋劉清之撰列女𫝊胎教古者婦人姙子寢不側坐不邊立不蹕不食邪味割不正不食席不正不坐目不視於邪色耳不聽於淫聲夜則令瞽誦詩道正事如此則生子形容端正才徳過人矣太王之子曰王季王季成童靡有過失娶太任太任之性端一誠莊惟徳之行不視惡色不聽淫聲不出敖言能以胎教生文王而明聖太任教之以一而識百卒為周宗禮記内則名子辭子生父咳而名之父曰欽有帥母對曰記有成子生三日始負之異為孺子室於宫中必求寛裕慈惠温良敬恭謹而寡言者使為子師其次為慈母其次為保母皆居子室他人無事不徃三月之末擇日剪髪為鬌男角女羈否則男左女右是日也妻以子見於父姆先相曰母某敢用時日祇見孺子夫對曰欽有帥父執子之右手咳而名之妻對曰記有成子師辯告諸婦諸母名夫告宰名宰辯告諸男名書曰某年某月某日某生而藏之儀禮冠辭士冠三加辭醴辭三醮辭字辭冠始加祝曰令月吉日始加元服棄爾幼志順爾成徳夀考維祺介爾景福再加曰吉月令辰乃申爾服敬爾威儀淑慎爾徳眉夀萬年永受胡福三加曰以歲之正以月之令咸加爾服兄弟具在以成厥徳黄耇無疆受天之慶醴辭曰甘醴惟厚嘉薦令芳拜受祭之以定爾祥承天之休夀考不忘醮辭曰㫖酒既清嘉薦亶時始加元服兄弟具來孝友時格永乃保之再醮曰㫖酒既湑嘉薦伊脯乃申爾服禮儀有序祭此嘉爵承天之祜三醮曰㫖酒令芳籩豆有楚咸加爾服肴升折俎承天之慶受福無疆字辭曰禮儀既備令月吉日昭告爾字爰字孔嘉髦士攸宜宜之於假永受保之曰伯某甫仲叔季唯其所當婚辭士昬父醮子命之父送女命之母命之庶母以父母之命命也昬父醮子命之往迎爾相承我宗事朂帥以敬先妣之嗣若則有常子曰諾唯恐弗堪不敢忘命父送女命之曰戒之敬之夙夜毋違命母施衿結帨曰勉之敬之夙夜毋違宫事庶母及門内施鞶申之以父母之命命之曰敬恭聽宗爾父母之言夙夜無愆視諸衿鞶戒書周武王姬發踐阼三日召師尚父問焉有萬世可以為子孫常者乎尚父對并王為戒書師尚父道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者㐫王聞書之言恐懼退而為戒焉為席前左端之銘曰安樂必敬前右端之銘曰無行可悔鑑之銘曰見爾前慮爾後盤之銘曰與其溺於人寧溺於淵溺於淵猶可游也溺於人不可救也楹之銘曰毋曰胡殘其禍將然毋曰胡害其禍將大毋曰胡傷其禍將長劒之銘曰帯之以為服動必行徳行徳則興倍徳則崩矛之銘曰造矛造矛少間弗忍終身之羞予一人所聞以戒後世子孫漢孝武景帝子徹子閎為齊王旦為燕王胥為廣陵王同日立皆賜策各以國土風俗白戒焉凡三章嗚呼小子閎受兹青社朕承天序案朕承天序史記作朕承祖考惟稽古建爾國家封於東土世為漢藩輔嗚呼念哉共朕之詔惟命不于常人之好徳克明顯光義之不圖俾君子怠悉爾心允執其中天禄永終厥有愆不臧廼㐫於而國害於爾躬嗚呼保國乂民可不敬與王其戒之嗚呼小子旦受兹元社建爾國家封於北土世為漢藩輔嗚呼薰鬻氏虐老獸心加以姦巧邊甿朕命將率徂征厥罪北州以綏悉爾心毋作怨毋作棐徳毋廼廢備非教士不得從徵王其戒之嗚呼小子胥受兹赤社建爾國家封於南土世為漢藩輔古人有言曰大江之南五湖之間其人輕心揚州保疆三代要服不及以政嗚呼悉爾心祇祇兢兢廼惠廼順毋侗好逸毋邇宵人惟法惟則書云臣不作福不作威靡有後羞王其戒之梁簡文帝蕭綱戒子當陽公大心汝年時尚幼所闕者學可久可大其唯學歟所以孔丘言吾嘗終日不食終夜不寢以思無益不如學也若使墻面而立沐猴而冠吾所不取立身之道與文章異立身先須謹重文章亦勿放蕩周公周文王子姬旦旦子伯禽封於魯將之國故戒之也又一章荀卿子又一章劉向君子不施其親不使大臣怨乎不以故舊無大故則不棄也無求備於一人又云君子力如牛不與牛爭力走如馬不與馬爭走智如士不與士爭智又云徳行廣大而守以恭者榮土地博裕而守以險者安禄位尊盛而守以卑者貴人衆兵强而守以畏者勝聰明睿智而守以愚者益博文多記而守以淺者廣去矣其毋以魯國驕士矣文儆𫝊周書案維文王以下係節録文儆篇中語九年在鄗以下係節録文𫝊篇中語維文王告薨懼後嗣之無保庚辰詔太子發曰汝敬之哉民物多變民何嚮非利利維生痛痛維生樂樂維生禮禮維生義義維生仁嗚呼敬之哉民之適敗上察下遂信何嚮非私私維生抗抗維生奪奪維生亂亂維生亡亡維生死嗚呼敬之哉九年在鄗召太子發曰嗚呼吾語汝所保所守守之哉厚徳廣惠忠信愛人君子之行不為驕侈不為靡泰山林非時不升斤斧川澤非時不入網罟不麛不卵孤寡辛苦咸賴生焉無殺夭胎無伐不成材無墮四時如此者有十年之積有十年之積者王無一年之積者亡書顧命周成王周成王姬誦作顧命保元子釗嗚呼疾大漸惟幾病日臻既彌留恐不獲誓言嗣兹予審訓命汝昔君文王武王宣重光奠麗陳教則肄肄不違用克達殷集大命在後之侗敬迓天威嗣守文武大訓無敢昬逾今天降疾殆弗興弗悟爾尚明時朕言用敬保元子釗𢎞濟于艱難柔遠能邇安勸小大庶邦思夫人自亂于威儀爾無以釗冐貢于非幾葉公葉公子髙楚縣公將死命其子毋以小謀敗大作毋以嬖御人疾莊后毋以嬖御士疾莊士大夫卿士魏武帝曹操告子丕等者案此條與下魏收李勣並録之不以人廢言也吾在軍中執法是也至小忿怒大過失不當效戒子言魏文帝曹丕戒子又使弟植守鄴戒之父母於子曰雖肝腸腐爛為其掩蔽不欲使鄉黨士友聞其罪過然行之不改久久自知之用此仕官不亦難乎又曰吾昔為頓邱令年二十三思此時所行無悔於今今汝年二十三矣可不勉與蕭薿南齊髙帝子豫章文獻王戒子子廉子恪等凡富貴少不驕奢以約失之者鮮矣漢世以來侯王子弟以驕恣之故大者滅身喪族小者削奪邑地可不戒哉吾之後當共相勉勵篤睦為先才有優劣位有通塞運有富貧此自然之理無以相凌侮勤學行守基業修閨庭尚閒素如此足無憂患戒子言光武秀字文叔毎旦視朝日昃乃罷夜分乃寐皇太子見帝勤勞不怠承間諫曰陛下有禹湯之明而失黄老養性之福願頤愛精神優游自寧帝曰我自樂此不為疲也敕後主辭蜀漢先主備字元徳涿郡人子後主禪字公嗣凡一章朕初疾但下痢耳後轉雜他病殆不自濟人五十不稱夭年已六十有餘何所復恨不復自傷但以卿兄弟為念射君到說丞相歎卿智量甚大增修過於所望審能如此吾復何憂勉之勉之勿以惡小而為之勿以善小而不為惟賢惟徳能服於人汝父徳薄勿效之可讀禮記漢書閒暇歴觀諸子益人意智又曰汝與丞相從事事之如父帝範唐太宗隴西人諱世民為書十二篇戒子髙宗治案帝範十二篇其首尾兩條則節録前後序也蓋聞大徳曰生大寳曰位樹之君上所以撫育黎元自非明哲武文安可叨臨神器先皇當經綸之㑹實定王業逮余以弱冠之年思靜大難躬擐甲胄親當矢石剪長鯨而清四海掃欃槍而廓八紘既而承慶案原本作乘慶天潢濫登案原本作登暉璇極戰戰兢兢若臨深而御朽日慎一日思善始而令終汝以幼年偏鍾慈愛義方多闕庭訓有乖不知稼穯之艱難未辨君臣之禮節廢寢忘食思此為憂披鏡前蹤博採史籍聚其要言以為近誡如山嶽髙峻而不動如日月貞明而普照寛大其志足以併包平正其心足以制斷奉先思孝處下思恭傾己勤勞以行徳義此為君之體也君體夫六合曠道大寶重任遠近相持親疎並用則并兼路塞逆節不生是以封建親戚以為藩衞封之太彊則有噬臍之患致之太弱則無固本之理莫若衆建宗親而少其力使輕重相鎮憂樂是同盛衰一心安危同力建親夫國之匡輔必恃忠良任使得人天下自治是以明君博訪英賢搜揚側陋求之則勞任之斯逸此以求賢為貴也求賢夫良匠無棄材明君無棄士人才有長短能有巨細君擇才而授官臣量己而受職則委任責成不勞而治此設官不可不審也審官夫王者髙居深視虧聽阻明恐有過而不聞懼有闕而莫補虚心思獻替之謀傾耳佇忠正之說昬主則不然說者拒之以威勸者窮之以罪大臣惜禄而莫諫小臣畏誅而不言其為壅塞無以自知此拒諫之惡也納諫夫讒佞之徒國之蟊賊也惡忠賢之在己上恐富貴之不我先先意承㫖以悅於君巧言令色以親於上今人顔貌同於目際猶不自瞻是非在於無形焉能自覩况逆耳之辭難受順心之說易從故明主納諫病就苦而能消暗主從䛕命因甘而致殞可不戒哉去讒夫君者儉以養性靜以修身儉則民不勞靜則下不擾不竭民力不匱民財亂世之君極其驕奢恣其嗜慾人神憤怨上下乖離佚樂未終傾危已至此驕奢之忌也戒盈夫奢儉由人安危在己斯二者榮辱之端五關近閉則令徳遠盈千慾内攻則㐫源外發故驕出於志不節則志傾慾生於身不遏則身喪故桀紂肆情而禍結堯舜約己而福延可不務乎崇儉顯罰以威之明賞以化之威立則惡者懼化行則善者勸故賞者不徳君功之所致也罰者不怨上罪之所當也故云無偏無黨王道蕩蕩此賞罰之權也賞罰夫食為民天農為政本國無九歲之儲不足備水旱家無一年之服不足禦寒暑故上不節心則下多逸志莫若約己正身則民不言而化矣務農夫土地雖廣好戰則人彫邦境雖安忘戰則民殆是以勾踐軾蛙卒成霸業徐偃棄武終於喪邦何則越習其威徐忘其備也閱武夫宏風導俗莫尚於文敷教訓民莫善於學因文以隆道假學以光身質藴吳竿非筈羽不美性懐辨慧非積學不成此崇文之術也崇文此十二條帝王之大綱安危興廢咸在兹焉古人有云非知之艱唯行不易行之可勉唯終實難是以暴亂之君非獨明於惡路聖哲之主豈獨見於善途良由大道遠而難遵邪徑近而易踐小人俯從其易不能力行其難是知禍福無門唯人所召欲悔非於既往唯慎過於將來擇哲王以師焉思以古為前鑑夫取法於上僅得為中取法於中故為其下自非上哲不可效焉吾在位以來所制多矣竒麗服翫錦繡珠玉不絶於前此非防慾也雕楹刻桷髙臺深池每興其役此非儉志也犬馬鷹鶻無遠必致此非節心也數有行幸以亟勞人此非屈己也斯數事者吾之深過勿以兹為是而取法案原本作後法焉但我濟育蒼生其益多矣平定區宇厥功大矣益多損少人不以為怨功大過微徳未以之虧然猶盡美之蹤於焉多媿盡善之道顧此懐慙况汝無纎毫之功直縁基而履慶若崇善以廣徳則業泰而身安若肆情以縱非則業傾而身喪且成遲敗速者國基也失易得難者天位也可不慎哉可不惜哉戒皇屬國朝太宗類苑太宗嘗謂皇屬曰朕即位十三年矣外絶游觀之樂内卻聲色之娛汝等生於富貴長自深宫夫帝子親王先須克己毎著一衣則憫蠶婦毎餐一食則念耕夫至於聽斷之間勿先恣其喜怒朕每親臨庶政豈敢憚於焦勞汝等勿鄙人短勿恃己長乃可永久富貴以保終吉先賢有言逆吾者是吾師順吾者是吾賊不可不察也庭聞孔子名丘字仲尼魯人子鯉字伯魚仲尼嘗獨立鯉趨而過庭聞斯二者學詩乎不學詩無以言學禮乎不學禮無以立又曰女為周南召南人而不為周南召南其猶正牆面而立也與家戒王肅字子雍魏散騎常侍家戒歐陽詢所記為詳案肅東海人夫酒所以行禮養性命為歡樂也過則為患不可不慎是故賓主百拜日飲酒而不得醉先王所以備酒禍也凡為主人飲客使有酒色而巳無使至醉若為人所强必退席長跪稱父戒以辭之敬仲辭君而况於人乎為客又不得唱造酒史也若為人所屬下坐行酒隨其多少犯令行罰示有酒而巳無使多也禍變之興常於此作所宜深慎杜恕字務伯京兆人魏黄門侍郎稱東郡張閣之為人張子臺視之似鄙樸人然其心中不知天地間何者為美何者為好敦然似與隂陽合徳者作人如此自可不富即貴禍患當何從而來嵇康字叔夜譙國人晉中散大夫人無志非人也但君子用心量其善者必擬議而後動若志之所之則口與心誓守死無二恥躬不逮期於必濟若心疲體懈或牽於外物或累於内欲不堪近患不忍小情則議於去就議於去就則二心交爭二心交爭則向所見役之情勝矣或有中道而廢或有未成而敗以之守則不固以之攻則怯弱與之誓則多違與之謀則善泄臨樂則肆情處逸則極意故雖繁華熠燿無結秀之效終年之勤無一旦之功斯君子所以歎息也所居長吏但宜敬之而已矣不當極密不宜數徃徃當有時其有衆人又不當獨在後又不當前所以然者長吏喜問外事或時發舉則恐為人所說無以自免也宏行寡言慎備自守則怨責之路解矣其立身自當清逺若有煩辱欲人之盡命託人之請求謙言辭謝某素不預此輩事當相安亮耳若有怨急心所不忍可外違拒密為濟之所以然者上遠宜適之幾中絶常人淫輩之求下全束脩無誨之文案本集作下全束脩無玷之稱稱此又秉志之一隅也戒子言仲孫貜孟釐子魯卿且死誡其嗣懿子仲孫何忌吾聞聖人之後雖不當世必有達者今孔丘年少好禮其達者歟吾即沒若必師之孫叔敖楚相將死戒其子叔敖死王以美地封其子子辭請寢邱累世不失王數封我矣吾不受也我死王則封汝必無受利地楚越之間有寢邱者此其地不利而名惡可長有者唯此也歐陽地餘千乘人漢元帝少府將死戒子尚案地餘係歐陽生字正思之孫世受書我死官屬即送汝財物慎毋受汝九卿儒者子孫以廉潔著可以自成嚴光或云嚴君平姑存之不案光字子陵餘姚人光武時除諫議大夫屈耕於富春山君平名遵臨卭人以卜易隠於成都市十誡嗜欲者潰腹之患也貨利者喪身之仇也嫉妬者㐫軀之害也讒慝者斷脛之兵也謗毁者雷霆之報也殘酷者絶世之殃也陷害者滅嗣之場也博戲者殫家之漸也嗜酒者窮餒之始也案第十誡原註缺文樊宏字靡卿南陽人後漢夀張侯為人謙柔畏謹不求茍進常戒其子富貴盈溢未有能終者吾非不喜榮勢也天道惡滿而好謙前世貴戚皆明戒也保身全己豈不樂哉辛憲英辛毗女羊耽妻子琇為鍾會參軍伐蜀英憂之案此條宜入後母訓内行矣戒之古之君子入則致孝於親出則致節於國在職思其所司在義思其所立不遺父母憂患而已軍旅之間可以濟者其惟仁恕乎汝其謹之源賀後魏太尉遺令勅諸子案賀西平人吾頃以老患辭事不悟天慈降恩爵逮於汝汝其毋傲恡毋荒怠毋奢越毋嫉妬疑思問言思審行思恭服思度遏惡揚善親賢遠佞目觀必貞耳屬必正誠勤以事上清約以臨己吾終之後所葬時服單櫝足申孝心芻靈明器一無用也宋隠字處黙西河人魏道武時領吏部選臨終謂其子汝等茍能入順父兄出悌鄉黨仕郡幸而至功曹史以忠清奉上足以不勞遠詣臺閣也向朗字巨達襄陽人蜀左將軍耀案襄陽記此係遺言戒子蜀志朗子條景中為御史中丞天地和則萬物生君臣和則國家平九族和則動得所求靜得所安是以聖人守和以存以亡也吾楚國之小子耳而早喪所天為二兄所誘養使其性行不隨禄利以墮今但貧耳貧非人患惟和為貴汝其勉之曹袞魏武子中山恭王其世子孚嗣汝幼少未聞義方早為人君但知樂不知苦不知苦必將以驕奢為失也接大臣務以禮雖非大臣者猶宜答拜事兄以敬恤弟以慈兄弟有不足之行當造膝諫之諫之不從流涕喻之喻之不改乃白其母若猶不改當以奏聞并辭國土與其守寵罹禍不若貧賤全身也此亦謂大罪惡耳其微過細故當掩之士會字季晉大夫食邑於隨曰隨武子後更受范曰范武子將老召其子士燮戒之燮乎吾聞之喜怒以類者鮮易者實多詩曰君子如怒亂庶遄沮君子如祉亂庶遄已君子之喜怒以己亂也弗己者必益之郤子其或者欲己亂於齊乎不然余懼其益之也爾從二三子惟敬髙漢筠後晉客省使在常山戒子意葬常山從其欲也案漢筠字時英齊州歴山人見薛居正五代史吾遊歴多矣觀風俗淳厚以經術相尚罕得如此地者教子訓孫可為終焉之計負國鑿荒以為田種樹以成圃凡議婚嫁必接士人荀朂字公曾頴隂人晉尚書令或勸有所營置令有歸戴者朂語諸子人臣不密則失身樹私則背公是大戒也汝等亦當宦達人間宜識吾此意戒子言阮籍字嗣宗陳留人晉步兵校尉與兄子咸字仲容皆任達不拘子渾少慕通達不飾小節籍謂曰仲容已豫吾此流汝不得復爾崔冏字法俊清河人北齊鴻臚卿臨終戒其二子夫恭儉福之輿傲侈禍之機乘福輿者浸以康休蹈禍機者忽而傾覆汝其戒歟牛宏隋光禄大夫觚案宏字顯仁鶉人汝等子孫宜以誠敬自立傅奕相州人唐太史令臨終戒其子周孔六經是為名教汝宜習之妖人亂華舉時皆惑唯獨竊歎衆不我從悲夫汝等勿學也房喬字元齡齊州人唐宰相集古今聖賢家戒書於屏風令諸子各取其一因戒之不可以地望陵人驕奢沈溺袁家累葉忠節是吾所尚汝宜師遵閻立本京兆人唐武后右相立本雖有應務之才尤善圖畫太宗嘗與侍臣學士泛舟春苑池中有異鳥隨波容與詔坐者為詠令立本寫焉不勝愧赧退戒其子案立本新舊唐書皆不載其字兄讓字立徳以字行則立本當亦以字行也吾少好讀書幸免牆面縁情染翰頗及儕輩唯以丹青見知躬厮役之務辱莫大焉汝宜深戒勿習此末技穆寧懐州人唐祕書通達體命未嘗服藥每戒諸子案新唐書穆寧撰家令訓子人一通吾聞君子之事親養志為大直道而已慎無為諂吾之志也張霸字伯饒成都人後漢侍中人生一世但當畏敬於人若不善加己直為受之誨子弟言朱仁軌字徳容唐逸人門人諡曰孝友先生敬則其弟也終身讓路不枉百步終身讓畔不失一段戒子孫言王祥字休徴琅邪人晉三公疾篤遺令訓子孫夫言行可覆信之至也推美引惡徳之至也揚名顯親孝之至也兄弟怡怡宗族欣欣悌之至也臨財莫過乎讓此五者立身之本李襲譽字茂實隴西人唐涼州都督吾近京有賜田十頃耕之可以充食河内有賜桑千樹蠶之可以充衣江東所寫之書讀之可以立身吾没之後爾曹但能勤此三事亦何羡於人姚崇字元之陜州人唐宰相遺令戒子孫古人云富貴者人之怨也貴則神忌其滿人惡其上富則鬼瞰其室虜利其財自開闢已來書籍所載徳薄任重而能夀考無咎者未之有也故范蠡疏廣之輩知止足之分前史多之况吾才不逮古人而久竊榮寵位逾髙而益懼恩彌厚而增憂徃在中書遘疾虚憊雖終匪懈而諸務多闕薦賢自代屢有誠祈人欲天從竟蒙哀允優游園沼放浪形骸人生一代斯亦足矣田巴云百年之期未有能至王逸少云俛仰之間已為陳迹誠哉此言比日見諸達官身亡已後子孫既失覆䕃多至貧寒斗尺之間參商是競豈惟自玷乃更辱先無論曲直俱受嗤毁莊田水碾既衆有之遞相推倚或致荒廢陸賈石苞皆古之賢達也至預為定分以絶後爭吾靜思之深所歎息昔孔子大聖母墓毁而不修梁鴻至賢父亡席卷而葬楊震趙咨盧植張奐皆當代英達通識今古咸有遺言屬以薄葬或濯衣時服或單帛幅巾子孫皆遵成命迄今以為美談凡厚葬之家例非明哲或溺於流俗不察幽明咸以奢厚為忠孝以儉薄為慳惜至令亡者致戮尸暴骸之酷存者陷不忠不孝之誚可為痛哉可為痛哉且五帝之時父不葬子兄不哭弟言其致仁夀無天横也三王之代國祚延長人用休息其人臣則彭祖老聃之類皆享遐齡當此之時未有佛教豈抄經鑄像之力設齋施物之功耶宋書西域𫝊著名僧為白黑論理澄明白足解沈疑宜觀而行之且死者是常古來不免所造經像何所施為夫釋迦之本法為蒼生之大弊汝等各宜警策勿效兒女子曹終身不悟也吾亡後必不得輙用餘財為無益之佛事亦不得妄出私物徇追福之虚談道士者本以元牝為宗初無趨競之教而無識者慕僧家之有利約佛教而為業欲尋老君之說亦興道齋之文又用僧例失之彌遠汝等勿拘鄙俗輙屈於家汝等身沒之後亦教子孫依吾此法
