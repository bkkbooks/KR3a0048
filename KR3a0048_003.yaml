body:
  text: 戒子通録卷三宋劉清之撰幼訓王褒臨沂人周小司空著幼訓以戒諸子其一章云按褒字子深周武帝保定中除內史中大夫陶士行曰昔大禹不吝尺璧而重寸隂文士何不誦書武士何不馬射若乃元冬修夜朱眀長日肅其居處崇其墻仭門無糅雜坐闕號呶以之求學則仲尼之門人也以之為文則賈生之升堂也古者盤盂有銘几杖有戒進退修焉俯仰觀焉立身行道終始若一造次必於是君子之言歟吾自幼學不墜斯業汝能修之吾之志也曽子告子言參字子輿魯人疾病告曽元曽華凡三章微乎吾無夫顔氏之言吾何以語汝哉然而君子之務盡有之矣夫華繁而實寡者天也言多而行寡者人也鷹隼以山為卑而曽巢其上魚鱉黿鼉以淵為淺而蹶穴其中卒其所以得之者餌也是故君子茍無以利害義則辱何由至哉親戚不恱不敢外交近者不親不敢求逺小者不審不敢言大故人之生也百嵗之中有疾病焉有老幼焉故君子思其不復者而先施焉親戚既殆雖欲孝誰為孝年既耆艾雖欲弟誰為弟故孝有不及弟有不時其此之謂與官怠於宦成病加於少愈禍生於懈惰孝衰於妻子察此四者慎終如始詩曰靡不有初鮮克有終史鰌字子魚衛靈公臣且死謂其子曰靈公往弔問其故其子以父言聞靈公寤衛國以治我即死治喪於北堂吾生不能進蘧伯玉而退彌子瑕不能正君也生不能正君死不當成禮死而置尸於北堂於禮足矣司馬談談漢太史令夏陽人留滯周南發憤且卒執子遷手而泣曰豫先周室之太史也自上世嘗顯功名于虞夏典天官事後世中衰絶於豫乎女復為太史則續吾祖矣今天子接千嵗之統封泰山而豫不得從行是命也夫命也夫豫死汝必為太史為太史毋忘吾所欲論著矣且夫孝始於事親中於事君終於立身揚名於後世以顯父母此孝之大者夫天下稱誦周公言其能論歌文武之德宣周召之風達太王王季之思慮爰及公劉以尊后稷也幽厲之後王道缺禮樂衰孔子修舊起廢論詩書作春秋則學者至今則之自獲麟以來四百有餘嵗而諸侯相兼史記放絶今漢興海內一統眀主賢君忠臣義士豫為太史而不論載廢天下之文豫甚懼焉汝其念哉何曽字穎考陽夏人晉司徒嘗侍武帝宴退告其子遵曰國家應天受命創業垂統吾每侍宴未嘗聞經國逺圗唯説平生常事非詒厥孫謀之道也後嗣其殆乎此吾子孫之憂汝等猶可沒身孫輩必遇亂亡殷仲堪陳郡人晉荆州刺史性真素飯粒落席間輒拾以噉之人見我受任方州謂我豁平昔時意今吾處之不易貧者士之常焉得登枝而捐其本爾其存之謝僑字國美父元大任梁侍中僑素貧嘗一日朝無食其子啓欲以班史質錢答曰寧餓死豈可以此充食乎劉贊魏州人父玭為縣令刑按贊後唐明宗時為御史中丞部侍郎贊始就學衣以青布衫襦每食則玭自肉食而别以蔬食食贊於牀下謂之曰肉食君之祿也爾欲之則勤學問以干祿吾肉非爾之食也由是贊益力學舉進士官至中書舍人疏廣告兄子言字仲翁東漢人漢太子太傅兄子受字公子為少傅廣告之受叩頭曰從大人議吾聞知足不辱知止不殆功遂身退天之道也今仕宦至二千石官成名立如此不去懼有後悔豈如父子相隨出關以夀命終不亦善乎孔臧戒子書子順之後安國之從兄事漢孝武告子琳書按臧孔子十一代孫嗣封蓼侯為太常頃來聞汝與諸友生講肄書傳按孔叢子作講肄學傳孜孜晝夜衎衎不怠善矣人之進退唯問其志取必以漸勤則得多山霤至柔石為之穿蝎蟲至弱木為之弊夫霤非石之鑿蝎非木之鑽然而能以微脆之形陷堅剛之體豈非積漸之致乎訓曰徒學知之未可多履而行之乃足佳東方朔字曼倩平原人漢武帝臣似道家言姑存之眀者處世莫尚於中優哉遊哉與道相從首陽為拙栁惠為工飽食安步以仕代農鄭元字康成北海人漢獻帝時嘗疾篤自慮以書戒子益恩吾家舊貧不為父母羣弟所容去厮役之吏遊學周秦之都往來幽并兖豫之役獲覲乎在位通人處逸大儒得意者咸從捧手有所受焉遂博稽六藝粗覽傳記時覩祕奧年過四十乃歸供養假田播殖以娛朝夕遇閹尹擅勢坐禁黨錮十有四年而蒙赦令舉賢良方正有道辟大將軍三司府公車再召比牒併名早為宰相惟彼數公懿德大雅克堪王臣故宜式序吾自忖度無任於此但念述先聖之元意思整百家之不齊亦庶幾以竭吾才故聞命罔從而黃巾為害萍浮南北復歸邦鄊入此嵗來已七十矣宿素衰落仍有失誤案之禮典便合傳家今我告爾以老歸爾以事將間居以安性覃思以終業自非拜國君之命問族親之憂展敬墳墓觀省野物胡嘗扶杖出門乎家事大小汝一承之咨爾煢煢一夫曽無同生相依其勗求君子之道研鑽勿替敬慎威儀以近有德顯譽成於僚友德行立於己志若致聲稱亦有榮於所生可不深念邪可不深念邪吾雖無紱冕之緒頗有讓爵之髙自樂以論贊之功庶不遺後人之羞末所憤憤者徒以亡親墳壟未成所好羣書率皆腐敝不得於禮堂寫定傳與其人日西方暮其可圗乎家今差多於昔勤力務時無恤飢寒菲飲食薄衣服節夫二者尚令吾寡恨若忽忘不識亦已焉哉劉向字子政彭城人漢成帝臣汝有何德蒙恩甚厚將何以報董生有云弔者在門賀者在閭言有憂則恐懼敬事敬事則必有善功而福至也又曰賀者在門弔者在閭言受福則驕奢驕奢則禍至故弔隨而來齊頃公之始藉霸者之餘威輕侮諸侯戲跛蹇之客故被鞍之禍遁服而亡所謂賀者在門弔者在閭也兵敗師破人皆弔之恐懼自新百姓愛之晉侯皆歸其所奪邑所謂弔者在門賀者在閭也司馬徽後漢聞汝充役室如懸磬何以自辦論德則吾薄説居則吾貧勿以薄而志不壯貧而行不髙也王修字叔治北海人魏奉常戒子自汝行之後恨恨不樂何者我實老矣所恃汝等也皆不在目前意遑遑也人之居世忽去便過日月可愛也故禹不愛尺璧而愛寸隂時過不可還若年大不可少也欲汝早成未必讀書并學作人欲令見舉動之宜觀髙人逺節志在善人左右不可不慎善否之要在此際也行止與人務在謹之言思乃出行詳乃動皆用情實道理違斯敗矣父欲令子善唯不能殺身其餘無惜也王昶字文舒魏司空名兄子默字處靜沈字處道子渾字元沖深字道沖皆依謙實以見意遂書以戒之夫人為子之道莫大於寶身全行以顯父母此三者人知其善而或危身破家陷於滅亡之禍者何也由所祖習非其道也夫孝敬仁義百行之首行之乃立身之本也孝敬則宗族安之仁義則鄉黨助之此行成於內名著於外者矣人若不篤於至行而背本逐末以陷浮華焉以成朋黨焉浮華則有虛偽之纍朋黨則有彼此之患此二者之戒昭然著眀而循覆車滋衆逐末彌甚皆由感常時之譽昧目前之列故也夫富貴聲名人情所樂而君子或得而不處何也惡不由其道耳患人知進而不知退知欲而不知足故有困辱之纍悔吝之咎語曰如不知足則失所欲故知足之足常足矣覽往事之成敗察將來之吉凶未有干名要利欲而不厭而能保世持家永全福祿者也按魏志王昶傳此下尚有欲使汝曹立身行己遵儒者之教履道家之言故共十九字以元默沖虛為名欲使汝曹顧名思義不敢違越也古者盤杅有銘几杖有戒俯仰察焉用無過行况在己名可不戒之哉夫物速成則疾亡晚就則善終朝華之草夕而零落松柏之茂隆寒不衰是以大雅君子惡速成戒闕黨也若范燮對秦客而武子擊之折其委笄惡其掩人也夫人有善鮮不自伐有能寡不自矜伐則掩人矜則凌人掩人者人亦掩之凌人者人亦凌之故三郤為戮於晉王叔負罪於周不惟矜善自伐好爭之咎乎故君子不自稱非以讓人惡其蓋人也夫能屈以為伸讓以為得弱以為強鮮不遂矣夫毁譽愛惡之原而禍福之機也是以聖人慎之孔子曰吾之於人誰毁誰譽如有所譽必有所試又曰子貢方人賜也賢乎哉我則不暇以聖人之德猶尚如此况庸庸之徒而輕毁譽哉昔伏波將軍馬援戒其兄子言聞人之惡當如聞父母之名耳可得而聞口不可得而言也斯戒至矣人或毁己當退而求之於身若己有可毁之行則彼言當矣若己無可毁之行則彼言妄矣當則無怨於彼妄則無害於身又何反報焉且聞人毁己而忿者惡醜聲之加人也人報者滋甚不如默而自修己也諺曰救寒莫如重裘止謗莫如自修斯言信矣若與是非之士凶險之人近猶不可况與對校乎其害深矣夫虛偽之人言不根道行不顧言其為浮淺較可識别而世人惑焉猶不檢之以言行也近濟隂魏諷山陽曹偉皆以傾邪敗沒熒惑當世挾持姦慝驅動後生雖刑於鈇鉞大為炯戒然所汙染固以衆矣可不慎與若夫山林之士夷叔之倫甘長飢於首陽安赴火於綿山雖可以激貪礪俗然聖人不可為吾亦不願也今汝先人世有冠冕惟仁義為名守慎為稱孝悌於閨門務學於師友吾與時人從事雖出處不同然各有所取潁川郭伯益好尚通達敏而有知其為人宏曠不足輕貴有餘得其人重之如山不得其人忽之如草吾以所知親之昵之不願兒子為之北海徐偉長不治名髙不求茍得淡然自守惟道是務其有所是非則托古人以見其意當時無所褒貶吾敬之重之願兒子師之東平劉公幹博學有髙才誠節有大意然性行不均少所拘忌得失足以相補吾愛之重之不願兒子慕之樂安任昭先淳粹履道內敏外恕推遜恭讓處不避汙怯而義勇在朝忘身吾友之善之願兒子遵之若引而伸之觸類而長之汝其庶幾舉一隅耳及其用財先九族其施舍務周急其出入存故老其論議貴無貶其進仕尚忠節其取人務道實其處勢戒驕淫其貧賤慎無戚其進退念合宜其行事加九思如此而已吾復何憂哉諸葛亮家戒字孔明琅琊人蜀漢丞相戒子書與子疏凡三章君子之行靜以修身儉以養德非淡泊無以眀志非寧靜無以致逺夫學須靜也才須學也非學無以廣才非靜無以成學慆慢則不能研精險躁則不能理性年與時馳意與嵗去遂成枯落悲歎窮廬將復何及也又云每得來疏書尚粗拙豈修之不勤而量之有限耶又云夫志當存髙逺慕先賢絶情欲棄凝滯使庶幾之志揭然有所存惻然有所感忍屈伸去細碎廣咨問除嫌吝雖冇淹留何損於美趣何患於不濟若志不強毅意不慷慨徒碌碌滯於俗默默束於情永竄伏於凡庸不免於下流矣羊祜字叔子泰山人晉征南大將軍無子詔以兄子暨暨弟伊伊弟篇為祜後戒書出歐陽詢吾少受先君之教能言之年便召以典文年九嵗便誨以詩書然尚猶無鄉人之稱無清異之名今之職位謬恩之加耳非吾力所能致也吾不如先君逺矣汝等復不如吾咨度宏偉恐汝兄弟未能也竒異獨達察汝等將無分也恭為德首慎為行基願汝等言則忠信行則篤敬無口許人以財無傳不經之談無聽毁譽之語聞人之過耳可得受口不得宣思而後動若言行無信身受大謗自入刑論豈復惜汝恥及祖考思乃父言纂乃父教各諷誦之商裒晉人改按商裒即殷裒宋人避諱所也曾為滎陽令有惠政天道也者易尋而難窮易知而難行也故京房之徒考步吉凶之變而不能自見其禍更為姚平所戒此道之難知也省爾之才不及於房而吾之言過於平矣昔弗父何三命滋恭晏平仲久而敬之曽顔之徒有若無實若虛也况爾析薪之智欲彈射世俗身為謗先怨禍並集使吾懷朝夕之憂為范武子所歎亦非汝之美也若朝益暮習先人後己恂恂如也則吾聞音而識其曲食旨而知其甘永終吾餘年矣復何恨哉古人有言思不出其位爾其念之爾其念之司馬越晉東海王以王承為記室參軍雅相知重勑其子毗夫學之所益者淺體之所安者深間習禮度不如式瞻儀型諷味遺言不若親承音旨王參軍人倫之表汝其師之李皓字元盛隴西人晉涼武昭王遷于酒泉手令戒其諸子吾自立身不營世利經涉纍朝通否任時初不役智有所要求今日之舉非本願也然事會相驅遂荷州土憂責不輕門户事重雖詳人事未知天心登車攬轡百慮填胸後事付汝等粗舉旦夕近事數條遭意便言不能次比至於杜漸防萌深識情變此當任汝所見深淺非吾勑戒所盡也汝等雖年未至大若能克己纂修比之古人亦可以當事業矣茍其不然雖至白首亦復何成汝等其戒之慎之節酒慎言喜怒必思愛而知憎惡而知善動念寬恕審而後與衆之所惡勿輕承信詳審人核真偽逺佞諛近忠正按晉書作忠臣蠲刑獄忍煩擾存髙年恤喪病勤省按聽訟訴刑法所應和顔任理慎勿以情輕加聲色賞勿漏疏罰勿容親耳目人間知外患苦禁御左右無作威福勿伐善施勞逆詐意必按晉書作億必以示己眀廣加咨詢無自専用從善如順流去惡如探湯富貴而不驕者至難也念此貫心勿忘須臾寮佐邑宿盡禮承敬宴饗饌食事事留懷古今成敗不可不知退朝之暇究觀典籍面墻而立不成人也此郡世篤忠厚人物敦雅天下全盛時海內猶稱之况復今日實是名邦正為五百年鄊黨婚親相連至於公理時有小小頗回為當隨宜斟酌吾臨蒞五年兵難騷動未得休衆息役惠康士庶至於掩瑕藏疾滌除疵垢朝為冦讎夕委心膂雖未足希凖古人粗亦無負於新舊事任公平坦然無類初不容懷有所損益計近便為少經逺如有餘亦無愧於前志也陳顯達宋孝武世以軍主厯驅使南齊遷都督江州諸軍事自以人微位重每遷官有愧懼之色諸子多事豪侈顯達聞之不恱子休尚為郢府主簿過九江戒之按顯達南彭城人我本志不及此汝等勿以富貴凌人麈尾蠅拂是王謝家物汝不須捉此即取於前焚之王僧虔琅琊人仕齊為儀同宋世嘗有書戒子吾在世雖乏德素要復推排人間十許年故是一舊物人或以比數汝耳即化之後若自無調度誰復知汝事者舍中亦有少負令譽弱冠越超清級者于時王家門中優者龍鳳劣猶虎豹失蔭之後豈龍虎之儀况吾不能為汝蔭政應各自努力耳或有身經三公蔑爾無聞布衣寒素卿相屈體父子貴賤殊兄弟聲名異何也體盡讀數百卷書耳吾今悔無所及亦以前車戒爾後乘也汝年入立境方應從宦兼有室纍何處復得下帷如王郎時邪各爾身已切豈復關吾邪鬼唯知愛深松茂柏寧知子弟毁譽事因汝有感故略敘胸懷徐勉戒子書字修仁東海人梁武帝臣戒其子菘其略曰吾家本清亷故常居貧素至於産業之事未嘗經營薄躬遭逢遂至今日仰藉門風故臻此爾古人所謂以清白遺子孫不亦厚乎中年聊於東田開營小園者非播藝以要利政欲穿池種樹少寄情賞聞汝所買湖田甚為舄鹵有所收獲汝可自分贍內外大小宜令得所又復應霑之諸女耳汝既居長故有此及凡為人長殊復不易當使中外諧輯人無間言先物後己然後可貴汝當自勗見賢思齊不宜忽略以棄日也棄日乃是棄身身名美惡豈不大哉可不慎歟今之所敕略言此意政謂為家以來不事資産暨立墅舍以垂舊業陳其始末無愧懷抱王筠字元禮琅琊人仕梁為太子詹事與諸子論家門集史傳稱安平崔氏及汝南應氏並纍葉有文才所以范蔚宗云崔氏雕龍然不過父子兩三世耳非有七葉之中名德重光爵位相繼人人有集如吾門者也汝等仰觀堂構思各努力李恕唐中宗時縣令以崔氏女儀戒不及男顔氏家訓訓遺於女遂著戒子拾遺十八篇兼教男女令新婦子孫人寫一通用為鑒戒云男子六嵗教之方名七嵗讀論語孝經八嵗誦爾雅離騷十嵗出就師傅居宿於外十一専習兩經志學之年足堪賔貢平翼二子即是其人夫何異哉積勤所致耳擢第之後勿棄光隂三四年間屏絶人事講論經籍爰迄史傳並當諳憶悉令上口洎乎弱冠博綜古今仁孝忠貞溫恭謙順器惟瑚璉材堪廊廟如或出身之後怠而自逸被服綺羅弄姿顧影朝遊酒肆暮宿倡樓雖則生之不如遄死若豚犬耳奚足惜哉居九品之中處百僚之下清勤自勗平真無虧事長官以忠誠接僚友以謙敬言思乃出行思乃動勿輒有毁譽勿輕論得失格式律令為政之隄防一牽吏役動遵憲綱與奪割斷必須理愜條章喜怒刑名豈可率由胸臆枷杖樣式著於令文凖令而行足堪市恥勿奮威怒粗杖大枷肆一朝之忿取終身之敗申上移牒言唯謹爾署必真書慎勿侮弄刀筆譏玩朋僚若犯要司敗不旋踵若輕同類怨豈在眀位下處卑觸塗防謹部內士人虛心接引鄉中耆望以禮承迎若恣心縱罵輕出莠言罵父子怨罵兄弟怨既為怨府亦謂深讎劉寬不呵童僕嗣宗口不臧否韓子曰善為吏者樹德不善為吏者樹怨勉之勉之縣有長官職宣風化丞尉卑末無勞廣為若乃斥強健壓雄豪奮下車之威釣髙眀之譽指揮一縣専擅六曹識者寒心旁觀啓齒但能正身範物修己安人不與典吏交言不在公庭妄笑立無偏倚坐必正方人自懷之畏之矣汝輩後生始從卑仕祿俸所獲僅以代耕宜減省家人謹身節用閣門晝掩鎮安關鑰家童斂迹無出府廷使馬如羊不以入廄使金如粟不以入懷夫如是則驄馬埋輪且安髙枕豈多言之可畏何衆口之能傷哉楊震為涿郡太守子孫皆蔬食步行曰使人稱為清白吏子孫誠哉斯言誓銘肌骨部內交關誠非所願儻緣切要不遑逺市衣食之外無輒交通必須依價錢歸物主分眀付領書取文鈔雖云細務易涉流言勿招抑逼之詞以獲侵漁之謗若能逺希先覺遙杜未萌清介皎然吾無憂矣周生烈云食祿坐觀賊也老子云債少易償職寡易守汝等欲仕周行深期自卜審己量分或保微班冒寵貪榮方貽後譴但能績著鳴絃功彰露冕足隆門閥不墜箕裘豈要榮貴方為宦達納采行媒咸求雅對河魴宋子勿墜清規或嫁女從夫有資賢壻如為男求婦必在甲門無隳百代之規以適一時之欲告休暇景公務餘間學以潤身必資宏益譙周云聖人學之於天君子學之於聖又云進者猶行也朝發而異宿矣益者其猶取菜乎勤則頃筐盈矣家中經史不能周足但能閲市恆有賤書假如數萬青蚨才當一馬之直堪得數千黃卷便為百代之寶凡人皆知市駿馬恱輕肥而莫肯市書見近識小淮南子云家有三史無癡子可不勉歟吾昆弟七房子姪尤衆未出一門已成三從左提右挈洎乎成長世祀云逺恩愛不渝懷橘而歸遺兼諸母易衣而出詎止同胞服有功緦禮經所限情存家法勿或虧焉博徒暴客破産傾家汝等子孫尤宜戒謹脫子姪之中頑嚚不肖公違父叔之令輒從輕薄之徒必當斷其擲頭之指以為終身之戒寧不知虧令斷骨忍痛傷心折一指足以保一門所全者大故不隱也夫酒者所以祀鬼神養病老冠昏之禮非酒不成賓主之歡非酒不接無容沈湎過度顛沛有虧汝等從宦顧惜身名縱不能全然禁斷倍須拘檢酒氣未盡不可參預府庭面色未平不宜呵叱百姓以此為戒餘可知矣孫叔敖為令尹一老父教之云位益髙而意益下官益大而心益小袁子云貧賤願人之接己富貴忘己之接人大禹一飯十起周公一沐三握夫接士忘疲禮賢忘倦聖賢猶且若是而况凡庸乎曽子云書功不過百日諺云千里面首既堪力致何惜餘間諸葛戒子尚憂粗拙汝輩鍾張真草之迹念並留心隂陽卜筮之書慎毋開卷射宫觀德君子攸宜彈琴自娛性靈取恱自餘伎術並勿經懷敬慎威儀以近有德女誡女儀兒女等各寫一通咸將自警女兼輔佐君子兒亦勸奬室家中外相承夫妻並立終朝三省每月一尋實獲我心念無違也閭閻賤弟委巷庸兄多分嫡庶構成痛痏不念胞胎雖别骨血不殊豈可兒結父讎子兼母妬傷心犯順所不忍言汝等幼習義方以歸名教察天倫之重既悟同生覺流俗之非毋遵覆轍女子七嵗教以女儀讀孝經論語習行步容止之節訓以幽間聽從之儀禮云女子十年治絲枲織絍觀祭祀納酒漿事人之禮此最為先十五而笄十七而嫁既從禮制是謂成人若不微涉青編頗窺緗素粗識古今之成敗測覽古女之得失不學墻面寧止於男通之婦人亦無嫌也婦人之德貴在貞靜內外之言不出閨閫鄭衛之音尤非所習遊娛之樂無以寬懷夫若東西家無耆舊年少子幼慮逺防微家具無假於人饋獻杜而弗納心懷亷謹外絶交通衣食斟量常令備足披尋譜諜記憶親姻戚屬尊卑吉凶周至方為內範念勗前規諺云成家由婦破家由婦緬尋其語諒匪虛談未有娣姒相憐而兄弟不睦娣姒相嫉而昆季雍和者也升堂拜母心所未通廣坐呈妻理尤不可人之家法難易不同在於吾心以難勝易與其輕易寧可從難姚信按信吳人梁時太常古人行善者非名之務非人之為心自甘之以為己度嶮易不虧終始如一進合神契退同人道故神明祐之衆人尊之而聲名自顯榮祿自至其勢然也又有內析外同吐實懷詐見賢則暫自新獨居則縱所欲聞譽則驚自飾見尤則棄善端凡失名位常多怨人而害善怨一人則衆人疾之害一善則衆人怨之雖欲陷人而進己不可得也祇所以自毁耳顧真偽不可掩褒貶不可妄舍偽從實遺己察人可以通矣舍己就人去否適泰可以宏矣貴賤無常唯人所速茍善則匹夫之子可至王公茍不善則王公之子反為凡庶可不勉哉楊椿字延夀華隂人北齊侍中歸老臨行戒子孫云我家入魏之始即為上客自爾至今二千石方伯不絶祿恤甚多於姻親知故吉凶之際必厚加贈禭來往賔寮必以酒肉飲食故六姻朋友無憾焉國家初丈夫好服綵色吾雖不記上谷翁時事然記清河翁時服飾恆見翁著布衣韋帶常自約敕諸父曰汝等後世若富貴於今日者慎勿積金一斤綵帛百匹已上用為富也不聽與世家作婚姻至吾兄弟不能遵奉今汝等服乘漸華好吾是以知恭儉之德漸不如上也吾兄弟若在家必同盤而食若有近行不至必待其還亦有過中不食忍飢相待吾兄弟八人今存者有三是故不忍别食也又願畢吾兄弟不異居異財汝等眼見非為虛假如聞汝等兄弟時有别齋獨食者此又不如吾等一世也聞汝等學時俗人乃有坐待客者有驅馳勢門者有輕論人惡者及見貴勝則敬重之見貧賤則慢易之此人行之大失立身之大病也汝家仕皇魏以來髙祖以下乃有十郡太守三十二州刺史內外顯職時流少比汝等若能存禮節不為奢淫驕慢假不勝人足免尤誚足成名家吾今年始七十五自惟氣力尚堪朝覲天子所以孜孜求退者正欲使汝等知天下滿足之義為一門法耳非是茍求千載之名汝等能記吾言吾百年後終無恨矣馬援字文淵扶風人後漢伏波將軍兄子嚴敦並喜譏議而通輕俠客援在交趾還書戒之吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好議論人長短妄是非正法此吾所大惡也寧死不願聞子孫有此行也汝曹知吾惡之甚矣所以復言者施襟結褵申父母之戒欲使汝曹不忘之耳龍伯髙敦厚周慎口無擇言謙約節儉亷公有威吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂清濁無所失父喪致客數郡畢至吾愛之重之不願汝曹效也效伯髙不得猶為謹勑之士所謂刻鵠不成尚類鶩者也效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也訖今季良尚未可知郡將下車切齒州郡以為言吾常為寒心是以不願子孫效也楊侃按侃字士業齊侍中椿之子為後魏大都督我家受魏恩二千石方伯不絶記清河翁約敕諸父曰汝等後世若富貴於今日者慎勿積金一斤綵帛百匹已上用為富也不聽與世家作婚姻吾今日不為貧賤然居住舍宅不作壯麗者正慮汝等後世不賢不能保守之將為勢家所奪張奐字然明燉煌人事漢靈帝太常汝曹薄祐早失賢父財單藝盡今適喘息聞仲祉輕傲耆老侮狎同年極口恣意當崇長幼以禮自持聞燉煌有人來同聲相道皆稱叔時寬仁聞之喜而且悲喜叔時得美稱悲汝得惡論經言孔子於鄊黨恂恂如也恂恂者恭謙之貌也聖賢難知且自以汝賢父為師汝父寧輕鄉里耶年少多失改之為貴蘧伯玉年五十見四十九年非但能改之不可不思吾言不自克責反云張甲謗我李乙恚我我無是過爾亦已矣石奮責子言奮趙人漢九卿子內史慶醉入里門不下車奮聞之不食慶肉袒請罪不許舉宗及兄建肉袒奮曰內史貴人入閭里里中長老皆走匿而內史坐車中自如固當邴吉字少卿魯國人漢孝宣丞相子顯嗣爵顯為諸曹嘗從祠髙廟至夕牲日乃使出取齋衣吉大怒曰宗廟至重而顯不敬慎亡吾爵者必顯也辛毗郤子言字佐治陽翟人魏衛尉明帝任劉放孫資毗不與往來子敞諫曰今孫劉用事衆皆影附大人宜小降意和光同塵不然必冇謗言毗正色而曰吾之立身自有本末就與劉孫不平不過令吾不作三公而已何危害之有大丈夫欲為公而毁其髙節耶
