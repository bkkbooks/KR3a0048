body:
  text: 戒子通録卷五宋劉清之撰蘇丞相訓子孫詩頌字子容丹陽人元祐丞相紹聖家居作述懷百韻以代家訓今取其略云時按以後録宋人語標題內俱不直書其名蓋當尊禮先進之意今亦各仍其舊我昔就學初髫童齒未齔嚴親念癡狂小藝誘愚鈍始時授章句次第教篇韻十齡獨侍行千里赴朝覲應門待賔客睦族周親分箕裘襲素風蘭芷漸腴潤占畢自忘勞攻堅常切問六經日沉酣百氏恣蹂躪籝書逮今存手澤亦未泯賴此漸摩益稍知聖賢藴風霜經六紀蓬葆垂兩鬢念昔多囏勤誨爾宜悱憤名教樂有餘異端多亂紊其要本誠明烏在問圓頓美璞不雕琢安得懷瑜瑾良器不深藏渠能免瑕璺學問不沾洽何由垂望聞操守不堅純久必成淄磷進修欲及時行違要無悶當年儻因循晚歲必悔恨更思祖先勳相傳清白訓出處有殊途豐約毋過分考室俟肯堂肥家在忍順常使棣華榮無致荆枝忿中冓須自防外誘不可徇力行儻不渝家聲期逺振邵康節戒子孫雍字堯夫洛陽人熙寧徴士諡康節上品之人不教而善中品之人教而後善下品之人教亦不善不教而善非聖而何教而後善非賢而何教亦不善非愚而何是知善也者吉之謂也不善也者凶之謂也吉也者目不觀非禮之色耳不聽非禮之聲口不道非禮之言足不踐非禮之地人非善不交物非義不取親賢如就芝蘭避惡如畏蛇蝎或曰不謂之吉人則吾不信也凶也者語言詭譎動止隂險好利飾非貪淫樂禍疾良善如讎隙犯刑憲如飲食小則殞身滅性大則覆宗絶嗣或曰不謂之凶人則吾不信也傳有之曰吉人為善惟日不足凶人為不善亦惟日不足汝等欲為吉人乎欲為凶人乎戒子吟云至寶明珠非有纇全珍良玉自無瑕為珠為玉尚如此何况為人多過差又云有過不能改知賢不肯親雖生人世上未得謂之人又云善惡無他在所存小人君子此中分改圖不害為君子迷復終歸作小人良藥有功方利病白圭無玷始稱珍欲成令器須追琢過失如何不就新又教子吟為人能了自家身千萬人中有一人雖用知如未知説在乎行與不行分該通始謂才中秀傑出方名席上珍善惡一何相去逺也由資性也由勤孫宣公奭字宗右博州人天禧從官疾甚徙正寢屏婢妾謂子瑜曰逮吾屬纊當毋內姬妾獨若與諸孫在庶不死于婦人之手陳師德閩人謂之為學十戒官按朱子文集師德名定莆田人右承奉郎道不可不力學勿入諸子經當潛心以終身勿作經生行不可不砥礪勿作險怪政事不可不學勿作俗吏文不可不學勿作文士詩不可不學勿作詩人九流不可不貫穿勿泥小道科目不可不勉應勿作舉子書不可不學勿取書名技藝不可不學勿妨本業胡翼之遺訓名瑗泰州人嘉祐天章侍講嫁女必須勝吾家者勝吾家則女之事人必欽必戒娶婦必須不若吾家者不若吾家則婦之事舅姑必執婦道劉彥沖子翬字彥沖建州人紹興通判興化軍訓其子玶云吾聞之糟粕捐淳精聚誠意畢芻狗除此言雖小可以喻大孰為學問之粹而有益於吾身哉木稚而曲其老不舒人稚弗攻其成必愚故善學者必謹其初凡日用間業業乾乾散秩必恭執事必虔中惟不自輕雖奴𨽻亦尊唾地如汙其畏如是寢則易安食則知味頮面奏圊脫襟屣履每每存之斯無過矣自朝至昏以一條貫焉勿謂末也本實由之毋悅於新毋駭於竒驟得必夸久而寖微習而察焉豈曰無徴出指於所底止必恭其次也頃刻之功初若不足外務奪之或斷或續及其至焉皆其所積故君子許其進而惰夫疑以自絶原有生之初愚智混混學如蛻焉其質乃變變非他知實由昔見存之則誠體之則仁孰明此哉聖心之純性本渾全或誤於未聞知誤勿執守之則真斯言不守何多求焉棟宇雖充不如掩編如人有車身必自登弗軸弗輈則何以行凡初有聞果然自足嵬岸恣睢自離於曲可口之實出於凡木人或有言志善忘惡彼真不賢可助余之朂見賢可信信之不疑勿窺其小疵謂不足以為余師我信乃自益我疑則自隳師乎師乎惟已之為溫故知新吾昔所聞與今聞合豈不欣欣如膏熾薪心源益明古人得善惟恐弗居如救火捕亡其敢緩諸茍曰此日姑且聊以優遊則知終身無復好修惟命乃中扃泯泯棼棼以敬直之如風掃蚊一道通明振古如茲曰豫衰矣尚識前言子其循之學心有聞張忠獻遺令名浚字德逺廣漢人紹興丞相婚禮不用樂三日後管領親家即隨宜使酒成禮可矣不當效彼俗子徒為虛費無益有損祭禮重大以至誠嚴潔為主别置盤盞碗碟之類常切封鎖以待使用喪禮貴哀佛事徒為觀看之美誠何益不若節浮費而依古禮施惠宗族之貧者賔客盡誠盡禮可也恣烹炮飾器用又羣集婦女言語無節昏志損財為害莫大范魯公戒從子詩質字太素大名人建隆宰相從子果嘗求奏遷秩質作詩曉之去年初釋褐一命列蓬邱適會飛龍慶王澤天下流爾得六品階無乃太為優如何志未滿意欲凌霄遊苦言品位卑寄書來我求省之再三嘆不覺淚盈眸吾家夲寒素門地寡公侯先子有令德樂道嘗優遊積善有餘慶清白為詒謀伊余奉家訓孜孜務進修夙夜事勤肅言行思悔尤出門擇交友防愼畏薰蕕省親嘗懼玷恐掇庭闈羞童年志于學不敢墮箕裘二十中甲科赭尾化為虬三十入翰苑步武向瀛洲四十登輔佐貂冠侍冕旒備位行一紀將何助帝猷既非救旱雨豈是濟川舟天子未遐棄日益素餐憂黃河潤九里草木皆浸漬吾宗凡九人繼踵升官次門內無白丁森森朱緑紫鵷行暨內職亞尹州從事府掾監省官髙低皆清美悉由僥幸然不因資考至朝廷懸爵秩命之曰公器才奢祿及身有功賞於世非才又非功安得專厚利寒衣內府帛飢食太倉米不蠶復不穡未嘗勤四體雖然一家榮豈塞衆人議顒顒十目窺齪齪千人指借問爾與吾如何不自愧戒爾學立身莫若先孝弟怡怡奉親長不敢生驕易戰戰復兢兢造次必於是戒爾學干祿莫若勤道藝嘗聞諸格言學而優則仕不患人不知惟患學不至戒爾逺恥辱恭則近乎禮自卑而尊人先彼而後己相鼠與茅鴟宜鑑詩人刺戒爾勿放曠放曠非端士周孔垂名教齊梁尚清議南朝稱八逹千載穢青史戒爾勿嗜酒狂藥非佳味能移謹厚性化為凶險類古今傾敗者歷歷皆可記戒爾勿多言多言衆所忌茍不慎樞機災厄從此始是非毁譽間適足為身纍舉世重交遊擬結金蘭契忿怨從易生風波當時起所以古人疾蘧蒢與戚施舉世重任俠俗呼為氣義為人赴急難往往陷囚繫所以馬援書勤勤告諸子舉世賤清素奉身好華侈肥馬衣輕裘揚揚過閭里雖得市童憐還為識者鄙我本羈旅臣遭逢堯舜理位重才不充戚戚懷憂畏深泉與薄氷蹈之唯恐墜爾曹當閔我勿使增罪戾閉門斂蹤迹縮首避名勢勢位難久居畢竟何足恃物盛則必衰有隆還有替速成不堅牢亟走多顛躓灼灼園中花早發還先萎遲遲澗畔松鬱鬱含晚翠賦命有疾徐青雲難力致寄語謝諸郎躁進徒為耳晏元獻與兄書殊字同叔撫州人康定丞相與兄書言教子之事殊再拜領手書深喜王事外尊候萬福長幼安寧四郎下面二孩兒知己取在彼不知令讀書否假如性不高亦須勤令讀書學書學禮度視老宿有德之人所冀向後自了得一身免辱門户也切切此最日夕急切之事二十也殿直一二年來大假聽人言語謹卓不曾出入兼識好惡甚得力免勞人心力亦應是從有家纍知惜身事兄弟且免一件憂煎所以因信上聞希令諸子知之若箇箇稍學好事免為人所嗤笑成立得身事則尊上父母一生放心有望矣門前望不要令小後生輕薄不著實者來往或尋得一有年甲嚴謹門客教訓諸子甚好先少師所以常切切於此事重余性饒美朴實嫌其餘輕薄殊日近思量方知是格言也近日京朝官班行中公事甚多細觀多是人家子弟輕事親狎非類者足知小男女尤宜親近有德逺輕薄之徒也冬寒公餘加愛不備杜正獻責弟書衍字世昌越州人慶歷丞相與大寺丞書比人從到便嫌我家貧云汝左右皆金釧叉鈿每婢榻上各有四五張綾被然則汝性侈料得亦未有許多物色始則不信洎聞蔣姑東下屢出告隨舟歸汝家去洎不從之由是病日增矣以此參驗即慕汝家富無差矣二哥不肯盡述恐汝不悉故報之韓忠獻戒子姪詩琦字稚圭相州人嘉祐丞相寒食親拜二墳因戒子姪春色清且明節盛一百五寒食遵遺俗潑火霽微雨非才忝國恩因病得吾土何以知殊榮此日奉宗祖新安惟皇考豐安則王父松楸各萬株岡勢擁城府二塋相去間近止一舍許前曉揭旌牙蠲潔具罍俎芬馨逹孝誠儼若侍容語禮成無一違觀者競如堵退惟愚小子未老膺旄斧顧巳胡能然世德大門户思為後嗣戒永永著家矩子姪聽吾言汝各志心膂汝曹生綺紈得仕匪艱苦學業勤則成富貴汝自取仁睦周吾親忠義報吾主聞須求便官墳隴善完補死則託二塋愼勿葬他所得從祖考遊魂魄自寧處無惑葬師言背親圖福祜有一廢吾言汝行則臣虜宗族正其罪聲伐可鳴鼓宗族不繩之鬼得而誅汝歐陽文忠書示子修字永叔廬陵人治平執政試筆書付子棐奕藏精於晦則明養神於靜則安晦所以畜用靜所以應動善畜者不竭善應者無窮此君子修身治人之術然性近者得之易也勉諸子玉不琢不成器人不學不知道然玉之為物有不變之常雖不琢以為器而猶不害為玉也人之性因物則遷不學則捨君子而為小人可不念哉與姪通理自南方多事以來日夕憂汝得昨日遞中書頓解憂想歐陽氏自江南歸明纍世蒙朝廷官祿吾今又被榮顯致汝等並列官品當思報效偶此多事如有差使盡心向前不得避事至於臨難死節亦是汝榮事但存心盡公神明自祐汝慎不可思避事也昨書中言欲買朱砂來吾不闕此物汝於官下宜守亷何得買官下物吾在官所除飲食外不曾買一物汝可觀此為戒也唐質肅介字子方侍案介江陵人天聖御史公一日退朝謂諸子曰吾以直道自任蒙聖主厚恩參二政府惟以至公為報不敢以朝廷官爵為己私恩桃李固未與汝等栽培惟荆棘則甚多矣然仕宦窮逹各有時命汝等自勉之與子書韓忠憲億字宗魏雍邱人景祐參知政事與子綜書得書知汝受館閣之職深切欣慰但服勤職業一心公忠何慮不逹更宜每事韜晦懼輕言之失為妙又云知汝受府推乍贊浩穰庶事皆須經心熟思毋致小有失錯至於斷一笞杖稍或不當明則懼於朝章幽則纍於隂隲可不戒哉名二子説蘇先生洵字明允眉州人嘉祐編禮輪輻蓋軫皆有職乎車而軾獨若無所為者雖然去軾則吾未見其為完車也軾乎吾懼汝之不外飾也天下之車莫不由轍而言車之功者轍不與焉雖然車仆馬斃而患亦不及轍是轍者善處乎禍福之間也轍乎吾知免矣訓子孫文司馬文正光字君實陜州人元祐丞相吾家本寒族世以清白相承吾性不喜華靡自為乳兒時長者加以金銀華美之服輒羞赧棄去之二十忝科名聞喜燕獨不戴花同年曰君賜不可違也乃簪一花平生衣取蔽寒食取充腹亦不敢服垢弊以矯俗干名但順吾性而已衆人皆以奢靡為榮吾心獨以素儉為美人皆嗤吾固陋吾不以為病應之曰孔子稱與其不遜也寧固又曰以約失之者鮮矣又曰士志於道而耻惡衣惡食者未足與議也古人以儉為美德今人以儉相詬病嘻異哉近世風俗尤為侈靡走卒類士服農夫躡絲履吾記天聖中先公為羣牧判官客至未嘗不置酒或三行或五行不過七行酒沽於市果止梨栗棗柿肴止於脯醢菜羮器用甕漆當時士大夫家皆然人不相非也會數而禮勤物薄而情厚近日士大夫家酒非內法果肴非逺方珍異食非多品器皿非滿桉不敢會賔友常數月營聚然後敢發書茍或不然人爭非之以為鄙吝故不隨俗靡者鮮矣嗟乎風俗頽弊如是居位者雖不能禁忍助之乎又聞李文靖公為相治居第於封邱門外廳事前僅容旋馬或言其太隘公笑曰居第當傳子孫此為宰相廳事誠隘為太祝奉禮廳事已寬矣參政魯公為諫官真宗遣使急召之得於酒家既入問其所來以實對上曰卿為清望官奈何飲於酒肆對曰臣家貧客至無器皿果肴故就酒家觴之上以其無隱益重之張文節為相自奉如河陽掌書記時所親或規之曰公今受俸不少而自奉若此雖自信清約外人頗有公孫布被之譏公宜少從衆公歎曰吾今日之俸雖舉家錦衣玉食何患不能顧人之常情由儉入奢易由奢入儉難吾今日之俸豈能常有身豈能常存一旦異於今日家人習奢已久不能頓儉必致失所豈若吾居位去位身存身亡如一日乎嗚呼大賢之深謀逺慮豈庸人所及哉御孫曰儉德之共也侈惡之大也共同也言有德者皆由儉來也儉則寡欲君子寡欲則不役於物可以直道而行小人寡欲則能謹身節用逺罪豐家故曰儉德之共侈則多欲君子多欲則貪慕富貴枉道速禍小人多欲則多求妄用敗家喪身是以居官必賄居鄉必盜故曰侈惡之大也昔正考父饘粥以糊口孟僖子知其後必有逹人季文子相三君妾不衣帛馬不食粟君子以為忠管仲鏤簋朱紘山楶藻梲孔子鄙其小器公叔文子享衛公史鰌知其及禍及戍果以富得罪出亡何曾日食萬錢至孫以驕溢傾家石崇以奢靡誇人卒以此死東市近世冦萊公豪侈冠一時然以功業大人莫之非子孫習其家風今多窮困其餘以儉立名以侈自敗者多矣不可遍數聊舉數人以訓汝汝非獨身當服行當以訓汝子孫使知前輩之風俗云夫人孤愚者則不然棄其九族逺其兄弟欲以專利其身殊不知身既孤人斯戕之矣於利何有哉昔周厲王棄其九族詩人刺之曰懷德惟寧宗子維城毋俾城壞毋獨斯畏茍為獨居斯可畏矣宋昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇蔭矣葛藟猶能庇其本根故君子以為比况國君乎此諺所謂庇焉而縱尋斧焉者也必不可君其圖之親之以德皆股肱也誰敢攜二若之何去之昭公不聽果及於亂華亥欲代其兄合比為右師譖之平公而逐之左師曰汝夫也必亡汝喪而宗室於人何有人亦於汝何有既而華亥果亡孔子曰不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮以順則逆民無則焉不在於善而皆在於凶德雖能德之又奚足以為君子之所貴哉故世之人欲愛其身而棄其宗族烏在其能愛身也孔子曰均無貧和無寡安無傾善為家者爪牙之利不及虎豹旅力之強不及熊羆奔走之疾不及麋鹿飛揚之髙不及燕雀茍非羣聚以禦外患則久為異類食矣是故聖人教人以禮使知父子之親人知愛其父則知愛其兄弟矣知愛其祖則知愛其宗族矣如枝葉之附於根幹手足之繫於身首不可離也豈徒使其粲然條理以為榮觀哉乃實欲使相依芘以扞外患也吐谷渾阿豺有子二十人病且死謂曰汝等各奉吾一隻箭折之慕利延折之曰汝取十九隻箭折之利延不能折阿豺曰汝曹知否單者易折衆則難摧戮力一心然後社稷可固言終而死彼戎狄也猶知宗族相保以為強况華夏乎聖人知一族不足以獨立也故又為之甥舅婚媾姻婭以輔之猶懼其未也故又慈養百姓以衛之故愛親者所以愛其身也如是則其身安如泰山壽如箕翼他人安得而侮之哉故自古聖賢未有不先親九族然後能施及他人者彼盡其所有而均之雖糲食不飽弊衣不完人無怨矣夫怨之所生生於自私及有所厚薄也漢世諺曰一尺布尚可縫一斗粟尚可舂言尺布可縫而共衣斗粟可舂而共食譏文帝以天下之富不能容其弟也梁中書侍郎裴子野家貧妻子常苦飢寒中表貧乏者皆收養之時逄水旱以二石米為薄粥僅得遍焉躬自同之曾無厭色此得收族之道者也為人父祖者莫不思利其後世然果能利之者鮮矣何以言之今之為後世謀者不過廣營生計以遺之田疇連阡陌邸肆跨坊曲粟麥盈囷倉金帛充篋笥慊慊然求之猶未足施施然自以為子子孫孫纍世用之莫能盡也然不知以義方訓其子以禮法齊其家自於十數年中勤身苦體以聚之而子孫以嵗時之間奢靡遊蕩以散之反笑其祖考之愚不知自娛又怨其吝嗇無恩於我而厲之也始則欺紿攘竊以充其欲不足則立約舉債於人觀其意惟患其祖考之壽也然則鄉之所以利後世者適足以長子孫之惡而身禍也頃常有士大夫其先亦國朝名臣也家甚富而尤吝嗇斗升之粟尺寸之帛必身自出納鎖而封之晝則佩鑰於身夜則置鑰於枕下病甚困絶不知其子孫竊其鑰開藏室發篋笥取其資財其人復蘇即捫枕下求鑰不得憤怨遂卒其孫不哭相與爭匿其財遂致鬭訟其處女亦蒙首執牒自訴於府庭以爭嫁資為鄉黨笑蓋由子孫自幼及長惟知有利不知其義故也夫生生之資固人所不能無然勿求多餘多餘希不為纍矣使其子孫果賢耶豈疏糲布褐不能自營死於道路乎若其不賢耶雖積金滿堂室又奚益哉故多藏以遺子孫也吾見其愚之甚然則聖賢不顧子孫之匱乏耶曰何為其然也昔者聖賢遺子孫以亷以儉舜自側微積德至於為帝子孫保之享國百世而不絶周自后稷公劉太王王季文王積德纍功至於武王而有天下其詩曰詒厥孫謀以燕翼子言豐德澤明禮法以遺後世而安固之也故能子孫承統八百餘年其支庶猶為天下之顯諸侯棊布於海內其為利豈不大哉海虞令何子平母喪去官哀毁踰禮每哭踊頓絶方蘇屬大明末東土飢荒繼以師旅八年不得營葬晝夜號哭常如袒括之日冬不衣絮夏不就清涼一日以米數合為粥不進鹽菜所居屋敗不蔽風日兄子伯興欲為葺理子平不肯曰我情事未申天地一罪人耳屋何宜覆蔡興宗為會稽太守甚加矜賞為營冢壙新野庾震喪父母居貧無以葬賃書以營事至於掌穿然後成葬事賢者於葬如此其汲汲也今世俗信術者妄言以為葬不擇地及嵗月日時則子孫不利禍殃總至乃至終喪除服或十年或二十年或終身或纍世猶不葬至為水火所漂焚他人所投棄失亡尸柩不知所之者豈不哀哉人所貴有子孫者為其死而形體有所付也既而不葬則與無子孫而死道路者奚以異乎詩云行有死人尚或殣之况為人子乃忍棄其親而不葬哉唐太常博士吕才敘葬書曰孝經云卜其宅兆而安厝之蓋以窀穸既終永安體魄而朝市遷變泉石交侵不可前知故謀之龜筮近代或選年月或相墓田以為一事失所禍及死生按禮天子諸侯大夫葬皆有月數則是古人不擇年月也春秋九月丁巳葬定公雨不克葬戊午日下昃乃克葬是不擇日也鄭葬簡公司墓之室當路毁之則朝而窆不毁則日中而窆按左傳作朝而堋日中而堋子産不毁是不擇時也古之葬者皆於國都之北域兆有常處是不擇地也今葬書以為子孫富貴貧賤夭壽皆因葬所致夫子文為令尹而三已柳下惠為士師而三黜計其邱壠未嘗改移而野俗無識妖巫妄言遂於劈踊之際擇葬地而希官爵荼毒之秋選葬時而規財利斯言妄矣夫死生有命富貴在天固非葬所能移就使能移孝子何忍委其親不葬而求利於己哉世又有用羌胡法自焚其柩收燼骨而葬之者人習為常恬莫之怪嗚呼訛俗悖戾乃至此乎或曰旅官逺方貧不能致其柩不焚之何以致其歸葬曰如亷范輩豈其家富耶延陵季子有言骨肉復歸于土命也魂氣則無不之也舜為天子巡守至蒼梧而殂葬於其野彼天子猶然况士民乎必也竭力不能歸其柩即所亡之地而葬之不猶愈於火焚乎易恆之六五曰恆其德貞婦人吉夫子凶象曰婦人貞吉案恆字舊本作常貞字舊本作正蓋避真宗仁宗諱今改正從一而終也夫子制義從婦凶也丈夫生而有四方之志威令所施大者天下小者一官而近不行於室家為一婦人所制不亦可羞哉昔晉惠帝為賈后所制廢武悼楊太后於金墉絶膳而終囚愍懷太子於許昌尋殺之唐肅宗為張后所制徙上皇於西內以憂崩建寧王倓以忠孝受誅彼二君者貴為天子制於悍妻上不能以保其親下不能以庇其子况於臣民乎自古及今以悍妻而乖離六親敗亂其家者可勝數哉然則悍妻之為害大矣故凡娶妻不可不慎擇也既娶而防之以禮不可不在其初也其或驕縱悍戾訓勵禁約而終不從不可以不棄也夫婦以義合義絶則離今之士大夫有出妻者衆則非之以為無行故士大夫難之按禮妻有七出顧所以出之用何事爾若妻實犯禮而出之乃義也昔孔氏三世出其妻自餘賢士以義出其妻者衆矣奚虧於行哉茍室有悍妻而不去則家道何日而寧乎太史公曰夏之興也以塗山而桀之放也以末喜殷之興也以有娀紂之殺也嬖妲己周之興以薑嫄及太任而幽王之禽也淫於褒姒故易基乾坤詩始關雎夫婦之際人道之大倫也禮之用唯婚姻為兢兢夫樂調而四時和隂陽之變萬物之統也可不慎歟為人妻者其德有六一曰柔順二曰清潔三曰不妬四曰儉約五曰恭謹六曰勤勞夫天也妻地也夫日也妻月也夫陽也妻隂也天尊而處上地卑而處下日無盈虧月有圓缺陽唱而生物隂和而成物故婦人專以柔順為德不以強辨為美也張無盡名天覺津案張商英字天覺號無盡居士蜀之新人紹聖執政此云名天覺誤也父孝子必孝不教亦須孝自己身不孝養子謾勞教慈烏本來孝何曾得人教孝是種子法不由教不教戒子弟言王文正旦字子明魏州人景德丞相我家世名清德當務儉素保守門風不得恃相輔家事泰侈戒子言高瓊亳州人景德大將每戒諸子毋曲事要勢以蘄進身若吾奮節行間至秉旄鉞豈因人力哉唐既字潛亨江陵人元符隱士教子務充其德性良能富於己何得為貧識者皆貴之何得為賤此天下真富貴也汝能自立足矣餘聽命可也家訓楊文公億字大年建州人天禧翰林學士童稚之學不止記誦養其良知良能當以先入之言為主日記故事不拘今古必先以孝弟忠信禮義亷恥等事如黃香扇枕陸績懷橘叔敖隂德子路負米之類只如俗説便曉此道理久久成熟德性若自然矣江端友陳留人士案端友字子我靖康初賜進出身後至太常少卿夜卧不眠常須息心定志勿妄籌畫無益之事及起邪思當審觀此身暫聚不久既死之後急急斂藏蓋其敗壞不可堪見方此之時誰為我者如此思之用意勞神鑿空妄作名利之心皆可灰滅以之涉世遇患鮮矣志慮既澄自能體道念念皆正則大丈夫之事也凡飲食知所從來五榖則人牛稼穡之艱難天地風雨之順成變生作熟皆不容易肉味則殺生斷命其苦難言思之令人自不欲食况過擇好惡又生嗔恚乎一飽之後八珍草萊同為臭腐隨家豐儉得以充飢便自足矣門外窮人無數有盡力辛勤而不得一飽者有終日飢而不能得食者吾無功坐食安可更有所擇若能如此不惟少欲易足亦進學之一助也吾嘗謂欲學道當以攻苦食淡為先人生直得上壽亦無幾何况逡巡之間便乃隔世不以此時學道復性反本而區區惟事口腹豢養此身可謂虛作一世人也食已無事經史文典謾讀一二篇皆有益於人勝别用心也與人交遊宜擇端雅之士若雜交終必有悔且久而與之俱化終身欲為善士不可得矣談議勿深及他人是非相與意了知其為是為非而已棊奕雅戲猶曰無妨毋及婦人嬉笑無節敗人志意此最不可也既不自重必為有識所輕人而為人所輕無不自取之也汝等志之庭戒宋景文祁字子京安陸人嘉祐從臣吾世為儒今華吾體者衣冠也榮吾私者官祿也謹吾履者禮法也睿吾識者詩書也入以事親出以事君生以養死以葬莫非儒也由終日戴天不知天之高終日跖地不知地之厚故天下蚩蚩終無謝生於其本者德大而不可見也吾沒後不得作道佛二家齋醮此吾生平所志若等不可違命作之違命作之是死吾也是以吾為遂無知也孔子稱天下有至德要道之孝故自作經一篇以教後人必到於善謂曰至莫不切於事謂曰要舉一孝百行罔不該焉故吾以此教若等凡孝於親則悌於長友於少慈於幼出於事君則為忠於朋友則為信於事為無不敬無不敬則庶乎成人矣若等兄弟十四人雖有異母者但古人謂四海之內皆兄弟也况同父均氣乎詩稱死喪之威兄弟孔懷不可不念也兄弟之不懷求合他人他人渠肯信哉縱陽合之彼應背憎也若等視吾事莒公莒公及吾云何可以為法矣大抵人不可以無學至於章奏箋記隨宜為之天分自有所稟不可強也要得數百卷書在胸中則不為人所輕誚矣
