body:
  text: 戒子通録卷四宋劉清之撰陶潛命子詩疏字元亮晉彭澤令命子詩及與子儼等疏悠悠我祖爰自陶唐邈為虞賓世歷重光御龍勤夏豕韋翼商穆穆司徒厥族以昌紛紛戰國漠漠衰周鳳隱于林幽人在邱逸虬繞雲奔鯨駭流天集有漢眷余愍侯於赫愍侯運當攀龍撫劒風邁顯兹武功書誓河山啓土開封亹亹丞相允迪前蹤渾渾長源鬱鬱洪柯羣川載導衆條載羅時有語默運因隆窊在我中晉業融長沙桓桓長沙伊勳伊德天子疇我專征南國功遂辭歸臨寵不忒孰謂斯心而近可得肅矣我祖慎終如始直方二臺惠和千里於穆仁考淡焉虛止寄迹風雲置兹慍喜嗟余寡陋瞻望弗及顧慙華鬢負影隻立三千之罪無復其急我誠念哉呱聞爾泣卜云嘉日占亦良時名汝曰儼字汝求思溫恭朝夕念兹在兹尚想孔伋庶其企而厲夜生子遽而求火凡百有心奚特于我既見其生實欲其可人亦有言斯情無假日居月諸漸免于孩福不虛至禍亦易來夙興夜寐願爾斯才爾之不才亦已焉哉疏告儼俟份佚佟天地賦命生必有死自古聖賢誰獨能免子夏有言曰死生有命富貴在天四友之人親受音旨發斯談者將非窮達不可妄求夀夭永無外請故耶吾年過五十少而窮苦每以家弊東西遊走性剛才拙與物多忤自量為己必貽俗患僶俯辭世使汝等幼而飢寒余嘗感孺仲賢妻之言敗絮自擁何慙兒子此既一事矣但恨鄰靡二仲室無萊婦抱兹苦心良獨內愧少學琴書偶愛間靜開卷有得便欣然忘食見樹木交蔭時鳥變聲亦復歡然有喜常言五六月中北窗下臥遇涼風暫至自是羲皇上人意淺識罕謂斯言可保日月遂往機巧好疏緬求在昔眇然如何疾患以來漸就衰損親舊不遺每以藥石見救自恐大分將有限也汝輩稚小家貧每役柴水之勞何時可免念之在心若何可言然汝等雖曰同生當思四海皆兄弟之義鮑叔管仲分財無猜歸生伍舉班荆道舊遂能以敗為成因喪立功他人尚爾况同父之人哉潁川韓元長漢末名士身處卿佐八十而終兄弟同居至於沒齒濟北范稚春晉時操行人也七世同財家人無怨色詩曰高山仰止景行行止雖不能至爾心尚之汝其慎哉吾復何言杜甫示子詩字子美京兆人唐拾遺示子宗武覔句新知律攤書解滿牀試吟青玉案莫帶紫羅囊假日從時飲明年共我長應須飽經術已似愛文章十五男兒志三千弟子行曾參與遊夏達者得升堂韓愈字退之昌黎人唐吏部侍郎子符讀書城南以示之木之就規矩在梓匠輪輿人之能為人由腹有詩書詩書勤乃有不勤腹空虛欲知學之力賢愚同一初由其不能學所入遂異閭兩家各生子提孩巧相如少長聚嬉戲不殊同隊魚年至十二三頭角稍相疏二十漸乖張清溝映汚渠三十骨骼成乃一龍一豬飛黃騰踏去不能顧蟾蜍一為馬前卒鞭背生蟲蛆一為公與相潭潭府中居問之何因爾學與不學歟金璧雖重寶費用難貯儲學問藏之身身在即有餘君子與小人不繫父母且不見公與相起身自犂鋤不見三公後寒飢出無驢文章豈不貴經訓乃災畬潢潦無根源朝滿夕已除人不通今古馬牛而襟裾行身陷不義况望多名譽時秋積雨霽新涼入郊墟燈火稍可親簡編可卷舒豈不旦夕念為爾惜居諸恩義有相奪作詩勸躊躇盧同寄子詩唐逸人詩寄男抱孫别來三得書書道違離久書處甚粗殺且喜見汝手尚書當畢功禮記速須剖尋義低作聲便可養年夀莫學村學生粗氣強叫吼殷十七老儒是汝父師友傳讀有疑誤輒告咨問取兩手莫破拳一吻莫飲酒小時無大傷習性防已後莫惱添丁郎淚子作面垢莫引添丁郎赫赤日裏走賀敦謂子言隋金州總管宇文護忌而害之臨終呼子弼謂曰按敦復姓賀若世居漠北為周申州刺史即被害事見北史此標賀姓疑有脫字注云隋亦誤也弼字輔臣仕隋以平陳功封宋國公見隋書吾必欲平江南然此心不果汝當成吾志且吾以舌死汝不可不思因引錐刺弼舌出血誡以慎口韋世康與子弟書京兆人隋司會中大夫祿豈須多防滿則退年不待暮有疾便辭李績唐人以疾謂弟弼曰我見房元齡杜如晦高季輔皆辛苦立門戶悉為不肖子敗之我子孫今以付汝汝可謹察有不厲言行交非類者急榜殺以聞毋令後人笑吾猶吾笑房杜也房彥謙與子言字孝沖清河人隋長葛令居官得祿周恤親友謂子元齡曰人皆因祿富我獨以官貧所遺子孫在於清白耳杜牧寄兄子詩字牧之樊川人唐中書舍人冬至日寄兄子阿宜小姪名阿宜未得三尺長頭圓筋骨緊兩臉明且光去年學官人竹馬繞四廊指揮羣兒輩意氣何堅剛今年始讀書下口三五行隨兄旦夕去斂手整衣裳去歲冬至日拜我立我旁祝爾願爾貴仍且夀命長今年我江外今日生一陽憶爾不可見祝爾傾一觴陽德比君子初生甚微茫排隂出九地萬物隨開張一似小兒學日就復月將勤勤不自已二十能文章仕宦至公相致君作堯湯我家公相家劒珮嘗丁當舊第開朱門長安城中央第中無一物萬卷書滿堂家集二百編上下馳皇王多是撫州寫今來五紀強尚可與爾讀助爾為賢良經書刮根本史書閲興亡願爾一祝後讀書日日忙一日讀十紙一月讀一箱吾兄苦好古學問不可量晝居府中治夜歸書滿牀後貴有金玉必不為爾藏崔昭生崔藝李兼生窟郎堆錢一百屋破散何披猖今雖未即死餓凍幾欲僵參軍與縣尉塵土驚劻勷一語不中治笞箠身滿瘡官罷得絲髮好買百樹桑稅錢未輸足得米不敢嘗願爾聞我語歡喜入心腸大明帝宫闕杜曲我池塘我苦自潦倒看汝爭翺翔總語諸小道此詩不可忘顔延之庭誥字延年琅琊人宋武帝臣間居無事為庭誥之文施於閨庭之內謂不逺也此按庭誥有二篇節録其第一吾年居秋方慮先草木故遽以末聞誥爾在庭情有公私公通可以使神明加嚮私塞不能令妻子移心是以昔之善為士者合公屏私尋尺之身而以天地為心數紀之夀常以金石為量觀夫古之先生垂戒長老餘論雖器用細制每以不朽見銘繕築末迹咸以可久承志况植德立義收族長家而不思經逺乎曰身行備足遺之後人欲求子孝必先慈將責弟悌務為友雖孝不待慈而慈固植孝悌非期友而友能立悌夫和之不備或應以不和猶信不足焉必有不信儻知恩意相生情理相出可使家有參柴人皆由損夫內居德本外夷民譽言高一世處之逾默器重一時體之滋沖不以所能干衆不以所長議物淵泰入道與天為人者士之上也若不能遺聲敬慕謙通畏避矜踞思廣監擇從其逺大文理精出而言稱未達論問宣茂而不以居身此其亞也若乃聞實之為貴以辨畫所克見聲之取榮謂爭奪可獲言不出於戶牖自以為道義久立才未信於僕妾而曰我有以過人於是感茍鋭之志馳傾觖之望豈悟已挂有識之裁入修家之戒乎記所云千人所指無病自死者也行近於此者吾不願聞之矣凡有知能預有文論若不練之庶士校之羣言通才所歸前流所與焉得以成名乎若呻吟於牆室之內喧嚻於黨輩之間竊議以迷寡聞妲按妲字疑誤語以敵要説是短算所出而非長見所上適值尊朋臨座稠覽博論而言不入於高聽人見棄於衆視則慌若迷塗失偶黶如深夜撤燭銜聲茹氣腆􅀈按本集作腆默而歸豈識向之夸慢祇足以成今日之沮喪邪此固少壯之廢爾其戒之夫以怨誹為心者未有達無心救得喪多見誚耳此蓋臧獲之為豈識量之事哉是以德聲令氣愈上愈高忿言懟議愈下愈發有尚於君子者寧可不務勉邪雖曰常人之情不能素盡故當以逺理勝之么􅀢除之豈不可務自異而取陷庸品乎富厚貧薄事之懸也以富厚之身親貧薄之人非可以一時同處然昔有守之無怨安之不悶者蓋有理存焉夫既有富厚必有貧薄豈其證然時乃大道若人富厚是理無貧薄然乎必不然也若謂富厚在我則宜貧薄在人可乎又不可矣道在不然義在不可而橫意去就謬生希幸以為未達至分蠶溫農飽民生之本躬稼難就上以僕役為資當施其情願庀其衣食定其當治遞其優劇出之休饗後之捶責雖有勸恤之勤而無霑曝之苦務前公稅以逺吏讓無急傍費以息流議量時發斂視歲穰儉省贍以奉己損散以及人此用天之善御生之得也率下多方見情為上立長多術晦明為懿雖及僕妾情見則事通雖在畎畝明晦則功博若奪其常然役其煩務使威烈雷霆猶不禁其欲棄其大用窮其細瑕或明灼日月將不勝其邪故曰孱焉則差的焉則暗是以禮道尚優法意從刻優則人自為厚刻則物相為薄耕收誠鄙此用不忒無謂野陋而不以居心也含生之氓同祖一氣等級相傾遂成差品至夫願欲情嗜宜無間殊若能服溫厚而知穿弊之苦明周之德厭滋旨而識寡嗛之急仁恕之功豈與夫比肌膚於草石方手足於飛走者同其意用哉罰慎其濫惠戒其偏罰濫則無以為罰惠偏則不如無惠雖爾眇末猶偏庸保之上事思反已動類念物則其情得而人心塞矣抃博蒲塞會衆之事諧調哂謔適坐之方然失敬致侮皆此之由方其剋瞻彌喪端儼况遭非鄙慮將醜折豈若正其容而簡其事靜其氣而逺其意使言必諍懕賔友清耳笑不傾撫左右恱目非鄙無因而生侵侮何從而入此亦持德之管籥爾其謹哉嫌惑疑心誠亦難分豈唯厚貌蔽智之明深情怯剛之斷而已哉必使猜怨賢愚則嚬笑入戾耽愛犬馬則步顧成妖况動容竊斧束裝濫金又何足論也是以前王作典明慎議獄而僭濫易意朱公論璧光澤相如而倍薄異價此言雖大可以戒小遊道雖廣交義為長得在可久失在輕絶久由相敬絶由相狎愛之勿勞當扶其正性忠而勿侮必藏其枉情輔以藝業會以文辭使親不可褻疏不可間每存大德無挾小怨率此往也足以相終酒酌之設可樂而不可嗜嗜而非病者希病而遂眚者幾既眚既病將蔑其正若存其正性紓其妄發其唯善成乎聲樂之會可簡而不可違違而不背者鮮矣背而非弊者反矣既弊既背將受其殿必能通其礙而節其流意可為中和矣善施者唯發自人心乃出天則與不待積取無謀實並散千金誠不可能贍人之急雖乏必先使施如王丹受按本集作愛誤如杜林亦可與言交矣浮華怪飾滅質之具奇服麗食棄素之方動人勸慕傾人顧盼可以逺識奪難用近欲從若覩其淫怪知生之無心為見奇麗能致諸非務則不抑自貴不禁自止夫數相者必有之徴既聞之術人又驗之吾身理可得而論也人者兆氣二德稟體五常二德有奇偶五常有勝殺及其為人寧無協沴亦猶生有好醜死有夭夀人皆知其懸天至於丁年乖遇中身迂合者可易地哉是以君子遘命愈難識道愈堅古人恥以身為溪壑者屏欲之謂也欲者性之煩濁氣之蒿蒸故其為害則燻心智耗真精傷人和犯天性雖生必有之而生之德猶火含煙而妨火桂懷蠧而殘桂然則火勝則煙滅蠧壯則桂折故性明者欲簡嗜繁者氣惛去明即惛難以生矣是以中外羣聖建言所黜儒道衆智發論是除然有之者不患不深故藥之者恆苦術淺所以毁道多而於義寡矣夫嫌嗜之性不同故畏慕之情或異從事於人者無執人我之心不以己之所善謀人為有明矣不以人之所務失我能有守矣己所謂然而彼定不能奕棊之弊恱彼之可而忘我不可學嚬之弊將求去弊者念通性分按本集作怍介誤而已流言謗議有道所不免况在闕薄難用算防接應之方言必出已或信不素積嫌間所襲或信不和物尤怨所聚有一于此何處逃毁茍能反悔在我而無責於人必有達鑒昭其情逺識迹其事日省吾躬月料吾志寬默以居潔靜以期神道必在何恤人言唁曰富則盛貧則病矣貧之病也不唯形色粗黶或亦神心沮廢豈但交友疏棄必有家人誚讓非廉深識逺者何能不移其操故欲蠲憂患莫若懷古懷古之志當自同古人見通則憂淺意逺則怨浮昔人琴歌於編蓬之中者用此道也夫信不逆彰義必出隱交賴相盡明有相照一面見旨則情固邱嶽一言中志則意入淵泉以此事上水火可蹈以此託友金石可敝豈待充其榮實乃將議報厚之筐篚然後圖終如或與立茂思無忽祿利者受之易易則人之所榮蠶穡者就之艱艱則物之所鄙艱易既有勤倦之情榮鄙又開向背之意此二塗所為反也以勞定國以功施人則役徒屬而擅豐麗自埋於民自事其生則督妻子而趨耕織必使陵侮不作縣企不萌所謂賢鄙處宜華野同泰人以有惜為質非假嚴刑有恆為德不慕厚賞有惜者以理會有恆者與物終世有位去則情盡斯無惜矣又有務謝則心移斯不恆矣又非徒若此而已或見人休事則勤蘄結納及聞否論則處彰離二附會以從風隱竊以成釁朝吐面譽暮行背毁昔同稽欵今猶叛戾斯為甚矣又非若此而已或憑人惠訓藉人成立與人餘論依人揚聲曲存稟仰甘赴塵軌衰沒畏逺忌聞影迹又蒙蔽其善毁之無度心短彼能私樹己拙自崇恆輩罔顧高識有人至此實蠧大倫每思防避無通閭伍覩驚異之事或涉流傳遭卒迫之變反思安順若異從已發將尸謗人迫而又忤愈使失度能夷異如裴楷處逼如裴遐可稱深士乎喜怒者有性所不能無常起於褊量而止於宏識然喜過則不重怒過則不威能以恬漠為體寬愈為器者大喜蕩心微抑則定甚怒煩性小忍即歇動無愆容舉無失度則物將自懲人將自止習之所變亦大矣豈唯蒸性染身乃將移智易慮故曰與善人居如入芝蘭之室久而不知其芳與之化矣與不善人居如入鮑魚之肆久而不知其臭與之變矣是以古人慎所與處唯夫金貞玉粹者乃能盡而不汚爾故曰丹可滅而不能使無赤石可毁而不能使無堅茍無丹石之性必慎浸染之由能以懷道為人必存從理之心道可懷而理可從則不議貧議所樂爾或云貧何由樂此未求道意道者瞻富貴同貧賤固得而齊自我喪之未為通議茍議不喪夫何不樂或曰溫飽之貴所以榮生飢寒在躬空曰從道取諸其身將非篤論此又不通理用者也凡養生之具豈聞定實或以膏腴夭性有以菽藿登年中散云所足在內不由於外是以稱體而食貧歲愈歉量腹而炊豐家餘餐非粒實息耗意有盈虛爾况心得優劣身獲仁富明白入素氣志如神雖十旬九飯不能令飢歡席按本集作業席三屬不能為寒豈不信然且以已為度者無以自通彼量渾四極而斡五緯天道宏也振河海而載山川地道厚也一情紀而合流貫人靈茂也昔之通乎此數者不為剖判之行必廣其風度無挾私殊博其交道靡懷曲異故望塵請友則義士輕身一遇拜親則仁人投分此倫序通允禮俗平一上獲其用下得其和世務雖移前休未逺人之適主吾將反本夫人之生暫有心識幼壯驟過衰耗騖及其間夭鬱既難勝言假獲存遂又云無幾柔麗之身亟委土木剛清之才遽為邱壤回遑顧慕惟數紀之中爾以此持榮曾不可留以此服道亦何能久進退我生遊觀所達得貴為人將在含理含理之貴惟神與交幸有心靈義無自惡偶信天德逝不上慙欲使人沉來化志符往哲勿謂是賒日繄斯密若通此意吾將忘老如曰不然其誰與歸偶懷所撰述略布衆條若備舉情見顧未畫一贍身之經别在田家節政奉終之紀自著燕居畢義劉禹錫名子説字夢得中山人唐夔州刺史名二子説又留海曹師等詩魏司空王昶名子制誼咸得立身之要前史是之然則書紳銘器孰若發言必稱之乎今余名爾長子曰允字信臣次曰廙字敬臣欲爾於人無賢愚於事無大小咸推以信同施以敬俾物從而衆説其庶幾乎夫忠孝之於人如食與衣不可斯須離也豈俟余勗哉仁義道德非訓所及可勉而企者故存乎名夫朋友字之非吾職也顧名旨所在遂從而釋乎夫孝始於事親終於事君偕曰臣之終也萬物有醜好各各一姿分唯人即不爾學與不學論學非探其花要自發其根孝友與誠實而不忘邇言根本既深實柯葉自滋繁念爾無忽此期以慶吾門魏收枕中篇字伯起巨鹿人北齊史官以子姪少年申以戒厲著枕中篇云吾曾覽管子之書其言曰任之重者莫如身途之畏者莫如口期之逺者莫如年以重任行畏途至逺期惟君子為能及矣追而味之喟然長息若夫嶽立為重有潛戴而不傾山藏稱固亦趨負而弗停吕梁獨浚能行歌而匪惕焦原作險或躋踵按北史作削踵而不驚九陔方集故眇然而迅舉五紀當定想窅乎而上征茍任重也有度則任之而愈固乘危也有術蓋乘之而靡恤彼期逺而能通果應之而可必豈神理之獨爾亦人事其如一嗚乎處天壤之間勞死生之地攻之以嗜欲牽之以名利梁肉不期而共臻珠玉無足而俱致於是乎驕奢仍作危亡旋至然則上知大賢唯幾唯哲或處或出不常其節其舒也濟世成務其卷也聲銷迹滅玉帛子女椒蘭律吕諂諛無所先稱肉度骨膏唇挑舌怨惡莫之前勳名共山河同久志業於金石比堅斯蓋厚棟不撓遊刃砉然逮於厥德不常喪其金璞馳騖人世鼓動流俗挾湯日而謂寒包溪壑而未足源不清而流濁表不端而影曲嗟乎膠漆詎堅寒暑甚促反利而成害化榮而就辱欣戚更來得喪仍續至有身禦魑魅魂沉狴獄詎非足力不強迷在當局孰可謂車戒前傾人師先覺聞諸君子雅道之士遊遨經術厭飫文史筆有奇鋒談有勝理孝弟之至神明通矣審道而行量路而止自我及物先人後己情無繫於榮悴心靡滯於慍喜不養望於邱壑不待價於城市言行相顧慎終猶始有一於斯鬱為羽儀恪居展事知無不為或左或右則髦士攸宜無悔無吝故高而不危異乎勇進忘退茍得患失射千金之産邀萬鍾之秩投烈風之門趣炎火之室載蹶而墜其貽燕或蹲乃喪其貞吉可不畏歟可不戒歟門有倚禍事不可不密牆有伏寇言不可而失宜諦其言宜端其行言之不善行之不正鬼執強梁人囚徑廷按徑廷北史作徑挺均不可解疑為徑挺之訛幽奪其魄明夭其命不服非法不行非道公鼎為己信私玉非身寶過涅為紺踰藍作青持繩視直置水觀平時然後取未若無欲知止知足庶免於辱是以為必察其幾舉必慎於微知幾慮微斯亡則稀既察且慎福祿攸歸昔蘧瑗識四十九非顔子鄰幾三月不違跬步無已至於千里覆簣而進及於萬仞故云行逺自卑可大可久與世推移月滿如規後夜則虧槿榮於枝望暮而萎夫奚益而非損孰有損而不害益不欲多利不欲大唯居德者畏其甚體真者懼其大道尊則羣謗集任重而衆怨會其達也則尼父栖遑其忠也而周公狼狽無曰人之我挾在家不可而覆無曰人之我厚在我不可而咎如山之大無不有也如谷之虛無不受也能剛能柔重可負也能信能順險可走也能知能愚期可久也周廟之人三緘其口漏巵在前欹器留後俾諸來裔傳之坐右中樞龜鏡蘇瓌字昌容雍州人唐中宗宰相以子頲有宰相器暇日逡巡舉二十七事豫戒之及頲相密以示宋璟請號中樞龜鏡云宰相者上佐天子下理隂陽萬物之司命居司命之位茍不以道應命翺翔自處上則阻天地之交泰中則絶性命之至理下則阻生物之阜植茍安一日是稽隂誅况久之乎臨大事斷大議正道以當之若不能即速退中樞之地非偷安之所平心以應物無生妄慮似覺非正則速回之使久而不失正也敷奏宜直勿婉應對無常速機可以回小事沉機可以成大計同列之間隨器以應之則彼自容矣容則自峻其道以示之無令庸者其來凂我也賢者親而狎之無過狎而失敬則事無不舉矣舉一官一職一將一帥須其材德者聽衆議以命之公是非即無爽矣人不可盡賢盡愚汝惟器之與正人言則其道堅實而不渝材人可以責成辦事辦事不可與議與之議則失根本歸權道也審姦吏辭煩而忘親者去之崇儒則篤敬侈靡之風不作不作則平和平和則自臻理道矣刺史縣令久次以居之不能者立除之無姦柄施恩交馳道路既失為官之意受弊者隨之矣欲庶而富在乎久安不教而戰是謂棄之佐理在乎謹守制度俾邊將嚴兵修斥堠使封疆不侵不必務廣徒費中國事無益也古者用刑輕中重之三典各有攸處方今為政之道在乎中典謹而守之無為人之所二無請數赦以開幸門勿畏強禦而損制度教令少而確守之則民情膠固矣毋太剛以臨人事慮不盡臣不密則失身非所議者勿與之言勤思慮不以小事而忽機管財無多蓄計有三年之用外散之親族多蓄甚害義令人心不寧不寧則理事不當矣清身檢下無使邪隙微開而貨流於外矣逺妻族無使揚私於外仍須先自戒謹檢子弟無令開戶牖毋以親屬撓有司一挾私則無以提綱在上矣子弟壻居官隨器自任調之勿過其器而居人之右子弟車馬服用無令越衆則保家則能治國居第在乎潔不在華無令稍過以荒厥心
