body:
  text: 戒子通録卷六宋劉清之撰家戒黄太史庭堅字魯直豫章人元祐史官紹聖中作家戒付子相庭堅自丱角讀書及有知識迄今四十年時態歴觀諦見潤屋封君巨姓豪右衣冠世族金珠滿堂不數年間復過之特見廢田不耕空囷不給又數年復見之有縲紲於公庭者有荷擔而倦於行路者問之曰君家曩時蕃衍盛大何貧賤如是之速耶有應於予曰嗟乎吾高祖起自憂勤噍類數口叔兄慈惠弟姪恭順為人子者告其母曰無以小財為爭無以小事為讎使我兄叔之和也為人夫者告其妻曰無以猜忌為心無以有無為懷使我弟姪之和也於是共巵而食共堂而燕共庫而泉共廩而粟寒而衣其幣同也出而遊其車同也下奉以義上謙以仁衆母如一母衆兒如一兒無爾我之辨無多寡之嫌無私貪之欲無横費之財倉箱共目而歛之金帛共力而収之故官私皆治富貴兩崇逮其子孫蕃息妯娌衆多内言多忌人我意殊禮義消衰詩書罕聞人面狼心星分𤓰剖處私室則包羞自食遇識者則強曰同宗父無争子而陷於不義夫無賢婦而陷於不仁所志者小而所失者大至於危坐孤立患害不相維持此其所以速於苦也庭堅聞而泣曰家之不齊遂至如是之甚可誌此以為吾族之鑑因為常語以勸焉吾子其聽否昔先猷以子弟喻芝蘭玉幹生於階庭者欲其質之美也又謂之龍駒鴻鵠者欲其才之俊也質既美矣光耀我族才既俊矣榮顯我家豈有偷取自安而忘家族之庇乎漢有兄弟焉将别也庭木為之枯将合也庭木為之榮則人心之所叶者神靈之所祐也晉有叔姪焉無間者為南阮之富好異者為北阮之貧則人意之所和者隂陽之所贊也大唐之間義族尤盛張氏九世同居至天子訪焉賜帛以為慶高氏七世不分朝廷嘉之以族閭為表李氏子孫百餘衆服食器用童僕無所異黄巢禄山大盜横行天下殘滅人家獨不劫李氏云不犯義門也此見孝慈之盛外侮所不能欺雖然皆古人陳迹而已吾子不可謂今世無其人德安王兵部義聚百年至五世諸母新寡弟姪謀析財而與之俾營别居諸母曰吾之子幼未有知識吾所倚頼猶子伯伯叔叔也不願他業待吾子得訓經意知禮數足矣其後姪子官至兵部侍郎諸母授金冠章帔人皆曰諸母豈先知乎有助耶鄂之咸寧有陳子高者有腴田五千其兄田止一千子高愛其兄之賢願合户而同之人曰以五千膏腴就貧兄不亦卑乎子高曰我一房爾何用五千人生飽暖之外骨肉交歡而已其後兄子登第仕至大中大夫舉家受䕃人始曰子高心地吉乃預知兄弟之榮也然此亦人之所易為也吾子欲知其難者願悉以告昔鄧攸遭危厄之時負其子姪而逃之度不兩全則託子於人而寧抱其姪也李充在貧困之際昆季無資其妻求異遂棄其妻曰無傷我同胞之恩人之遭貧遇害尚能為此况處富盛乎然此予聞見之逺者恐未可以言人又當告以耳目之尤近者吾族居雙井四世矣未聞公家之追負私用之不給泉粟盈儲金朱繼榮大抵禮義之所積無分異之費也其後婦言是聽人心不堅無勝己之交信小人之黨骨肉不顧酒胾是從乃至茍營自私偷取目前之逸恣縱口體而忘逺大之訃居湖坊者不二世而絶居東陽者不二世而貧其或天歟亦人之不幸歟吾子力道問學執書冊以見古人之遺訓觀時利害無待老夫之言矣於古人氣槩風味豈特髣髴耶願以吾言敷而告之吾族敦睦當自吾子起若夫子孫榮昌世繼無窮之美則吾言豈小補哉誌之曰家戒時紹聖元年八月日書家庭談訓梁况之燾須城人元祐執政士人修性正在臨事時悅意之喜忿急之怒皆修性着力時唯忍以自勝使不失中和為貴益之曰喜怒之言勿出諸口造次顚沛勿忘於恕又曰子弟沉黙緩畏毋戱物妄笑遇物和而有容語言舉止務淹雅凝重喜怒不形於色然後可以為佳士唐子滂字惠潤作孝義篇人性茍有一孝則無所不包猶樹根一固而百枝生焉鷹隼羣飛鳳凰逺逝小人成列君子深藏聖人聞諫若味甘愚者得諫若食荼君子不以昏行易操不以夜寐易容皇考戒柳開字仲塗國初崇儀使其皇考治家孝且嚴旦望弟婦等拜堂下畢即上手低面聽戒云云退則惴惴不敢出一語為不孝事開輩頼之得全其家也案宋史柳聞大名人作家戒千餘言人之家兄弟無不義盡因娶婦入門異姓相聚爭長競短漸漬日聞偏愛私藏以至背戾分門割户患若賊讎皆汝婦人所作男子有剛腸者幾人能不為婦人言所役吾見多也若等寧見乎示子詩王禹偁字元之至道翰林學士觀種黍蔬食二詩示子嘉祐案禹偁鉅野人觀種黍云北鄰有閑園瓦礫雜荆杞未嘗動耕牛但見牧羣豕今夏赤旱天斵琢誰家子播種甚莽鹵苖稼安能起秋來連月雨柴門書不啓新晴一携杖出户聊徙倚重到田中立黍稷何薿薿吐穗欲及肩鳥雀亦深喜力穡乃有秋斯言不虛矣向使嬾種植荒榛殊未巳有書閑不讀為學還如此蔬食云吾為士大夫汝為𨽻子弟身未列冠裳庶人亦何異無故不食珍禮文明所記况非膏粱家左宦乏貲費商山水復旱糓價方騰貴更恐到前春藜藿亦不繼吾聞栁公綽近代居貴位每逄水旱年所食唯一器豐稔即加籩列鼎又何媿且吾官冗散適為時所棄汝家本寒賤自昔無生計菜茹各須甘努力度凶嵗張太史耒字文潛宛邱人元祐史官序云北鄰賣餅兒毎五鼔未旦即遶街呼賣雖大寒烈風不廢而時刻不少差也有所警示鉅城頭月落霜如雪樓頭五更聲欲絶捧盤出户歌一聲市樓東西人未行北風吹衣射我餅不憂衣單憂餅冷業無高卑志當堅男兒有求安得閑戒子孫賈文元昌朝字子明真定人慶歴宰相今誨汝等居家孝事君忠與人謙和臨下慈愛衆中語渉朝政得失人事短長慎勿容易開口仕宦之法清㢘為最聽訟務在詳審用法必求寛恕追呼决訊不可不慎吾少時見里巷中有一子弟被官司呼召證人詈語其家父母妻子見吏持牒至門涕泗不食至暮放還乃已是知當官涖事凡小小追訊猶使人恐懼若此况刑戮所加一有濫謬傷和氣損隂德莫甚焉傳曰上失其道民散久矣如得其情則哀矜而勿喜此聖人深訓當書紳而志之吾見近世以苛剥為才以守法奉公為不才以激訐為能以寡辭慎重為不能遂使後生輩當官治事必尚苛暴開口發言必高詆訾市怨賈禍莫大於此用是得進者則有之矣能善終其身慶及其後者未之聞也復有喜怒愛惡專任己意愛之者變黑為白又欲置之於青雲惡之者以是為非又欲擠之於溝壑遂使小人奔走結附避毁就譽或為朋援或為鷹犬茍得禄利略無媿耻吁可駭哉吾願汝等不厠其間又見時人肆胷臆事頰舌舉止軒昻出繩檢之外而觀其行實徃徃無取大抵古人重厚朴直乃能立功立事享悠久之福其以軒昻而得者累過積非即成禍敗是以君子居不欺乎暗屋出不踐乎邪徑外訥於言而内敏於行然後身立而名著矣又見好奢侈者服玩必華飲食必珍非有高貲厚禄則必巧為計畫規取貨利勉稱其所欲一旦以貪汚獲罪取終身之耻其可捄哉又見士人之家叔姪昆弟茍有過失不務交相規正於内而乃互為謗毁於外詳究其因止於争官職競貨財而已夫以榮利之薄而亡親戚之厚兹名教罪人也且士人所貴節行為大軒冕失之有時而復來節行失之終身不可得矣戒之謹之吾暇日未嘗不以經籍道義教誨汝等冀免斯咎吾年六十二諸子若孫凡二十餘人矣不覬汝等紹吾爵位但能守素業使門户不辱吾之幸也戒子弟黄太史案此條亦係庭堅語似當附在前家戒之後吉蠲筆墨如澡身浴德揩拭几硏如改過遷善敗筆涴墨瘝子弟職書几書研自黥其面惟弟惟子臨深戰戰關澮字聖功錢塘人政和中書壁以戒其子弟吕居仁稱之樂道人之善惡稱人之惡范文正仲淹字希文蘇州人慶歴參知政事告諸子於是恩例俸賜常均於人并置義田宅云吾貧時與汝母養吾親汝母躬執爨而吾親甘㫖未嘗充也今而得厚禄欲以養親親不在矣汝母已早世吾所最恨者忍令若曹享富貴之樂也吳中宗族甚衆於吾固有親踈然以吾祖宗視之則均是子孫固無親踈也茍祖宗之意無親踈則飢寒者吾安得不卹也自祖宗來積徳百餘年而始發於吾得至大官若獨享富貴而不卹宗族異日何以見祖宗於地下今何顔以入家廟乎京師交遊慎於高議不同常言之地案文集作不同當言責之地且温習文字時聞召試清心潔行以自樹立平生之稱當見大節不必竊論曲直取小名招大悔矣與直講三哥京師少徃還凡見利處便須思患老夫屢經風波惟能忍窮故得免禍案文集此條與宅眷賢弟書大參到任必受知也惟勤學奉公勿憂前路慎勿作書求人薦㧞但自充實為妙案文集此條與集賢學士書惟慎勿作書云云集作慎無好書札有文性勿小其志也将就大對誠吾道之風采宜謙下兢畏以副士望與賢良青春何苦多病豈不以攝生為意耶門才起立宗族未受賜有文學稱亦未為國家用豈肯循常人之情輕其身汨其志哉與提㸃集案以上二條今本文尺牘中未載賢弟請寛心将息雖清貧但身安為重家間苦淡士之常也省去冗口可矣請多著工夫看道書見壽而康者問其所以則有所得矣案文集此條書中亦但稱賢弟汝守官處小心不得欺事與同官和睦多禮有事只與同官議莫與公人商量莫縱鄉親來部下興販自家且一向清心做官莫營私利汝看老叔自來如何還曾營私否自家好家門各為好事以光祖宗案文集此條與監簿書戒子弟言范忠宣純仁字堯夫蘇州人建中靖國丞相人雖至愚責人則明雖有聰明恕己則昏爾但常以責人之心責己恕己之心恕人不患不到聖賢地位也鄒忠公浩字志完常州人元符諫臣子柄冠為此文其略云合抱之木生於毫末之細九層之臺起於累土之卑汝其尊六經以為本博羣籍以為枝可取者友可奉者師孝弟忠順之端篤誠充擴而弗移俾人曰幸哉有子如此豈可不自於斯時乎汝其勉之汝其勉之胡文定安國字康侯建安人紹興從臣與子寅書今略取十二事上殿劄子推得元意廣大得敷奏之體更趨簡約為妙詞命貴無長語紀作用貫處密進人才所補者大契舊之間固無彼此然必毎事盡誠告之使善出於彼吾無與焉則為善矣誠實無私曲説得來自别聽者亦須感動出身事主不以家事辭王事為人臣無以有己吾說如此更以大義裁斷之臣之事君猶子之事父以忠信為本公事私事一切苦參着意經理須以誠意說與屬官須要知此着意經營公使庫待賔並以五盞為率自足展盡情意禁姦吏必止其邪心不徒革面為政必以風化德禮為先風化必以至誠為本民訟旣簡每日可着一時工夫詳與理㑹因訓道之使趨於善且以風動左右不無益也立志以明道希文自期待立心以忠信不欺為主本行己以端荘清慎見操執臨事以明敏果斷辨是非又謹三尺攷求立法之意而操縱之斯可為政不在人後矣汝勉之哉治心修身以飲食男女為切要從古聖賢自這裏做工夫其可忽乎君實見趣本不甚高為他廣讀書史苦學篤信清儉之事而謹守之人十已百至老不倦故得志而行亦做七分已上人若李文靖澹然無欲王沂公儼然不動資禀旣如此又濟之以學故是八九分地位也後人皆不能及並可師法汝在郡當一日勤如一日深求所以牧民共理之意勉思其未至不可忽也若不事事别有覬望聲績一塌了更整頓不得宜深自警省思逺大之業送終禮高司業閌字抑崇明州人紹興從臣作送終禮三十二篇此篇戒子吾家他日如營居室必先家廟其餘堂寝之制僅可以叙族合宗吾百嵗之後惟嫡子孫相繼居之衆子别營居焉蓋嫡庶之禮明而人自知分矣古者父子異宫兄弟異居但同財耳故䘮服傳曰昆弟之義無分然而有分者則避子之私也子不私其父則不成為子故有東宫有西宫有南宫有北宫異居而同財有餘則歸之宗不足則資之宗今人不知古人異居之意而乃分析其居更異財焉不亦誤乎且析居之法但取均平以止争端而無嫡庶之辨此作律者之失也夫喪不慮居為無廟也若兄弟探籌以析居則廟無定主矣而律復有婦承夫分女承父分之條萬一婦人探籌而得之則家廟遂無主祀也而可乎惟我子孫其遵吾家法庶幾他日漸復宗子之禮不待譜牒而人各知其本支所自如好禮者亦效吾家而行之雖措之天下可也教子語家頥字養正眉山人凡有十章人生至樂無如讀書至要無如教子父子之間不可溺於小慈自小律之以威繩之以禮則長無不肖之悔教子有五𨗳其性廣其志養其才鼓其氣攻其病廢一不可養子弟如養芝蘭既積學以培植之又積善以滋潤之人家子弟惟可使覿徳不可使覿利富者之教子須是重道貧者之教子須是守節子弟之賢不肖係諸人其貧富貴賤係之天世人不憂其在人者而憂其在天者豈非誤耶士之所行不溷流俗一以抗節於時一以詒訓於後士人家切勤教子弟勿令詩書味短孟子以惰其四支為一不孝為人子孫游惰而不知學安得不愧示子辭何耕字道夫蜀之廣漢人終祕書少監號恬菴學業在我富貴在時在我者不可不勉在時者靜以俟之䟽瀹乎六藝之源游泳乎諸史之涯泛窺於百家之說而旁獵於前輩大老之文辭廣聞見於益友質是非於名師以文采論議為華以孝友謙慈為基識欲逺而不欲近志欲高而不欲卑若是則其逹也必能卓然有立以示百僚之準式其窮也亦将介然自重以為一鄉之表儀茍惟不然是林林而生泯泯而死者耳尚何以名男子為哉童䝉訓吕舍人本中字居仁東萊人紹興從臣訓其子姪今略取之案本中宰相許國公夷簡之元孫申國公諡正獻公著之曾孫滎陽公希哲之孫東萊郡侯好問之子本中徃年每侍前輩先生長者論當世邪正善惡是是非非無不精盡至於前輩行事得失文字工拙後生敢略議及之者必作色痛裁折之曰先儒得失前輩是非豈後生所知楊十七學士應之兄弟晁丈以道持此規矩最嚴故凡後生嘗親近此諸老者皆有敦厚之風無浮薄之過前輩士大夫專以風節為己任其於褒貶取予甚嚴故其所立實有過人者夏侯旄節夫京師人年長本中以倍本中猶及與之交崇寧初任諸州教授學制既頒即日尋醫去後任西京幕官罷任當改官以舉将一人安惇也不肯用卒不改官浮湛京師至死不屈唐文名恕字處厚崇寧初任荆南知縣新法旣行即致仕不出者幾三十年范正平子夷忠宣公之子忠宣當國子夷是時官當入逺不肯用父恩例卒授逺地皆卓然自立不媿古人矣東萊公嘗言凡衆人日夕所說之話如趙丈仲長諸公都無此話也衆人所作之事如楊公應之李公君行諸公都不做衆人做底事也唐充之廣仁每稱前輩說後生聞人宻論不能容受而輕泄之者不足以為人李公公擇每令子婦諸女侍側為說孟子大義滎陽公嘗言後生初學且須理㑹氣象氣象好時百事自當氣象者辭令容止輕重疾徐足以見之矣不惟君子小人於此焉分亦貴賤壽夭之所由定也紹聖初滎陽公罷經筵舍於京城外華嚴寺俟命者月餘陳無己師道􅄯伯宇載之唐季實之問皆就見公為公留月餘執事左右如親子弟晨夕皆揖於寢門之外後人能如此尊事前輩蓋少矣崇寧初滎陽公謫居符離趙丈仲長演公之長壻也時時自汝隂來省公公之外弟楊公瓌寳亦以上書謫監符離酒稅楊公事公如親兄趙丈事公如嚴父兩人日久在公側公疾病趙丈執藥床下屏氣問疾未嘗不移時也公命之去然後去楊公慷慨獨立於當世未嘗少屈趙丈謹厚篤實動法古人兩人皆一時之英也饒德操節黎介然確汪信民革時皆在符離每疾病少間則必來見公而退從楊公趙丈及公子孫游焉亦一時之盛也趙丈每與公子弟及外賔客語及作書帖之類但稱滎陽公曰公其尊之如此楊公與他人語稱滎陽但曰内兄或曰侍講未嘗敢字稱也蓋滎陽公中表惟楊氏兄弟盡事親長之道可為後生之法滎陽公為郡處令公帑多畜鰒魚諸乾物及筍乾蕈乾以待賔客以减雞鴨等生命也李君行先生年二十餘時見安退處士劉師正解春秋甚愛之後於楚州聚學劉問何故留此君行曰吾父母戒我令不登科勿歸我以朞䘮不得就試故留此聚徒以待後舉劉曰不然難得而易失者事親之日也豈可以爵禄故久去親側如此君行聞之即徑歸侍外高祖侍郎晉陽王公諱子融嘗編京師世家家法善者以遺子孫録出之以自警戒亦樂取諸人以為善之義也京師曹氏諸貴族卑幼不見尊長三日必拜劉器之論當時人物多云弱實中世人之病大抵承平之久人皆偷安畏死避事因循茍且而致然耳紹聖崇寧間諸公遷貶相繼然徃徃能自處不甚介意龔彦和夬貶化州徒歩徑徃以扇乞錢不以為難也張才叔庭堅貶象州所居屋才一架上漏下濕屋中間以箔隔之家人處箔内才叔躡屐端坐於箔外日看佛書了無厭色凡此諸公皆平昔絶無富貴念故遇事自然如此使世念不忘富貴之心尚在遇事艱難縱欲堅忍亦必有不懌之容勉强之色矣鄒志完侍郎嘗稱才叔云是天地間和氣薰蒸所成欲徃相近先覺和氣襲人也滎陽公嘗榜文中子數語於家中壁上云子之室酒不絶注云用有節禮不闕也范子夷嘗言其家學不卑小官居一官便思盡心治一官之事只此便是學聖人也若以為州縣之職徒勞人爾非所以學聖人也子夷說其祖作外任官時京中人書言居京愼勿竊論曲直不同任言官時取小名受大禍因言吾徒相見正當論行己立身之事耳又說仲尼聖人也才作陪臣顔子大賢也簞食瓢飲後之不及孔子顔子逺矣而常嘆仕宦不逹何愚之甚若能以自己官爵比孔顔僥倖之甚矣又說凡人為事須是由𠂻方可若矯飾為之恐不免有變時任誠而已雖時有失亦不覆藏使人不知但能改之而已陳瑩中說立人之朝能捨生取義始可然此事須是學問有功方始做得從容又說學者非特習於誦數發於文章而已将以學古人之所為也自荆公之學興此道壊矣又説凡欲解經必先反諸其身又思措之天下反諸其身而安措之天下而可行然後為之說焉縱未能盡聖人之心亦庶幾矣若不如是雖辭辨通暢亦未免乎鑿也今有語人曰冬日飲水夏日飲湯何也冬日隂在外陽在内陽在内則内熱故令人思水夏日陽在外隂在内隂在内則内寒故令人思湯雖甚辨者不能破其說也然反諸其身而不安也措之天下而不可行也嗚呼學者能如是用心豈曰小補之哉滎陽公言吾㓜學之年侍親於東潁時邦人王回深甫常秩夢臣皆為先公所重常先生深居靜黙罕與人交召之多不至王先生每與先公及歐陽公侍讀劉公原父朝夕講論故有聚星之說焉滎陽公言焦伯强先生嘗言荘敬日强安肆日偷故君子當自强不息以之容貎禮際其接人也不敢不敬不敢少懈也况君親乎况長上乎况賢於我者乎茍不能自强則怠惰之心入矣非惟失義也禍且及焉滎陽公元祐末嘗與子弟書云予生五十二嵗矣欲極富貴之樂事窮山水之勝遊豈惟心力已有所不逮於殘年晩日鋪排亦不能矣若汲汲為善則亦未晚要無虛日云爾滎陽公嘗言伯祖行父嘗題於壁云但畏賢者之議論不顧小人之是非治平中李公公擇數謂朋友言吕蔡州未嘗聞其疾聲見其遽色亦未嘗草書學者當師慕之吕蔡州謂正獻公也正獻公簡重清靜出於天性冬月不附火夏月不用扇聲色華耀視之漠然也范公淳夫實公之壻性酷似公後滎陽公長壻趙丈仲長嚴重有法亦實似公焉正獻公教子既有法而申國魯夫人簡肅公諱宗道之女閨門之内舉動皆有法則滎陽公年十嵗夫人命對正獻公則不得坐命之坐則坐不問不得對諸子出入不得入酒肆茶肆每諸婦侍立諸女少者則從婦傍正獻公年三十餘通判頴州已有重名范文正公以資政殿學士知青州過頴來復謁公呼公謂之曰太博近朱者赤近墨者黑歐陽永叔在此太博宜頻近筆研申國大夫在㕔事後聞其言嘗語以教滎陽公焉前輩規勸懇切出於至誠類如此滎陽公張夫人待制諱昷之之女也自少每事有法亦魯肅簡公外孫也張公性嚴毅不屈全類肅簡肅簡深愛之家事一委張公夫人張公㓜女最鍾愛然居常至㣲細事教之必有法度如飲食之類飯羮許更益魚肉不更進也時張公已為待制河北都轉運使矣及夫人嫁吕氏夫人之母申國夫人姉也一日來視女見舎後有鍋釡之類大不樂謂申國夫人曰豈可使小兒輩私作飲食壊家法耶叔父舜從既與東萊公從當世賢士大夫游常訓子弟曰某幸得從賢士大夫游然過相推重某自省所為才免禽獸之行而已未能便合人之理也何得士大夫相過與也因思前輩自警修省如此正獻公交游某不能盡知之其顯者范蜀公司馬温公王荆公劉侍讀原甫也滎陽交游則二程二張孫莘老李公擇王正仲顧子敦楊應之范淳夫也東萊公交游則李君行田明之田誠伯吳坦求陳端誠田誠君陳瑩中張才叔龔彦和及其弟之任也近世故家惟晁氏因以道申戒子弟皆有法度羣居相呼外姓尊必曰某姓第幾叔若兄諸姑尊姑之夫必曰某姓姑夫某姓尊姑夫未嘗敢呼字也其言父黨交游必曰某姓幾丈亦未嘗敢呼字也當時故家舊族皆不能若是陳瑩中與關止叔沼與滎陽公書問其言前輩與公之交游必平闕書云某公某官如稱器之則曰待制劉公之類其與己同等則必斥姓名示不敢尊也如游酢謝良佐云此皆可以為後生法後生學問且須理㑹曲禮少儀禮儀等學洒掃應對進退之事及先理㑹爾雅訓詁等文字然後可以語上下學而上逹自此脫然有得自然度越諸子也不如此則是躐等犯分陵節終不能成孰先傳焉孰後倦焉不可不察也李君行先生自䖍州入京至泗州止其子弟請先徃君行問其故曰科場近欲先至京師貫開封户籍取應君行不許曰汝䖍州人而貫開封户籍欲求事君而先欺君可乎寧遲緩數年不可行也正獻公㓜時未嘗博戲人或問其故公曰取之傷亷與之傷義滎陽公嘗言少時與叔祖同見歐陽文忠公至客次與叔祖商議見歐陽公叙契分求納拜之語及見歐陽既叙契分即端立受敬如當子姪之禮公退而謂叔祖曰觀歐陽公禮數知吾輩不及前輩逺矣本中嘗問滎陽公曰兄弟之生相去或數日或數十日其為尊卑也微矣而聖人直如是分别長㓜何也公曰不特聖人直是重先後之序如天之四時分毫頃刻皆有次序此是物理自然不可易也古人自奉簡約類非後人所能及如飲食髙下故自有制度諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕此猶是極盛時制度也大抵古人得食肉者至少如食肉之禄氷皆與焉肉食者謀之肉食者無墨此言貴者方得肉食也荘子九方歅相子祺之子刖而鬻之於齊適當渠公之街然身食肉而終相班超者曰虎頭燕頷食肉相也以此知古人以食肉為貴食肉為難得比之後人簡約甚矣薰陶漸染之功與講究持論互相發明者也要之薰陶之益過於講究知此理者方可以語學矣今日記一事明日記一事久則自然貫穿今日辨一理明日辨一理久則自然浹洽今日行一難事明日行一難事久則自然堅固渙然氷釋怡然理順久自得之非偶然也學問工夫全在浹洽涵養藴畜之久左右采擇一旦氷釋理順自然逄原矣非如世人强襲取之揠苖助長苦心極力卒無所得也前輩常教少年毋輕議人毋輕說事惟退而自修可也學記曰㓜者聽而弗問皆使人自修不敢輕發養成德器也鄢陵之戰范匄趨進曰塞井夷竈陳於軍中而䟽行首晉楚唯天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉鄭侵蔡有功鄭人皆喜唯子産不順曰小國無文徳而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣子國怒之曰爾何知國有大命而有正卿童子言焉将為戮矣范宣子子産之言皆切論也而文子子國深抑之如此者正恐後生輕發未成德器而先招旤敗卒無以立也故此兩人後來所立如此之逺良由老成教之有素中有所主也前輩嘗說後生才性過人者不足畏惟讀書尋思推究者為可畏耳又云讀書只怕尋思蓋義理精深惟尋思用意為可以得之鹵莽厭煩者决無有成之理論語温故而知新先儒以為温尋也尋繹故者又知新者學而不思則罔先儒以為學不尋思其義則罔然無所得尋繹尋思就先儒分上所得已多况真能尋繹尋思者乎君子氣象難遽形容惟平易安和者為近之書曰其心休休焉其如有容此近君子氣象也所謂休休者平易安和無急躁狼戾貪冒之意也范宣子譲其下皆譲傳稱之曰一人刑善百姓休和鄭未服晉知武子曰若能休和逺人将至休和二字最是無急躁忿戾貪冒處故古人數稱之亦切論也朝廷有伉直之風然後臨難有死節之士五代之際能以端謹厚重不忌嫉人不為中傷不為傾陷已是極至若責仗節死難則猶闕焉曹彬在朝忠厚寛和足師表一世然史家稱其未嘗抗辭忤㫖此乃為大臣功名之極勢須如此然未可以為事君之法五代之際所以無死節之士良由以此為是事君之法當如宋璟顔真卿蕭復乃是極至人主必欲有益於國則當何用亦曰當用伉直之士緩急有益於己者爾不然累千人緩急之際各自為計亦何用哉然則伉直之風亦在人主奨進之爾此是為國者切己利害也唐太宗固知之矣勢位使人徃徃不能自知如氣血之盛詞色舉動悉與常人不同而亦不自知也醉酒者天地易位服藥者喜怒不定酒消藥散則復如常君子思所以自養不可不察也滎陽公嘗問邵康節先生亦讀佛書否康節曰人病舍其田芸人之田汪信民常言人常咬得菜根則百事可做胡安國康侯聞之擊節嘆賞滎陽公在京師舊第時諸位子姪常召來自教之書使日有程課晁以道自言少時毎自嫌以門䕃得官以為不由進士仕進者如流外雜色非真是作官也後旣登第始與李六丈德叟游德叟薄進士得官却如某以前薄門䕃時也自此始知登科不足為美其後遍親師友粗有立者皆出李六丈德叟激發所致德叟名秉彛公擇弟子商老之父也晁以道篤於親戚故舊有牽聯之親一日之雅皆委曲敦叙後生聞而化者甚衆以道盛文肅家外甥洪炎玉父祖母文城君亦盛氏甥以道於玉父為尊行一日同㑹京師玉父未及見以道邂逅僧寺中玉父謂以道曰公丈行也前此未得一見以道遽折之曰某自是公表叔何丈行之有玉父再三謝之曰是表叔但某未曾敢叙致爾以此知游學之士須經中原先逹鈐椎方能有成也吕進伯為河北運判黄魯直為北京教官託魯直為請門客數日斥去之召魯直謂曰此人豈可為人師某至學院却見與小子對坐如此豈可為人師請魯直别請一門客魯直為之遴選且嚴戒之曰吕運判行古禮賢且加慎既數日又逐去魯直問所以進伯云此人尤甚却聞呼小子字豈可為人師耶吕汲公家法至嚴進伯汲公兄也汲公夫人每見進伯必拜於庭下汲公既相進伯徃見之夫人令兩獲扶下階而拜進伯不樂曰宰相夫人尊重不必拜汲公甚懼遽令兩獲勿扶夫人劉羲仲壯輿云尋常人各有自然輩行不以年齒貴賤如劉原父與申公便自是兄弟行貢父便是父子行也當官之法唯有三事曰清曰慎曰勤知此三者則知所以持身矣知此三者可以保禄位可以逺耻辱可以得上之知可以得下之援然世之仕者臨財當事不能自克常自以為不必敗持不必敗之意則無所不為矣然事常至放敗而不能自已故設心處事戒之在初不可不察借使役用權智百端補治幸而得免所損己多不若初不為之為愈也司馬子微坐忘論云與其巧持於末孰若拙戒於初此天下之要言處當官之大法用力簡而見功多無如此言者人能思之豈復有悔吝耶事君如事親事官長如事兄與同僚如家人待羣吏如奴僕愛百姓如妻子處官事如家事然後為能盡吾之心如有毫末不至皆吾心有所未盡也故事親孝故忠可移於君居家理故治可移於官豈有二理哉當官處事常思有以及人如科率之行既不能免便就其間求所以使民省力不使重為民害其益多矣不與人爭者常得利多退一歩者常進百歩取之亷者得之常過其初約於今者必有垂報於後不可不思也惟不能少自忍者必敗此實未知利害之分賢愚之别也予常為泰州獄掾顔岐夷仲以書勸予治獄次第每一事冩一幅如夏月取罪人早間在西廊晩間在東廊案西廊東廊當互易始與避日色合以辟日色之類又如獄中遣人勾追之類必使之畢此事不可更别遣人恐其受賂已足不肯畢事也又如監司郡守嚴刻過當者須平心定氣與之委曲詳盡使之相從而後巳如未肯從再當如此詳之其不聽者少矣當官之法直道為先其有未可一向直前或直前反敗大事者須用馮宣徽所稱惠穆秤停之說此非特小官然也為天下國家當知之黄兊剛中嘗為予言頃為縣尉每遇驗尸雖盛暑亦先飲少酒捉鼻親視人命至重不可避少臭穢使人横死無所申訴也范侍郎育作庫務官隨行箱籠只置㕔事上以防疑謗凡若此類皆守官所宜詳知也當官者難事勿辭而深避嫌疑以至誠遇人而深避文法如此則可以免前輩嘗言小人之性專務茍且明日有事今日得休且休當官者不可徇其私意忽而不治諺有之曰勞心不如勞力此實要言也當官既自亷潔又須關防小人如文字歴引之類皆須明白以防中傷不可不至慎不可不詳知也徐丞相擇之嘗言前輩盡心職事仁廟朝有為京西轉運使者一日見監窑官問日所燒柴凡幾竈曰十八九竈吾所見者十一竈何也窑官愕然蓋轉運使者晨起望窑中所出煙凡幾道知之其盡心如此前輩嘗言吏人不怕嚴只怕讀蓋當官者詳讀公案則情偽自見不待嚴明也當官者凡異色人皆不宜與之相接巫祝尼媪之類尤宜踈絶要以清心省事為本後生少年乍到官守多為猾吏所餌不自省察所得毫末而一任之間不復敢舉動大抵作官嗜利得甚少而吏人所盜不貲矣以此被重譴良可惜也當官者先以暴怒為戒事有不可當詳處之必無不中若先暴怒只能自害豈能害人前輩嘗言凡事只怕待待者詳處之謂也蓋詳處之則思慮自出人不能中傷也嘗見前輩作州縣或獄官每一公事難决者必沉思靜慮累日忽然若有得者則是非判矣是道也惟不茍者能之處事者不以聰明為先而以盡心為急不以集事為急而以方便為上孫思邈嘗言憂於身者不拘於人畏於己者不利於彼慎於小者不懼於大戒於近者不侈於逺如此則人事畢矣實當官之要也同僚之契交承之分有兄弟之義至其子孫亦世講之前輩專以此為務今人知之者蓋少矣又如舊舉将及舊嘗為舊任按察官者後已官雖在上前輩皆辭避坐下坐風俗如此安得不厚乎叔曾祖尚書當官至為亷潔蓋嘗市縑帛欲製造衣服召當行者取縑帛使縫匠就坐裁取之并還所直錢與所剰帛就坐中還之滎陽公為單州凡每月所用雜物悉書之庫門買於民間未嘗過此數民皆悅服關沼止叔獲盜法當改官曰不以人命易官終不就賞可謂清矣然恐非通道或當時所獲盜有情輕法重者止叔不忍以此被賞也當官取傭錢般家錢之類多為人程而過受其直所得至微所䘮多矣亦殊不知此數亦吾分外物也當官者前輩多不敢就上位求薦章但盡心職事所以求知也心誠求之雖不中不逺矣未有學養子而後嫁者也當官遇事或有難決以此為心鮮不濟矣畏避文法固是常情然世人自私者常以文法難委之於人殊不知人之自私亦猶己之自利也以此處事其能有濟乎其能有後福乎其能使子孫昌盛乎當官處事務合人情忠恕違道不逺觀於己而得之未有舍此二字而能有濟者也嘗有人作郡守延一術士同處書室後術士以公事干之大怒叱下竟致之理杖背編置招延此人已是犯義既與之稔熟而干以公事亦人常情也不從之足矣而治之如此之峻殆似絶滅人理嘗謂仁人所處能變虎狼如人類如虎不入境不害物蝗不傷稼之類是也如其不然則變人類為虎狼凡若此類乃告訐中傷謗人欲寘其死地是也唐充之廣仁賢者也深為陳鄒二公所知大觀政和間守臣蘇州朱氏方盛充之數刺譏之朱氏深以為怨傅致之罪劉器之以為充之為善欲人之見知故不免自異以致禍患非明哲保身之謂當官大要直不犯禍和不害義在人消詳斟酌之爾然求合於道理本非私心專為己也當官處事但務着實如塗擦文書追改日月重易押字萬一敗露得罪反重亦非所以養誠心事君不欺之道也百種姦偽不如一實反覆變詐不如慎始防人疑衆不如自慎知數周密不如省事不易之道事有當死不死其詬有甚於死者後亦未必免死當去不去其禍有甚於去者後亦未必得安世人至此多惑亂失常皆不知輕重義命之分也此理非平居熟講臨事必不能自立不可不預思古之欲委質事人其父兄日夜先以此教之矣中材以下豈臨事一朝一夕所能至哉教之有素其心安焉所謂有所養也忍之一事衆妙之門當官處事尤是先務若能清慎勤之外更行一忍何事不辦書曰必有忍其乃有濟此處事之本也諺有之曰忍事敵災星少陵詩云忍過事堪喜此皆切於事理為世大法非空言也王沂公常說喫得三斗釅醋方做得宰相蓋言忍受得事也劉器之建中崇寧初知潞州部使者觀望治郡中事無巨細皆詳考然竟不得毫髪過雖過徃驛劵亦無違法予者部使者亦歎服之後居京南有府尹取兵官日直歴㸃磨他寓居無有不借禁軍者獨器之未嘗借一人其亷慎如此
