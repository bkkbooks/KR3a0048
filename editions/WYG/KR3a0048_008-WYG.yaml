body:
  text: 戒子通録卷八宋劉清之撰母訓戒子言鄒孟軻母列女傳孟子之少也既學而歸孟母方織問學所至孟子自若孟母以刀斷其織孟子懼而問其故母曰子之廢學若吾斷斯織也夫君子學以立名問則廣知今而廢之是不免於厮役而無以離於禍患也孟子懼旦夕勤學不息祖師子思遂成天下之名儒又曰孟子之少也嬉遊為墓間之事孟母曰此非所以居處子也乃去舎市傍其嬉戱為賈人衒賣之事孟母又曰此非所以居子也復徙舎學官之傍其嬉遊乃設爼豆揖遜進退孟母曰真可以居吾子矣遂居孟子長學六藝卒成大儒敬姜魯公父穆伯之妻文伯歜之母文伯退朝朝其母其母方績文伯曰以歜之家而主猶績其以歜為不能事主乎其母歎曰魯其亡乎使僮子備官而未之聞邪居吾語汝又文伯出學而還歸敬姜側目而眄之其友上堂従後降階而却行奉劒而正履若事父兄文伯自以為成人矣敬姜召而數之凡二事昔聖王之處民也擇瘠土而處之勞其民而用之故長王天下夫民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民莫不嚮義勞也是故天子大采朝日與三公九卿祖識地徳日中考政與百官之政事師尹惟旅牧相宣序民事少采夕月與太史司載紏䖍天刑日入監九御使潔奉禘郊之粢盛而後即安諸侯朝修天子之業命晝考其國職夕省其典刑夜儆百工使無慆淫而後即安卿大夫朝考其職晝講其庶政夕序其業夜庀其家而後即安士朝而受業晝而講貫夕而習復夜而計過無憾而後即安自庶人以下明而動晦而休無日以怠王后親織元紞公侯之夫人加之以紘綖卿之内子為大帶命婦成祭服列士之妻加之以朝服自庶士以下皆衣其夫社而賦事烝而獻功男女效績愆則有辟古之制也君子勞心小人勞力先王之訓也自上以下誰敢淫心舍力今我寡也爾又在下位朝夕處事猶恐忘先人之業况有怠惰其何以避辟吾冀而朝夕修我曰必無廢先人爾今曰胡不自安以是承君之官余懼穆伯之絶嗣也又曰昔者武王罷朝而結絲􅙋絶左右頋無可使結之者俯而自申之故能成王道桓公坐友三人諫臣五人日舉過者三十人故能成覇業周公一食而三吐哺一沐而三握髪所執贄而見於窮閭隘巷者七十餘人故能存周室彼二聖一賢者皆覇王之君也而下人如此其所與遊者皆過己者也是以日益而不自知也今以子年之少而位之卑所與遊者皆為服役子之不益亦以眀矣楚子發母楚将子發之母子發攻秦軍絶糧使人請於王因歸問其母問使者曰士卒無恙乎曰升分菽粒而食之又問将軍無恙乎曰朝夕芻豢􅆝黍子發大破秦将而歸其母閉門而不内使人數之曰子不聞越王勾踐之伐呉與客有獻醇酒一噐者王使人注江之上流使士卒飲其下流味不及加美而士卒戰自五也異日有獻一嚢糗糒者王又以賜軍軍士分而食之甘不足踰嗌而戰自十也今子為将士卒升分菽粒而食之子獨朝夕芻豢黍􅆝何也詩不云乎好樂無荒良士休休言不失和也夫使人入於死地而自康樂於其上雖有以得勝非其術也子非吾子也無入吾門師春姜魯人嫁其女三徃而三逐以輕侮其室人也春姜召其女而笞之留之三年女奉守節義終知婦道夫婦人以順􅀙為務貞慤為首今爾驕溢不遜以見逐曽不悔前過吾告汝數年而不吾用爾非吾子也孟仁母仁呉司空自結網捕魚作鮓寄母母還之仁大慙汝為魚官以鮓寄母非避嫌也嚴嫗號萬石嚴嫗子延年為漢河南太守冬月行屬縣刑戮囚徒流血數里母見責之曰嵗餘果敗汝宣化千里不聞仁愛而殺人立威名豈為人父母哉天道神眀人不可獨殺我不意老見壯子被刑戮也行矣去東歸掃墓地耳陶侃母新淦人湛氏陶丹娉以為妾生侃為尋陽縣吏嘗監魚梁以一坩鮓遺母湛氏封鮓及書責侃曰爾為吏以官物遺我非惟不能益吾乃以増吾憂矣許善心母善心隋人母范氏善心至孔魚家魚令子紹新與之譚宴夜乆方歸㣲有酒容范氏泣謂曰善心再拜受教遂即閉齋讀書四年之中窺渉萬卷汝是寡婦之子為俗所輕自非髙才異行不可以求仕進孔紹新是當朝允子易獲聲譽彼宜逸樂汝湏勤苦何地殊而相效乎崔氏隋大卿鄭善果母善果父誠討賊戰死善果為郡或行事不允或妄嗔怒母泣不食善果伏於床前不敢起母謂之曰大按善果滎澤人仕隋為魯郡太守歸唐為檢校理卿此云隋大卿似誤吾非怒汝乃愧汝家耳吾為汝家婦獲奉洒掃知汝先君忠勤之士也守官清恪未嘗問私以身徇國繼之以死吾亦望汝副其此心汝既年小而孤吾寡婦耳有慈無威使汝不知禮訓何可負荷忠臣之業乎汝自童子襲茅土汝今位至方岳豈汝身致之邪不思此事而妄加嗔怒心縁驕樂惰於公政内則墜爾家風或失亡官爵外則虧天下法以取罪戾吾死日何面目見汝先君於地下乎李景讓母景譲唐浙西觀察使有左都押衙忤意杖之而斃軍士憤且變母出坐㕔事立景譲於庭下而責之将撻之将佐拜泣乃釋之天子付汝以方面國家刑法豈得以為汝喜怒之資妄殺無罪之人乎責子言田稷子母齊田稷子相齊受下吏之貨金百鎰以遺其母母曰安所得此曰受之於其下其母云云稷子慙而出反其金自歸罪宣王恱母之義捨之復其位吾聞士修身潔行不為茍得竭誠盡實不行詐偽非義之事不計於心非禮之利不入於家言行若一情貌相逼故交友親而相結固夫以匹士相與猶然况於受禄之臣乎今君設官以待子厚禄以奉子言行備則可以報君夫為人臣而事其君猶為人子而事其父也盡力竭能忠信不欺務在效忠必死奉命㢘潔公正故志遂而無患今子反是逺忠矣夫為人臣不忠是為人子不孝也不義之財非吾有也不孝之子非吾子也子起矣問子言雋不疑母不疑漢京兆尹毎行縣録囚徒還母輙問即不疑多有所出母喜笑飲食有所平反活㡬何人答子言習氏呉威逺将軍李衡妻衡銳欲治生妻輙諫止之臨終告児曰汝母惡吾治生故貧如此吾武陵龍陽洲有千頭木奴不仰衣食之給嵗止匹絹亦足為汝曹計也兒具白母母曰汝家失十戸客来七八年吾嘗疑之果汝父宻遣種甘橘也汝父常稱太史公言江陵千株橘樹當封君家吾曰人患無徳義不患不富若貴而能貧方好耳彼豈所以貽子孫哉汝勿恃之張鎰母鎰蘇州人唐乾元殿中侍御史原令盧擬以公事呵責内侍内侍誣擬罪死鎰白母曰上䟽理擬擬必免死而鎰貶官以為太夫人憂不言鎰負於當官敢問所安母曰云云遂奏之擬配流鎰貶撫州司戸作案鎰字季權一字公度河南人新唐書原令華原令盧擬作盧樅爾無累於道吾所安也王義方母漣水人唐侍御史欲彈李義府先白其母母曰昔王陵之母殺身以成子之名汝能盡心以事君吾死不恨戒子言董昌齡母昌齡事呉少誠元濟為郾城令母曰云云昌齡乃以城降憲宗喜賜緋魚昌齡謝曰此皆老母之訓蔡平楊氏幸無恙封北平郡太君逆順之理成敗可知賊黨欺天天所不福汝當速降無以老母為念汝為忠臣吾無恨矣孫氏富春人孫權族孫女也適虞忠生潭為晉呉興守假節征蘇峻孫氏勉潭以必死之義貿其所服環佩以為軍資戒子曰吾聞忠臣出孝子之門汝當捨生取義勿以吾老為累也崔元暐母唐益州都督博陵崔元暐之母盧氏戒元暐而元暐遵奉以清謹稱吾見姨兄屯田郎中辛元馭云兒子從官者有人来云貧乏不能存此是好消息若聞貲貨充足衣馬輕肥此惡消息吾常重此言以為確論比見親表中仕宦者多将錢物上其父母父母但知喜恱竟不問此物従何而来必是祿俸餘資誠亦善事如其非理所得此與盗賊何别縱無大咎獨不内媿孟母不受魚鮓之饋蓋為此也汝今坐食祿俸榮幸已多若其不能忠清何以戴天履地孔子云雖日用三牲之養猶為不孝又曰父母惟其疾之憂特宜修身潔己勿累吾此意也陳夫人陳氏新淦人淳化中判三司磨勘贈太保新喻劉公諱式之夫人下蔡令立本職方郎中立言主客郎中贈太傅立志秘書監贈少師立徳兵部貟外郎集賢校理贈金紫立禮之母也太保公沒夫人戒五子曰先夫秉清潔之行惟有書數千卷命之曰墨莊今貽汝輩為學殖之具能遵是訓則吾子也何氏名臣傳陳尭咨母尭咨精於弧矢自號小由基出守荆南囬母何氏問曰古人居一郡一道必有異政汝有何效尭咨曰稍精於射何氏曰汝父訓汝以忠孝俾輔國家今不務仁政善化而專卒伍一夫之伎豈汝先人之意邪以杖擊之金魚墜地戒女書李氏余先妣長垣趙夫人諱琳字彦章手書且䟦云李氏戒女書親授之於父兄雖愚鄙不能如其教然朝夕覧之未嘗去手建炎己酉渡江遂亡其夲不復盡記惜哉李氏者今不知其名夫者天也天固不可逃夫固不可離也行違神眀天則罰之禮義有愆夫則薄之故易著牝馬之象詩有闗雎之興夫孝敬貞順専一無邪者婦人之紀綱閨房之大節也昔冀缺妻饁田相敬如賔梁鴻婦進食舉桉齊眉書之方册賢者以為有禮凡人謂之怕夫何其謬也貧者安其貧富則戒其富貧不自安者恥貧而廣求求既不得怨由兹生室家相輕恩易情薄富而不戒則夸勝之心生凌慢之容既彰和柔之色安在棄和柔之色作嬌小之容是為輕薄之婦人藏心為情出口為語言語者榮辱之樞機親踈之大節也亦能離堅合異結怨興讎大者則覆國亡家小者猶六親離間是以賢女謹口恐招恥謗或在尊前或居閑處未嘗觸應答之語發諂䛕之言不出無稽之詞不為調謔之事不渉穢濁不處嫌疑告子言叔向母晉叔向之母妬叔虎之母美而不使其子皆諫其母母曰云云使往視寢生叔虎美而有勇欒盈嬖之故羊舌氏之族及于難深山大澤實生龍蛇彼美余懼其生龍蛇以禍汝汝弊族也余何愛焉臣等謹案劉清之此段所引左𫝊汝弊族也之下刪去國多大寵不仁人間之不亦難乎三句其所註又不明晰前後文義幾至不可曉仰䝉御製書事文辨正其誣所以存人心世道之公為萬世褒貶之法恭錄御製文冠于卷端並識於此謂子言李絡秀晉安東將軍周浚妾生顗嵩謨顗等既長絡秀謂顗等從命由此李氏遂得為方雅之族我屈節為汝家作妾門户計耳汝等不與我家為親者吾亦何惜餘年宋氏晉韋逞母宋氏逞為苻堅太常號母宣文君就家立講堂置生員百二十人隔絳紗幔而受業周官學復行于世初宋父謂女曰後按此與下庾衮二條俱宜移在下劉氏之吾家世學周官傳業相繼此又周公所制經紀典誥百官品物備于此矣吾今無男可傳汝可受之勿令絶世王孫賈母齊大夫王孫賈之母也賈事閔王王出見弑國人不討賊母謂賈曰云云賈乃入市中而令百姓曰淖齒亂齊國弑閔王欲與我誅之者袒右從者四百人與之殺淖齒汝朝出而晩來則吾倚門而望汝汝暮出而不還則吾倚閭而望汝今汝事王王出走汝不知其處汝尚歸乎别子言范滂母滂字孟博漢汝南功曹滂坐黨人被収其母就與訣母曰云云滂跪受教再拜而辭汝今得與李杜齊名死亦何恨既有令名復求夀考可兼得乎戒兄女言庾衮字叔褒晉后族孤兄女芳將嫁衮刈荆苕為箕帚集諸子于堂男女以班命芳曰芳乎汝少孤汝逸汝豫不汝疵瑕今汝適人將事舅姑灑掃庭内婦之道也故賜汝此匪器之為美欲溫恭朝夕雖休勿休也勉子言劉氏何無忌母牢之姊也牢之為極元所害劉氏常思報復及無忌與劉裕定謀劉氏喜勸勉無忌桓元必敗義師必成汝能如此吾讎恥雪矣女戒荀爽字慈明漢司空藝文類聚作魏荀爽詩云泉源在左淇水在右女子有行逺父母兄弟明當許嫁配適君子竭節從理昬定晨省夜卧早起和顔悦色事如依恃正身潔行稱為順婦以崇螽斯百葉之祉婚姻九族云胡不喜聖人制禮以隔陰陽七嵗之男王母不抱七嵗之女王父不持親非父母不與同車親非兄弟不與同筵非禮不動非義不行是故宋伯姬遭火不下堂知必為灾傅母不來遂成于灰春秋書之以為髙也女訓蔡邕字伯喈陳留人漢末左中郎將女訓戒子凡三章心猶首面也是以甚致飾焉面一旦不修飾則塵垢穢之心一朝不思善則邪惡入之咸知飾其面不修其心夫面之不飾愚者謂之醜心之不修賢者謂之惡愚者謂之醜猶可賢者謂之惡將何容焉故覽照拭面則思其心之潔也傅脂則思其心之和也加粉則思其心之鮮也澤髪則思其心之順也用櫛則思其心之理也立髻則思其心之正也攝鬢則思其心之整也又舅姑若命之鼓琴必正坐操琴而奏曲若問曲名則捨琴興答曰某曲坐若近則琴聲必聞若逺左右必有贊其言者凡鼓小曲五終而止大曲三終而止無數變曲無多小曲尊者之聽未厭不敢早止若顧望視他則曲終而後止亦無中曲而息也琴必常調尊者之前不更調張私室若近舅姑則不敢獨鼓若絶逺聲音不聞鼓之可也鼓琴之夜有姊妹之宴則可也又戒子貴賤無常唯人所速茍善則庸夫之子可至于三公茍不善則王公之子反為庶人是知皇天無親惟徳是輔信矣㢤班昭字惠明扶風班彪女同郡曹叔妻也作女戒七章以戒諸女古者女生三日卧之牀下弄之瓦塼而齋告焉卧之牀下明其卑弱主下人也弄之瓦塼明其習勞主執勤也齋告先君明當主繼祭祀也三者葢女人之常道禮法之典教謙讓恭敬先人後己有善莫名有惡莫辭忍辱含垢常若畏懼是為卑弱下人也晚寢早作勿憚夙夜執務私事不辭劇易所作必成手迹整理是為執勤也正色端操以事夫主清靜自守無好戲笑潔齋酒食以供祖宗是為繼祭祀也三者茍備而患名稱之不聞黜辱之在身未之見也三者茍失之何名稱之可聞黜辱之可逺哉夫婦之道參配陰陽通逹神明信天地之宏義人倫之大節也是以禮貴男女之際詩著闗雎之義由斯言之不可不重也夫不賢則無以御婦婦不賢則無以事夫夫不御婦則威儀廢壊按廢壊漢書作廢缺婦不事夫則義理墮闕方斯二事其用一也察今之君子徒知妻婦之不可不御威儀之不可不整故訓其男檢以書傳殊不知夫主之不可不事禮義之不可不存也但教男而不教女亦蔽于彼此之數乎禮八嵗始教之書十五而至于學矣獨不可依此以為則哉陰陽殊性男女異行陽以剛為徳陰以柔為用男以疆為貴女以弱為美故鄙諺有云生男如狼猶恐其尫生女如鼠猶恐其虎然則修身莫若敬避彊莫若順故曰敬順之道婦人之大禮也夫敬非他持久之謂也夫順非他寛裕之謂也持乆者知止足也寛裕者尚恭下也夫婦之好終身不離房室周旋遂生媟黷媟黷既生語言過矣言語既過縱恣必作則侮夫之心生矣此由于不知止足者也夫事有曲直言有是非直者不能不爭曲者不能不訟訟爭既施則有忿怒之事矣此由于不尚恭下者也侮夫不節譴呵從之忿怒不止楚撻從之夫為夫婦者義以和親恩以好合楚撻既行何義之有譴呵既宣何恩之有恩義俱廢夫婦離矣女有四行一曰婦徳二曰婦言三曰婦容四曰婦功婦徳不必才明絶異也婦言不必辯口利辭也婦容不必顔色美麗也婦功不必工巧過人也清閒貞静守節整齊行己有恥動靜有法是謂婦徳擇辭而説不道惡語時然後言不厭于人是謂婦言盥浣塵穢服飾鮮潔沐浴以時身不垢辱是謂婦容專心紡績不好戲笑潔齋酒食以奉賓客是謂婦功此四者女人之大徳而不可乏者也然為之甚易唯在存心耳古人有言仁逺乎㢤我欲仁斯仁至矣此之謂也夫有再娶之義婦無二適之文故曰夫者天也天固不可逃夫固不可離也行違神祇天則罰之禮義有愆夫則薄之故女戒曰得意一人是謂永畢失意一人是謂永訖由斯言之夫不可不求其心然所求者亦非謂佞媚茍親也固莫若專心正色禮義居潔耳無淫聽目無邪視出無冶容入無廢飾無聚㑹羣輩無看視門户此則謂專心正色矣若夫動靜輕脱視聴任意入則亂髪壊形出則窈窕作態説所不當道觀所不當視此謂不能專心正色矣夫得意一人是謂永畢失意一人是謂永訖欲人定志專心之言也舅姑之心豈當可失哉物有以恩自離者亦有以義自破者也夫雖云愛舅姑云非此所謂以義自破者也然則舅姑之心奈何固莫尚于曲從矣姑云不爾而是固宜從令姑云爾而非猶宜順命勿得違戾是非爭分曲直此則所謂曲從矣故女憲曰婦如影響焉不可賞婦人之得意于夫主由舅姑之愛己也舅姑之愛己由叔妹之譽己也由此言之我臧否譽毁一由叔妹叔妹之心復不可失也皆知叔妹之不可失而不能和之以求親其蔽也哉自非聖人鮮能無過故顔子貴于能改仲尼嘉其不貳而况婦人者也雖以賢女之聰哲之性其能備乎是故室人和則謗掩外内離則惡揚此必然之勢也易曰二人同心其利㫁金同心之言其臭如蘭此之謂也夫叔妹者體敵而義尊恩疏而義親若淑媛謙順之人則能依義以篤好崇恩以接援使徽美顯章而瑕過隠塞舅姑矜善而夫主嘉美聲譽曜于邑隣休光延於父母若夫蠢愚之人於叔則託名以自髙於妹則因寵以驕盈驕盈既施何和之有恩義既乖何譽之臻是以美隱而過宣姑忿而夫慍毁譽布於中外恥辱集于厥身進增父母之羞退益君子之累斯乃榮辱之本而顯否之基也可不慎㢤然則求叔妹之心固莫尚於謙順矣謙則徳之柄順則婦之行凡斯二者足以和矣詩云在彼無惡在此無射其斯之謂也程曉字季明魏黄門侍郎大著文章多失亡存者不十一按曉東阿人婦人四教以備為成婦徳闕則仁義廢矣婦言虧則辭令慢矣婦容惰則邪僻生矣婦功簡則織絍荒矣故禮有公宫宗室之教詩有牖下蘋藻之奠然後家道諧允儀則表見於内若夫麗色妖容髙才美辭貎足傾城言以亂國此乃蘭形棘心玉曜瓦質在邦必危在家必亡李晟字良器唐功臣嘗正歳崔氏女歸省未及階晟覩之遂不視而遣還家爾有家况姑在堂婦當奉酒醴供饋以待賓客戒公主太祖皇帝類苑魏成信言魏國長公主嘗衣貼繡鋪翠􅃭入宫中太祖曰汝當以此與我自今勿復為此飾主笑曰此所用翠羽㡬何太祖曰不然主家服此宫闈戚里皆相效京城翠羽價髙小民逐利傷生寖廣實汝之由汝生長富貴當念惜福豈可造此惡業之端張横渠載字子厚郿縣人熙寜同知太常禮院作女戒九章章四句付吕氏女盈婦道之常順惟厥正是曰天明是其常命嘉爾婉婉克安爾親往之爾家克施克勤爾順惟何無違夫子無然臯臯無然訿訿彼是而違爾焉作非彼舊而革爾焉作儀惟非惟儀女生則戒王姬肅雍酒食是議貽爾五物以銘爾心錫爾佩巾墨子誨言銅爾提匝謹爾賔薦玉爾奩具案爾藻絢枕爾文竹席爾呉筦念爾書訓思爾退安彼實有室爾勿従室遜爾提提爾生引逸
