body:
  text: 戒子通録卷二宋劉清之撰家訓顔之推琅邪人終隋開皇太子學士著書二十篇訓子思魯等其大略具此孫按之推字子介顔子三十五世子思魯字孔歸唐秦府記室夫聖賢之書教人誠孝慎言檢迹立身揚名亦已備矣吾今所以復為此者非敢軌物範世也業以整齊門內提撕子孫夫同言而信信其所親同命而行行其所服禁童子以暴謔則師友之戒不如傅婢之指揮止凡人之鬭䦧則堯舜之道不如寡妻之誨諭吾望此書為汝曹之所信猶賢於傅婢寡妻耳吾家風教素為整密昔在齠齔便䝉誨誘每從兩兄曉夕溫凊規行矩步安辭定色鏘鏘翼翼若朝嚴君焉賜以優言問所好尚勵短引長莫不懇篤嬰稚識人顔色知人喜怒便加教誨使為則為使止則止比及數嵗可省笞罰父母威嚴而有慈則子女畏慎而生孝矣吾見世間無教而有愛每不能然飲食運為恣其所欲宜戒翻奬應訶反笑至有識知謂法當爾驕慢已習方復制之捶撻至死而無威忿怒日隆而增怨逮乎成長終為敗德孔子云少成若天性習慣如自然是也俗諺曰教婦初來教兒嬰孩誠哉斯語凡人不能教子女者亦非欲陷其罪惡但重於呵怒傷其顔色不忍楚撻慘其肌膚耳當以疾病為喻安得不用湯藥針艾救之哉王父司馬按家訓原本作王大司馬下亦作王在湓城無父字母魏夫人性甚嚴正王父在湓城時為三千人將年踰四十少不如意猶捶撻之故能成其勳業梁元帝時有一學士聰敏有才為父所寵失於教義一言之是遍於行路終年譽之一行之非掩藏文飾冀其自改年登㛰宦暴慢日滋竟以言語不擇為周逖抽腸釁鼓云父子之嚴不可以狎骨肉之愛不可以簡簡則慈孝不接狎則怠慢生焉由命士以上父子異宫此不狎之道也抑搔癢痛懸衾篋枕此不簡之教也人之愛子罕亦能均自古及今此弊多矣賢俊者自可賞愛頑魯者亦當矜憐有偏寵者雖欲以厚之更所以禍之共叔之死母實為之趙王之戮父實使之夫有人民而後有夫婦有夫婦而後有父子有父子而後有兄弟一家之親此三者而已矣自兹以往至於九族皆本於三親焉故於人倫為重者也不可以不篤兄弟者分形連氣之人也方其幼也父母左提右挈前襟後裾食則同案衣則𫝊服學則連業遊則共方雖有悖亂之人不能不相愛也及其壯也各妻其妻各子其子雖有篤厚之人不能不少衰也娣姒之比兄弟則踈薄矣今使踈薄之人而節量親厚之人猶方底而圓蓋必不合矣唯友悌深至不為傍人之所移者免夫二親既沒兄弟相顧當如形之與影聲之與響愛先人之遺體惜己身之分氣非兄弟何念哉兄弟之際異於他人望深則易怨地親則易弭譬猶居室一穴則塞之一隟則塗之則無頽毁之慮如雀鼠之不恤風雨之不防壁陷楹淪無可救矣僕妾之為雀鼠妻子之為風雨甚哉兄弟不睦則子姪不愛子姪不愛則羣從踈薄羣從踈薄則僮僕為讎敵矣如此則行路皆踖其面而蹈其心誰救之哉人或交天下之士皆有歡愛而失敬於兄者何其能多而不能少也人或將數萬之師得其死力而失恩於弟者何其能踈而不能親也娣姒者多爭之地也使骨肉居之亦不若各歸四海感霜露而相思佇日月之相望也况以行路之人處多爭之地能無間者鮮矣所以然者以其當公務而執私情處重責而懷薄義也若能恕巳而行換子而撫則此患不生矣人之事兄不可不同於事父何為愛弟不及愛子乎是反照而不明也沛國劉璡嘗與兄瓛連棟隔壁瓛呼之數聲不應良久方答瓛怪問之乃云向來未著衣帽故也以此事兄可以免矣吉甫賢父也伯竒孝子也賢父御孝子合得終於天性而後妻間之伯竒遂放曾參婦死謂其子曰吾不及吉甫汝不及伯竒王駿喪妻亦謂人曰我不及曾參子不如華元並終身不娶此等足以為戒其後假繼慘虐孤遺離間骨肉傷心斷腸者何可勝數慎之哉江左不諱庶孽喪室之後多以妾媵終家事疥癬蚊虻或未能免限以大分故稀鬭䦧之恥河北鄙於側出不預人流是以必須重娶至於三四母年有少於子者後母之弟與前婦之兄衣服飲食爰及㛰嫁至於士庶貴賤之隔俗以為常身沒之後辭訟盈公門謗辱彰道路子誣母為妾弟黜兄為傭播揚先人之辭迹暴露祖考之長短以求直己者往往而有悲夫自古姧臣佞妾以一言陷人者衆矣况夫婦之義曉夕移時婢僕求容助相說引積年纍月安有孝子乎此不可不畏凡庸之性後夫多寵前夫之孤後妻必虐前妻之子非為婦人懷嫉妬之情丈夫有沉惑之僻亦事勢使之然也前夫之孤不敢與我子爭家提携鞠養積習生愛故寵之前妻之子每居己生之上宦學婚嫁莫不為防焉故虐之異姓寵則父母被怨繼親虐則兄弟為讎家有此者皆門户之禍也生民之本要當稼穡而食桑麻以衣蔬果之蓄園場之所産雞豚之善塒圈之所生爰及棟宇器械樵蘇脂燭莫非種殖之物也至能守其業者閉門而為生之具以足但家無鹽井耳今北土風俗率能躬儉節用以贍衣食江南奢侈多不逮焉世間名士但務寬仁至於飲食餉饋僮僕減損施惠然諾妻子節量狎侮賔客侵耗鄉黨此亦為家之巨蠧矣婦主中饋唯事酒食衣服之禮耳國不可使預政家不可使幹蠱如有聰明才智識逹古今正當輔佐君子助其不足必無牝雞晨鳴以致禍也江東婦女略無交逰其婚姻之家或十數年間未有識者唯以信命贈遺致殷勤焉鄴下風俗専以婦持門户爭訟曲直造請逄迎車乘填街衢綺羅盈府寺代子求官為夫訴屈此乃恆代之遺風乎太公曰養女太多一費也陳蕃云盜不過五女之門女之為纍亦以深矣然天生蒸民先人𫝊體其如之何世人多不舉女賊行骨肉如此而望福於天乎諺云婦人之性率寵子壻而虐兒婦寵壻則兄弟之怨生焉虐婦則姊妹之讒行焉然則女之行留皆得罪於其家者母實為之至有諺云落索阿姑餐此其相報也家之常弊可不戒哉近世嫁娶有賣女納財買婦輸絹比量父祖計較錙銖責多還少市井無異或猥壻在門或傲婦擅室貪榮求利返招羞耻可不慎歟借人典籍皆須愛護先有缺壞就為補治此亦士大夫百行之一也濟陽江祿讀書未竟雖有急速必待卷束整齊然後得起故無損敗人不厭其求假焉或有狼籍几案分散部秩多為童幼婢妾之所㸃汙風雨犬鼠之所毁傷實為纍德吾每讀聖人之書未嘗不肅敬對之其故紙有五經詞義及賢逹姓名不敢穢用也吾家巫覡符章絶於言議汝曹所見勿為妖妄俗云辰日不哭哭則重喪今無教者辰日有喪不問輕重舉家清謐不敢發聲以辭弔客昔者周公一沐三握髮一飯三吐飱以接白屋之士一日所見七十餘人晉文公以沐辭豎頭須致有圖反之誚門不停賔古所貴也失教之家閽寺無禮或以主君寢食嗔怒拒客未通江南深以為耻黃門侍郎裴之禮號善為士大夫有如此輩對賔杖之其門生僮僕接於他人折旋俯仰辭色應對莫不肅敬與主無别也用其言棄其身古人所恥凡有一言一行取於人者皆顯稱之不可竊人之美以為己力雖輕雖賤必歸功焉竊人之財刑辟之所處竊人之美鬼神之所責士大夫子弟數嵗巳上莫不被教多者或至禮𫝊少者不失詩論及至冠婚體性稍定因此天機倍須訓誘有志尚者遂能磨礪以就素業無履立者自兹惰慢便為凡人生在世㑹當有業農民則計量耕稼商賈則討論貨賄工巧則致精器用伎藝則沉思法術武夫則慣習弓馬文士則講議經書多見士大夫恥涉農商羞務工伎射既不能穿札筆則才記姓名飽食醉酒忽忽無事以此銷日以此終年或因家世餘緒得一階半級便謂為足安能自苦及有吉凶大事議論得失䝉然張口如坐雲霧公私宴集談古賦詩塞默低頭缺伸而已有識傍觀代其入地何惜數年勤學長受一生愧辱哉梁朝全盛之時貴遊子弟多無學術至於諺云上車不落則著作體中何如則祕書無不薰衣剃面傅粉施朱駕長簷車跟髙齒屐坐碁子方褥憑班絲隱囊列器玩於左右從容出入望若神仙明經求第則雇人答䇿三九公宴則假手賦詩當爾之時亦快士也及離亂之後朝市遷革銓衡選舉非復曩者之親當路秉權不見昔時之黨求諸身而無所得施之世而無所用披褐而喪珠失皮而露質兀若枯木泊若窮流孤獨戎馬之間轉死溝壑之際當爾之時誠駑材也有學藝者觸地而安自荒亂已來諸見俘虜雖百世小人知讀論語孝經者尚為人師雖千載冠冕不曉書記者莫不耕田養馬以此觀之安可不自勉耶若能常保數百卷書千載終不為小人也夫明六經之指涉百家之書縱不能增益德行敦厲風俗猶為一藝得以自資父兄不可常依鄉國不可常保一旦流離無人庇䕃當自求諸身耳諺曰積財千萬不如薄技在身而况易習而可貴者無過讀書也世人不問愚智皆欲識人之多見事之廣而不肯讀書是猶求飽而懶營饌欲暖而惰裁衣也夫讀書之人自羲農已來宇宙之下凡識幾人凡見幾事生民之成敗好惡固不足論天地所不能藏鬼神所不能隱也人見鄰里親戚有佳快者使子弟慕而學之不知使學古人皆其蔽也世人但知跨馬被甲長矟强弓便云我能為將不知明乎天道辨乎地利比量逆順鑒逹興亡之妙也但知承上接下積財聚榖便云我能為相不知敬鬼事神移風易俗調節隂陽薦舉賢聖之至也但知私財不入公事夙辦便云我能治民不知誠巳型物執轡如組反風滅火化鴟為鳯之術也但知抱令守律早刑晚舍便云我能平獄不知同轅觀罪分劒追財假言而姧露不問而情得之察也爰及農商工賈厮役奴𨽻釣魚屠肉飯牛牧羊皆有先逹可為師表博學求之無不利於事也夫所以讀書學問本欲開心明目利於行耳未知養親者欲其觀古人之先意承顔怡聲下氣不憚劬勞以致甘腝惕然慙懼起而行之也未知事君者欲其觀古人之守職無侵見危授命不忘誠諌以利社稷惻然自念思欲效之也素驕奢者欲其觀古人之恭儉節用卑以自牧禮為教本敬者身基瞿然自失斂容抑志也素鄙吝者欲其觀古人之貴義輕財少私寡欲忌盈惡滿賙窮恤匱赧然悔耻積而能散也素暴悍者欲其觀古人之小心黜已齒敝舌存含垢藏疾尊賢容衆薾然沮喪若不勝衣也素怯懦者欲觀古人之逹生委命强毅正直立言必信求福不回勃然奮厲不可恐懾也歷兹以往百行皆然縱不能淳去泰去甚學之所知施無不逹世人讀書但能言之不能行之武人俗吏所共嗤詆良由是耳人讀數十卷書便自髙大凌忽長者輕慢同列人疾之如讎敵惡之如鴟梟如此以學求益今反自損不如無學也田里間人音辭鄙陋風操蚩拙相與専固無所堪能問一言輒酬數百責其指歸或無要㑹鄴下諺云博士買驢書劵三紙未有驢字使汝以此為師令人氣塞孔子曰學也祿在其中矣今勤無益之事恐非業也何晏王弼祖述元宗遞相誇尚景附草靡皆以農黃之化在乎己身周孔之業弃之度外而平叔以黨曹爽見誅輔嗣以多笑人被疾山巨源以蓄積取譏夏侯元以才望被戮嵇叔夜以排俗取禍郭子元以傾動權勢阮嗣宗沈酒荒迷謝幼輿贓賄黜削彼諸人者並其領袖元宗所歸其餘桎梏塵滓之中顛仆名利之下者豈可備言乎直取其清談髙論剖元析微賔主往復怡心悅耳非濟世成俗之要也吾見世人清名登而金貝入信譽顯而然諾虧不知後之矛㦸毁前之干櫓也宓子賤云誠於此者形於彼人之虛實真僞在乎心無不見乎迹但察之未熟耳一為察之所鑒巧僞不如拙誠承之以羞大矣伯石讓卿王莽辭政當於爾時自以巧密後人書之留𫝊萬代可為骨寒毛竪也夫君子之處世貴能有益於物耳不徒髙談虛論左琴右書以費人君祿位也國之用材大較不過六事一則朝廷之臣取其鑒逹治體經綸博雅二則文史之臣取其著述憲章不忘前古三則軍旅之臣取其斷决有謀强幹習事四則藩屏之臣取其明練風俗清白愛民五則使命之臣取其識變從宜不辱君命六則興造之臣取其程功節費開略有術此則皆勤學守行者所能辨也人性有長短豈責具美於六塗哉但當皆曉指趣能守一職便無愧耳吾見世中文學之士品藻古今若指諸掌及有試用多無所堪居承平之世不知有喪亂之禍處廟堂之中不知有戰陳之急保奉祿之資不知有耕稼之苦肆吏民之上不知有勞役之勤故難可以應世經務也古人欲知稼穡之艱難斯蓋貴穀務本之道也夫食為民天民非食不生矣三日不粒父子不能相存耕種之茠鉏之刈穫之載積之打拂之簸揚之凡幾涉手而入倉廪安可輕農事而貴末業哉江南朝士因晉中興而渡江本為羈旅至今八九世未有力田悉資俸祿而食耳假令有者皆信僮僕為之未嘗目觀起一墢土耘一株苗不知幾月當下幾月當收安識世間餘務乎故治官則不了營家則不辦皆優間之過也諌諍之徒以正人君之失爾必在得言之地當盡匡贊之規不容茍免偷安垂頭塞耳至於就養有方思不出位干非其任斯則罪人故表記云事君逺而諫則諂也近而不諫則尸利也論語曰未信而諫人以為謗己也君子當守道崇德蓄價待時爵祿不登信由天命須求趨競不顧羞慙比較材能斟量功伐厲色揚聲東怨西怒或有劫持宰相瑕疵而獲酬謝或有喧聒時人視聼求見發遣以此得官謂為才力何異盜食致飽竊衣取溫哉世見躁競得官者便為弗索何獲不知時運之來不索亦至矣見靜退未遇者便為弗為胡成不知風雲不與徒求無益也禮云欲不可縱志不可滿宇宙可臻其極情性不知其窮唯在少欲知足為立涯限爾先祖靖侯戒子姪曰汝家書生門户世欲富貴自今仕宦不可過二千石㛰姻勿貪勢家吾終身服膺以為名言也自亂離已來吾見名臣賢士臨難求生終為不救徒取窘辱令人憤悶侯景之亂王公將相多被戮辱妃主姬妾略無全者唯吳郡太守張嵊建義不捷為賊所害辭色不撓及鄱陽王世子謝夫人登屋詬怒見射而斃夫人謝遵女也何賢智操行若此之難婢妾引決若此之易悲夫醫方之事取妙極難不勸汝曹以自命也微解藥性小小和合居家得以救急亦為勝事皇甫謐殷仲堪則其人也唐桞玭序訓為御史大夫僕按玭京兆華原人太保公綽之孫射仲郢之第四子昭宗時官御史大夫先祖河東節度使公綽在公卿間最名有家法中門東有小齊自非朝謁之日每平旦輒出小齊諸子皆束帶晨省於中門之北公綽决私事接賔客與弟公權及羣從弟再㑹食自旦至暮不離小齊燭至則命子弟一人執經史躬讀一過訖乃講議居官治家之法或論文聽琴至人定鐘然後歸寢諸子復昏定於中門之北凡二十餘年未嘗一日變易其遇饑嵗則諸子皆蔬食曰昔吾兄弟侍先君為丹州刺史以學業未成不聽食肉吾不敢忘也祖母韓夫人相國休之曾孫相國滉之孫僕射貞公臯之長女家法嚴肅儉約為搢紳家楷範歸我家三年無少長未嘗見啓齒貞公在省為僕射先公於襄陽加端揆常衣絹素不用綾羅錦繡貞公親仁里有宅每歸覲不乘金碧輿祇乘竹兜子二青衣步屣以隨貞公歎乃御下之儉也常命粉苦參黃連熊膽和為丸賜先公及諸叔每永夜習學含之以資勤苦先公居外藩先公每入境郡邑未嘗知既至每出入常於㦸門外下馬呼幕賔為丈皆許納拜未嘗笑語欵洽牛相國辟為武昌從事動遵禮法竒章公歎曰非積習名教不及此先公以禮律身居家無事亦端坐拱手出內齊未嘗不束帶三為大鎮廄無良馬衣不薰香公退必讀書手不釋卷家法在官不奏祥瑞不度僧道不貸贓吏法凡理藩府急於濟貧恤孤有水旱必先期假貸廩粟軍食必精豐逋租必貰免館𫝊必增飾宴賔犒軍必華盛而交代之際倉儲帑藏必盈溢於始至境內有孤貧衣纓家女及笄者皆為選壻出俸金為資裝嫁之叔祖少保公權字誠懸玭兄弟嘗從諸季父送别東郊僕馬在門㑹隂晦多雨具少保因言我少時家貧當房嚴訓年十六當房往鮑陂人家致祭處分先往撰文時甚雪祇得一驢女家人清淨隨後得一破褥子披至鮑陂為莊客所哀為燔薪得附火為文寫上板子當房朝下到莊呈祝版此時免科責便滿望豈暇知寒今日雖散退還得爾許官爾等作得祭文者有幾人皆乘馬有油衣吾為爾等憂太保曉聲律而不好樂常云聞樂令人驕惰先妣韋夫人外王父相國文公貫之奕世以貞諒峻鯁稱先夫人事君舅君姑凡十一年晨省於雞鳴昏定於初夕未嘗闕梁國夫人有疾先夫人一月不下堂早夜奉養疾愈始歸院文公及第登諌科判入髙等授長安尉秩滿困窮穴地燔薪噉豆糜以禦冬孝公房舅謂余弟兄曰爾家雖非鼎甲然中外名德冠冕之盛亦可謂華腴右族玭自聞此言刻骨畏懼夫門地髙可畏不可恃可畏者立身行己一事有墜先訓則罪大於他人雖生可以茍取爵位死亦不可見祖先於地下不可恃者門髙則自驕族盛則為人窺嫉實藝懿行人未必信纎瑕微纍十手爭指矣所以承地胄者修己不得不懇為學不得不堅夫士君子生於世己無能而望他人用之己無善而望他人愛之亦猶農夫鹵莽種之而怨大澤之不潤雖欲弗餒其可得乎余幼時每聞先公僕射與太保房叔祖講論家法莫不言立巳以孝弟為基以恭默為本以畏怯為務以勤儉為法以交結為末事以氣焰為凶人肥家以忍順保交以簡敬百行備矣體之未臧三緘密慮言之或失廣記如不及求名如儻來去吝與驕庶幾寡過蒞官則潔己省事而後可以言守法守法而後可以言養人直不近禍廉不沽名廪祿雖微不可易黎氓之膏血檟楚雖用不可恣褊狹之胸襟憂與禍不偕潔與富不竝余又比見名家子孫其祖先正直當官耿介特立不畏彊禦者及其衰也則但有暗劣莫知所宗此際幾微非賢不逹夫壞名災己辱先喪家其失有尤大者五宜深記之一是自求安逸靡甘淡泊茍便於己不恤人言二是不知儒術不間古道懵前經而不耻論當世而解頥自無學業惡人有學三是勝己者厭之佞己者恱之唯樂戲談莫思古道聞人之善嫉之聞人之惡𫝊之浸漬頗僻銷刓德義簮裾徒在厮養何殊四是崇好慢遊耽嗜麴糵以銜杯為髙致以勤事為俗人習之易荒覺巳難悔五是急於名宦昵近權要一資半級雖或得之衆怒羣猜鮮有存者兹五不韙甚於痤疽痤疽則砭石可瘳五失則神醫莫理前朝炯戒方册具存近世覆車聞見相接夫中人已下修詞力學者則躁進患失思展其用審命知退者則業荒文蕪一不足操唯智者研其慮博其聞堅其習精其業用之則行舍之則藏茍異於斯孰為君子余自幼奉嚴訓實自懇剋不敢以資基冒進分為州邑冗吏未嘗以一言求伸於公卿間今優游清切乃踰心期至於披閲墳史研味祕奧猶惜寸隂不知老之將至噫君臣父子之道禮樂刑政之規在於儒術是乃本源夫以憂虞疾疢有限之年自少及衰從旦至暮孜孜於本教之事尚不得一二矧以他事撓之耶語曰不有博奕者乎為之猶賢乎己此一章意義全在己字己者飽食終日無所用心之人也如是者心智昏懶兼不及於博奕夫子以博奕為喻者乃深切於戒勸明言博奕為鄙事非許儒學不務經術但博奕耳吳宫之論可為格言近者又有葉子戲或聞其名本起婦女既鄙於握槊乃賭錢之流手執青蚨坐銷白日進德修業其若是乎夫世族之源長慶逺與命位之豐約否泰不假問蓍龜不假徴星數處心行事而已今昭國里崔山南昆弟子孫之盛鄉族罕比山南曾祖母長孫夫人年髙無齒祖母唐夫人事姑孝每旦櫛縰笄拜於階下即升堂乳其姑長孫夫人不粒食數年而康寧一日疾病長幼咸萃宣言無以報新婦恩願新婦有子有孫皆得如新婦孝敬則崔之門安得不昌大乎今東都仁和里裴尚書寬子孫衆盛實為名閥天后時宰相魏元同選尚書之先為長壻未成婚而魏陷羅織獄一家徙於嶺表來俊臣輩既死始霑恩還北魏之長女已踰笄及湖外其家議北裴必不復求婚淪落貧窶無以為衣食資詣老比邱尼祈披緇居其寺女亦甘願下髮有日矣有客尼自外至聞其議曰一見魏氏女可乎見之曰此女俗福豐厚必有令匹子孫將遍天下宜事北歸言訖而去遂不敢議及荆門則裴自京洛賫資聘俟魏氏之北反已數月矣今勢利之徒奉權幸如不及捨信誓如反掌則裴之蕃衍乃天之報施也鄭司徒言於河南文公云裴某作刺史兒女皆飯餅餌人言其為吏清白與周給親愛不可不信矣余季妹適宏農楊堪在蔣相國幕清刻自持屬吏有饋獻皆不納嘗言不唯自清抑亦內助焉余舊府髙公先侍郎兄弟三人俱居清列非速客不二羮胾夕食齕蔔匏而已皆保重名於世永寧王相國按王相涯方居相位掌利權竇氏女歸請曰玉工貨一叉竒巧須七十萬錢王曰七十萬我一月俸金爾豈於女惜但一股叉七十萬此妖物也必與禍相隨女不復敢言數月女自婚姻㑹歸告王曰前時叉為馮外郎妻首飾矣乃馮球也王歎曰馮為郎吏妻之首飾有七十萬錢其可久乎其善終乎馮為賈相門人最密按賈相餗賈為東户又取為屬郎賈有蒼頭頗張威福馮於賈忠將發之未能賈入相馮一日遇蒼頭於門召而朂之曰戶部中謗詞不一茍不悛必告相國奴泣拜謝而去未浹旬馮晨與賈未興時方命設火內齊曰冠當出俄有二青衣賫銀罌出曰相公恐員外寒命奉地黃酒三杯馮恱盡舉之青衣入馮出告其僕御曰渴且咽粗能言其事食頃而終賈為馮興歎出涕竟不知其由又明年王賈皆遘禍噫王以珍玩竒貨為物之妖信知言矣而徒知物之妖而不知恩權隆赫之妖甚於物邪馮以卑位貪寶貨已不能正其家盡忠所事而不能保其身斯亦不足言矣賈之臧獲害門客於墻廡之間而不知欲始終富貴其可得乎此雖一事作戒數端又李相國泌居相位請徴陽道州為諌議大夫陽既至亦甚銜恩未幾李薨於相位其子蘩居喪與陽並居陽將獻疏斥裴延齡之惡嗜酒目昏以恩故子弟待蘩召之寫疏蘩彊記絶筆誦於口録以呈延齡遞奏之云城將此疏行於朝數日矣道州疏入德宗已得延齡藁震怒俄斥道州竟不反蘩後為譙郡守虐誅巨盜不以法舒相元輿布衣時以文贄蘩蘩曰自此有一舒家銜之及為御史鞫譙獄入蘩罪不可解數年舒亦及禍今世人各盛言宿業報應之說曾不思視履考祥之事不其惑歟余又見名門右族莫不由祖考忠孝勤儉以成立之莫不由子孫頑率奢傲以覆墜之成立之難如升天覆墜之易如燎毛言之痛心爾宜刻骨又余家世本以學識禮法稱於士林間比見諸家於吉凶禮制有疑文者多取正焉喪亂以來門祚衰落清風素範有不絶如線之慮當禮樂崩壞之際荷祖先名教之訓弟兄兩人年將中夀基構之重屬於後生纂續則貧賤為榮隳墜則富貴可耻今所紀舊事十忘三四晝覽而夜思棲心講求觸類滋長夫行道之人德行文學為根株正直剛毅為柯葉有根無葉按有根無葉四字原本脫去今從新唐書增入或可俟時有葉無根膏雨所不能活也茍懵斯理欲紹家聲則今之流𫝊反成災害諦聽熟念以保令名至於孝慈友悌忠信篤行乃食之醯醬不可一日無也豈必言哉比史官皆有序𫝊以紀宗門余初及行在尚守左史故敢以序訓為目
