body:
  text: 御製書宋劉清之紀左傳叔向母之事叔向之母賢母也能訓其子為正人又能知叔虎之母美而惡入聲將生敗子惡去聲之而不使見羊舌職劉清之記此事而所注又不明幾不成句令人不可曉宋劉清之撰戒子通録記叔向母一事引左傳云晉叔向之母妬叔虎之母美而不使其子皆諌其母母曰深山大澤實生龍蛇彼美余懼其生龍蛇以禍汝汝敝族也余何愛焉使往視寢生叔虎美而有勇欒盈嬖之故羊舌氏之族及於難云云所注殊不明晰按左傳注不使謂不使見叔向之父羊舌職也又左傳汝敝族也下有國多大寵不仁人間之不亦難乎三語為劉清之刪去前後文義幾至不可曉亦著𫐠者之過也然此誤不在劉清之而在左邱明夫妬婦人之惡德也叔向之母蓋能預見叔虎之母雖美而惡將生惡子以敝羊舌氏之宗然從子之諌使往視職之寢果生虎而羊舌氏之族遂及於難是誠仁人能惡人而有先見之明者矣左氏應謂之惡去聲而不宜謂之妬是誠其浮夸而不實也以致千載之下謂叔向之母果妬焉余不可不正其誣欽定四庫全書子部一提要戒子通録八卷儒家類臣等謹案戒子通録八卷宋劉清之撰清之字子澄號靜春臨江人紹興二年進士光宗時知袁州宋時本傳稱其生平著述甚多是書其一也其書博採經史羣籍凡有關庭訓者皆節録其大要至於母訓閫教亦備述焉史稱其甘貧力學博極羣書故是編採托繁富或不免於冗雜然其隨事示教不憚於委曲詳明雖瑣語碎事莫非勸戒之資固不以過多為患也元虞集甚重其書嘗勸其後人刻諸金溪後崔楝復為重刻顧自宋以來史志及諸家書目皆不著録惟文淵閣書目載有二册亦無卷數外間傳本尤稀今謹據永樂大典所載約略篇頁釐為八卷所引諸條原本於標目之下各粗舉其人之始末其中間有未偹者今並為考補增注以一體例惟自宋以前時代錯出頗無倫次蓋一時隨手摘録未經排比之故今亦姑存其舊焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀元虞集序愚嘗聞之人受天之命以生亦猶子之稟父命而行也君子畏天命而不敢違猶孝子之從父命而不敢悖事天事親其致一也人之事天而不求於事親則不可以為人子之事親而不足以事天則不可以為子是故父命即天命也同一至仁而無私者也然而天不能為諄諄之誨也知命者觀乎風雨霜露之迹變化消息之故而得之詩云昊天曰明及爾出王昊天曰旦及爾遊衍庶幾奉以周旋者乎故曰富貴福澤將厚吾之生也貧賤憂戚庸玉女於成也莫非惟其所命而順受其正者也事親之道亦若是而已矣夫親之於其子也蓋無不愛焉欲其善良欲其賢智欲其福澤長久而不欲其凶惡愚不肖不欲其困乏斷折其心無有異者語曰厲人生子夜而取火是欲其子之善者至於凡庸盡然况中人以上乎是故愛之至則慮之深知之明則言之切或因其材或因其事或抑其過或朂其不及或正其偏或定其是以啓迪其所未知而增益其所可進雖人品不同而立言遠近淺深頓異要其指歸皆愛其子而已矣天理之公孰有著於此者乎昔靜春劉先生輯凡為人父者之戒其子言載書傳者以為戒子通録意其所以謂之通録者豈不以天下之為人父者各以其愛子之心而為之戒天下之為人子者皆可因其所戒而省念之如聞其父之命親在求諸容也辭氣之接而不能盡也即此書以充其所未達親歿思其精神志意之微而有不及聞也即此書以徴其所欲知一語默動息無非受命於其親者矣天理寧有間斷乎集嘗得其書而敬愛之服行講明不敢後也他日至臨川劉氏之族在金溪者多賢俊每出其先世遺書相示僕慨然問之曰戒子通録無恙乎有曰警叔熙者對曰是吾世守以保族者也敢忘之乎集曰子之家顯且二三百年豈偶然乎蓋又聞之孝弟之順德視犯上作亂之惡其間之相去甚不相似也而有子推兩端之極於一言之間豫章羅先生曰天下無不是之父母而陳公了翁推致之曰亂臣賊子之起常始於見父母之不是嗚呼不受命之害至於如此三君子之言所以有功於萬世名教者也而忽焉者不足以知其言之有功也必有觀乎此書而用力焉則能惕然恐懼而所以盡心於事天事親者矣子盍刻而廣之也警曰諾明年以成書來告因請題其説云元陳黃裳序人之愛子何所不至哉自襁褓鞠乳以至成人授之以土宇人民而欲其富傳之以印綬車服而欲其貴凡可以與之者一無靳色雖我躬不閲亦必思所以遺後謂不若是則父母之責未盡也然此豈所以愛子哉石碏曰愛子教之以義方古者子生八歲入小學立之師傅教之禮樂射御書數達之灑掃應對進退蓋自天子之儲二諸侯之世子公卿大夫之子以至於士庶人莫不以此為急先務必義方之教行由小學以進於大學禔身承家肯堂肯播而後能保其所謂土宇人民印綬車服者此固父母所望於子而為人子者亦豈易事哉近世朱徽文公既成小學之書又柬劉靜春集史傳嘉謨善行與宋氏諸儒之格言為戒子通録凡為父母為子姪為兄弟為夫婦之道具是階庭講學耳濡目染非茍知之亦允蹈之其於世教實非小補湖湘舊有板今不復存平陽崔君架之間以語余幕府餘間手自讎校且繡梓以廣其傳盛心可尚已以儒飭吏言政及化豈俗吏所能哉既為嘉歎且繫之辭大德庚子春丁前進士眉山陳黃裳敘元曾福升序立三極備萬物者人也而所以為人之道其要有三重焉一曰宅心二曰立身三曰教子然能宅則能立能立則能教君子不謂三也昔者曾子之在聖門其親承斯道之傳繼述先聖之志者孝經一編大學一書而已其他遺言見於問載於記班班可考曷嘗外是而他有所謂哉試即二書之表而推之其曰宏毅任重戒之戒之宅心之謂也其曰三省自反而縮養敬安卒慎行其身立身之謂也夫惟宅心立身之道亦既若是其往矣後世雖有弗肯堂弗肯播而能讀其書者亦將化蒲盧而肖蜾裸矣矧有是者哉友人崔架之其宅心立身知所本者與得靜春劉先生所集戒子通録善本以刻諸梓將廣其傳是亦錫類之美事雖然即吾心吾身之所有則其不言之教固己諄諄於其子矣而况昭諸不朽若是乎故吾因架之今之此舉并以發是録言外之意初亦不出於大學修正齊家之要領也舉瞻孔庭有嚴在目子其勉諸以盡為人之道以任三極萬物之責大德庚子秋中日富州文學掾廬陵曾福升題元崔棟序近得臨江劉清之所輯戒子通録一編皆古者明君良臣慈父淑母教誡子弟理明意切讀之能使為人臣為子弟者油然起忠孝之心惜此本傳之者寡遂鋟梓以廣之庶有補於將來大德庚子良月河東崔棟謹識
