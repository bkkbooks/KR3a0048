body:
  text: 戒子通録巻七宋劉清之撰辨志録呂太史祖謙字伯恭東萊人淳熈著作郎集録辨志以訓子延孫弟祖儉祖烈等之按此條原本在母訓女戒後今移于前㓜學之士先要分别人品之上下何者是聖賢所為之事何者是下愚所為之事向善背惡去彼取此此㓜學所當先也顔子孟子亞聖人也學之雖未至亦可以為賢人今之學者若能知此則顔孟之事我亦可為言温而氣和則顔子之不遷漸可學矣過而能悔又不憚改則顔子之不貳漸可學矣知埋鬻之戱不如俎豆念慈母之愛始於三遷自㓜至老不厭不改終始一意則我之不動心亦可以如孟子矣若夫立志不髙則其學皆常人之事語及顔孟則不敢當也其心曰我為孩童豈敢學顔孟哉此人不可以語上矣先生長者見其卑下豈肯與之語則其所與語者皆下等人也言不忠信下等人也行不篤敬下等人也過而不知悔下等人也悔而不知改下等人也聞下等之語為下等之事譬如坐於房舍之中四面皆墻壁也雖欲開明不可得矣書曰不學墻面孔子曰其猶正墻面而立也歟言人不可以不學也揚子曰吾焉開明哉言學聖賢然後心開而意明也陳瑩中大要前軰作事多周詳後軰作事多闊略酬酢事變下同字者朋友之職嘗見前軰先進不呼後進字後進固不敢呼先進也氣類不同者亦不相呼三四十年來先進始有字後進者又觀前軰凡父行父執受拜不跪江南閭里間士大夫或不學問羞為鄙朴道聼塗說强事飾辭呼徴質為周鄭謂霍亂為博陸上荆州必稱峽西下揚都要云海郡言食則餬口道錢則孔方問移則楚邱論昏則燕爾及王則無不仲宣語劉則無不公幹凡有一二百件轉相祖述尋問莫知源由文翰時復失所顔氏家訓恩讎分明此四字非有道者之言也無好人三字非有徳者之言也後生戒之酬酢事變温公㓜時患記問不若人羣居講習衆兄弟既成誦游息矣獨下帷絶編迨能背諷乃止用力多者其所誦乃終身不忘矣李翺寄從弟正辭書知爾京兆府取解不得如其所懐念勿在意借如用汝之所知分為十焉用其九學聖人之道而和其心使有餘以與時世進退俯仰如可求也則不啻冨且貴矣如非吾力也雖盡用其十秖益勞其心矣安能有所得乎文集王羆性儉率嘗有臺使至羆為設食使乃裂去薄餅縁羆曰耕種收穫其功已深舂㸑造成用力不少爾之選擇當是未餓命左右徹去之使者愕然大慙北史春秋以後先王之澤漸逺然善言相傳猶有存者學者得其言猶可詳思而致力也如伍子胥為人剛戾忍詬能成大事趙㐮子言君所以能致無恤為能忍詬也莊子稱伊尹强力忍詬亦是舍人雜録迂叟曰世之人不以耳視而目食者鮮矣聞者駭曰何謂也曰衣冠所以為容望也稱禮斯美矣世人捨其所稱聞人所尚而慕之豈非以耳視者乎飲食之物所以為味適口斯善也世人取果餌而刻鏤之朱緑之以為盤案之玩豈非以目食者乎司馬集吳庠妻謝氏子賀與賔客言及人之長短夫人屏間竊聞之怒笞賀百或解夫人曰臧否士之常曷笞之若是夫人曰愛其女者必取三復白圭之士而妻之今獨産一子使知義命而出語忘親豈可乆之道哉因泣涕不食賀由是恐懼謹黙發人私書拆人信物深為不徳甚者遂至結為仇怨余得人所附書物雖至親卑㓜者未嘗輙留必為附至及人託於某處問訊干求若事非順理而己之力不及者則可至誠面却之若已諾之矣則必湏達所欲言至於聽與不聽則在其人凡與賔客對坐及徃人家見人得親戚書切不可徃觀及注目偷視若屈膝並坐目力可及則斂身而退候其收書方復進以續前話若其人置書几上亦不可取觀湏俟其人云足下可觀方可一㸔若書中説事無大小以至戱謔之語皆不可於他處復説凡入人家切不可於几案上及書攀等内飜㸔人家書簡及記事䇿子錢榖文歴若人将文字令㸔切不可於背後觀皆無徳之一端也凡借人書冊器用茍得己者則不須借若不獲己則須愛䕶過於己物㸔用才畢即便歸還切不可以借為名意在沒納及不加愛惜至有損壊大率豪氣者於己物多不頋惜借人物豈可亦如此此非用豪氣之所乃無徳之一端也又飲食蒸餅去皮饅頭去蒂肉去脂皮之類皆非成人所為乃癡騃無知而已自非生硬臭惡與犯已宿疾之物豈有不可食之理凡與人同坐夏則己擇凉處冬則己擇暖處及與人共食多取先取皆無徳之一端也范益謙自戒吕正獻公㑹諸壻于東園時韓師朴王正國新登第皆惠穆壻也中休鄰園閑坐正國唱自作小詞甚多景純問師朴曰師朴莫亦有不正色曰豈有此事家塾廣記讀書不輟甚書不讀了萬一都廢且自今重新勤下十分工夫不可因循隐忍甘心作庸人過一生也最是行義一事不可放過正心修身念念須學前軰乆乆之間自然相應矣舍人書萬事真實有命人力計較不得吾平生未嘗干人在書局亦不謁執政或勸之吾對曰他安能陶鑄我自有命在若信不及風吹草動便生恐懼憂喜枉做却閑工夫枉用却閑心力信得命及便養得氣不折挫上蔡語録問某有一病且如作一簡便須安排言語寫教如法要人𫝊玩飯一客便要器皿飲饌如法教人感激推此每事皆然先生曰此夸心欲以勝人皆私也作簡請客如法是合做底只下面一句便是病根此病根因甚有只為不合有已得人道好於我何加因説孟子説宫室之美妻妾之奉所識窮乏者得我舉皆是有箇夸心又問更有一病稱好則溢美稱不好則溢惡此猶是好惡使然且如今日泥濘只是五寸須説一尺有利害猶且得無利害須要如此此病在甚處曰欲以意氣加人亦是夸心有人做作説話張筋努脉皆為有己同上劉道原之子羲仲本佳近亦變壊揚子雲稱言心聲書心畫羲仲每有書來呼兒輩譯之数四有不能識者字小而闇弱亦其心術之不明類此安世每於書畫之間得其人之太半元城語李習之答朱載言書古之人相接有等輕重有儀列於經𫝊皆可詳引如師之於門人則名之於朋友則字而不名稱之於師則雖朋友亦名之子曰吾與回言又曰参乎吾道一以貫之又曰若由也不得其死然是師之於門人驗也夫子於鄭兄事子産於齊兄事晏嬰平仲𫝊曰子謂子産有君子之道四焉又曰晏平仲善與人交子夏曰言游過矣子張曰子夏云何曽子曰堂堂乎張也是朋友字而不名驗也子貢曰賜也何敢望回又曰師與商也孰賢子游曰有澹臺滅明者行不由徑是稱於師雖朋友亦名驗也足下之書曰韋君詞楊君潛足下之徳與二君未知先後也而足下齒㓜而位卑而皆名之𫝊曰吾見其與先生並行非求益者也欲速成者也李文公集劉器之嘗論至誠之道凡事據實而言才渉詐偽後來忘了前話便是脱空據實而言十年二十年後說事異同賢便不説劉安世元來是脱空漢元城語歩隲與衛旌俱以種𤓰自給㑹稽焦征羌郡之豪族人客放縱乃共修刺奉𤓰以獻征羌方在内卧駐之移時旌欲委去隲止之曰本所以來畏其强也而今舍去欲以為髙祗結怨耳良乆征羌開牖見之身隐几坐帳中設席置地坐隲旌於牖外旌愈耻之隲辭色自若征羌作食身享大桉殽膳重沓以小盤飯與隲旌惟菜茹而已旌不能食隲極飯致飽乃辭出旌怒隲曰何能忍此隲曰吾等貧賤是以主人以貧賤遇之固其冝也當何所耻三國志范雲少與領軍長史王畯善雲起宅新成移家始畢畯亡於官舍死無所歸以東廂給之移屍自門入躬自營唅招復如禮時人以為難南史孔戡於為義若嗜欲不顧前後於利與禄則畏避退怯如懦夫然韓文王楊盧駱謂之四傑裴行儉曰士之致逺先器識而後文藝勃等雖有文才而浮躁淺露豈享爵禄之器耶楊子沉静應得令終為幸其後勃溺南海照隣投潁水賔王被誅烱終盈川令皆如行儉之言唐書下同閻立本善畫秦府十八學士圖及貞觀中凌烟閣功臣圖立本之跡也時人稱妙太宗與侍臣學士汎舟於春苑池中有異鳥随波容與太宗撃賞詔坐者賦詩召立本令寫焉閣外𫝊呼云畫師閻立本時立本已為主爵郎中奔走流汗俯伏池側手揮丹粉瞻望坐賔不勝愧赧退戒其子曰吾少學讀書今惟以丹青見知躬厮役之務辱莫甚焉汝冝深戒勿習此末伎王仲舒韋成吕洞輩為郎官朋黨輝赫日㑹聚歌酒慕李藩名節强收致同㑹藩不得已一至仲舒輩好為訛言俳戯後召藩堅不去曰吾與仲舒輩終日不曉所與言何也後果敗徐仲車為楚州教授嘗言事各有所主不得相侵如借書必白經諭有急故留門必白直學不敢自專也吕氏雜録仲車嘗言人之同官不可不和和則事無乖逆而下不能為姦必欲和莫若分過而不掠美青州人隐蕃逃犇入吳朱據郝普数稱蕃有王佐之才賔客盈堂潘濬子翥亦與蕃周旋饋餉之濬聞大怒䟽責翥曰吾受國厚恩志報以命爾輩在都當念恭順親賢慕善何故與降虜交以糧餉之在逺聞此心震面熱惆悵累旬䟽到急就徃使受杖一百促責所餉當時人咸恠之頃之蕃謀作亂於吳事覺亡走捕得伏誅吳王切責郝普惶懼自殺朱據禁止歴時乃解三國志之按此條係裴松注中語梁蕭統葬其母丁貴嬪遣人求墓地之吉者或賂宦官俞三副求賣地云若得錢三百萬與之三副宻上言太子所得地不如今地於上為吉上年老多忌即命市之葬畢有道士云此地不利長子若厭之或可申延乃為蠟鵝及諸物埋於墓側長子位宫監鮑邈之魏雅初有寵於太子邈之晚見踈於雅乃宻啟上云雅為太子厭禱上遣檢掘果得鵝物大驚将窮其事徐勉固諫而止但誅道士由是太子終身慙憤不能自明及卒上徴其長子華容公歡至建康欲立以為嗣衘其前事猶豫乆之卒不立庚寅遣還鎮司馬光曰君子之於正道不可少頃離也不可跬歩失也以昭明太子之仁孝武帝之慈愛一染嫌疑之迹身以憂死罪及後昆求吉得凶不可湔滌可不戒哉是以詭誕之事竒邪之術君子逺之通鑑梁賀琛奏今天下守所以貪殘良由風俗侈靡使之然也今之燕喜相競誇豪積果如邱陵列肴同綺繡露臺之産不周一讌之資而賔主之間財取滿腹未及下堂己同臭腐為吏牧民者致資巨億罷歸之日不支数年率皆盡於燕飲之物歌謡之具所費事等邱山為歡止在俄頃乃更追恨向所取之少如虎傅翼増其摶噬一何悖哉夫失節之嗟亦民所自患正耻不能及羣輩故勉强而為之南史雍州刺史武昌王渾與左右作檄文自號楚王改元永光備置百官以為戱笑長史王翼之封呈其手迹八月庚申廢渾為庶人徙始安郡遣員外散騎侍郎東海戴明寳詰責渾因逼令自殺時年十七南史有貨玉帶者王文正弟以呈文正文正曰如何弟曰甚佳公命繫之曰還見佳否弟曰繋之安得自見文正曰自負重而使觀者稱好無乃勞乎我腰間不稱此物亟還之故平生所腰止於賜帯王文正遺事下同王文正公毎見家人服餙似異即瞑目曰吾門素風一至於此亟令减損故家人有一衣稍華必於車内易之不敢令公見焉吕文穆不喜記人過初参知政事入朝堂有朝士於簾内指之曰是小子亦参政邪文穆佯為不聞而過之其同列怒令詰其官位姓名文穆遽止之罷朝同列猶不能平悔不窮問文穆曰若一知其姓名則終身不能忘固不如毋知也且不問之何損王吉為昌邑王中尉而王好遊獵馳驅國中動作無節吉上䟽諫曰大王不好書術而樂逸遊慿軾撙銜馳騁不止口倦乎叱咤手苦於箠轡身勞乎車輿朝則冐霧露晝則被塵埃夏則為大暑之所暴炙冬則為風寒之所匽薄数以耎脆之玉體犯勤勞之煩毒非所以全夀命之宗也又非所以進仁義之隆也夫廣厦之下細旃之上明師居前勸誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道訢訢然發憤忘食日新厥徳其樂豈徒銜橛之間哉漢書魏左将軍李栗性簡慢嘗對道武舒放不肅咳唾任情道武積其宿過遂誅之鄭餘慶不事華潔後進趨其門者多垢衣敗服以望其知而武儒衡謁見未嘗輙易所好但與之正言直論餘慶因亦重之李翛尹京兆莊憲太后崩為山陵橋道使恃能惜費每事减損靈駕至覇橋頓從官多不得食及至渭橋北門壊先是橋道司請改造渭城北門計錢三萬翛以勞費不從令深鑿軌道以通靈駕掘土既深旁柱皆懸因而殞壊所不及輼輬車者数歩韋昭博奕論云今世之人多不務經術好翫博奕廢事棄業忘寢與食窮日盡明繼以脂燭當其臨局交事雌雄未决專精鋭意神迷體倦人事曠而不修賔旅闕而不接雖有太牢之饌韶夏之舞不暇存也至或賭及衣物徙棊易行亷耻之意弛而忿戾之色發然其所志不出一枰之上所務不過方罫之間而空妨日廢業終無補益顧覬之嘗執命有定分非智力所移唯應恭己守道信天任運而闇者不達妄意僥倖徒虧雅道無闗得䘮乃以其意命弟子愿作定命論温公曰凡觀書當先識其文辨其音然後可以求其義人湏是於一切世味淡薄方好不要有冨貴相周恭叔才髙識明初年亦甚好後只縁累太重若把得定儘長進在昔聞明道先生一見吕㣲仲便曰宰相㣲仲須做只是這漢俗謝上蔡云為他有貴底相態便是俗處楊訓黎明侍坐胡文定先生目黎曰為士人當只知窮經問學不須及他事如賢前所言誰又罵詈自家誰又道甚言語如此是自家身心都不理只了得與人閑争也孟子曰自反而仁矣自反而有禮矣此物奚冝至哉萬一自家都是亦只得如此待人况罵詈長官親聞乃坐若聽人𫝊言是來讒賊之口有何窮也陶淵明為彭澤令不以家累自隨送力給其子書曰汝旦夕之費自給為難今遣此力助汝薪水之勞此亦人子也可善遇之韓魏公曰以之遇可以成功以之不遇可以免禍者其惟晦叔乎又曰人情㣲處湏深體之若直用已以處所失多矣又曰君子操履須當精㣲放過一事便為小人所窺也韓魏公因論君子小人之際皆當以誠待之但知其為小人則淺與之接耳凡人至於小人欺已處不覺則必露其明以破之公獨不然明足以照小人之欺然每受之未曽形言色也有人問祁寛尹和静先生尋常説今日政事向背當如何寛曰不曽説渠曰賢曽問否寛曰不曽問曰何故不問寛曰先生教人思不出其位不在其位不謀其政安敢問也渠云孔孟何故説寛曰孔孟亦不曽説渠引孔孟之言寛曰此聖人在其位為司冦齊卿時説底至於答一時君臣問政皆時君大臣問政不得不告也觀孔子説底危行言孫及不謀其政氣象方其閒處必不説也曰如此則先生之學焉用寛曰然每教人必以君臣父子夫婦朋友之道必欲君君臣臣父父子子又論為國為天下必進賢退不肖信賞必罰極其本必以仁義孝弟則其論政亦大矣奚必指時事而言書云孝乎惟孝友于兄弟是也一日舉似先生先生曰甚善甚善祁居之田腴承伯云作官從人奏辟非但賔主便有君臣之義不冝輕也陳長方歩里客談下同龜山楊先生見子作許少伊哀詞云文字間甚能形容少伊但全篇大體似平交前輩於前後輩之際甚嚴又云有美一人兮豐下而多髯此語固可見其儀形然黄魯直詩須得儋州秃鬢翁此逮乎不敬不可學也郭逵為西帥王韶初以措置西事至邉逵知其必生邉患用備邉財賦事連問牘移牒取商韶讀之怒形顔色擲牒于地者久之乃徐取納懐中入而復出對使者碎之逵奏其事上以問韶韶以元牒繳進無一損壊上不悟韶計不直逵言自後逵論韶並不報而韶遂得志矣予舊見前輩語及此事無不切齒而新進小生徃徃以此談不容口近有一士人自言久遊太學論及韶行事亦以此為智数過人而不以罔上陷老成罪韶徃徃茍合干進者持此自售亦不足恠不謂經此大變猶守舊聞如此等輩直是不識濁净其可責哉韓魏公重修五代祖塋域記夫謹家譜而心不忘于先塋者孝之大也惟墳墓祭祀之有託故以子孫不絶為重琦自志于學毎見祖先所為文字與家世銘志則知寳而藏之有遺逸者常精思搜掇未始少懈時編嵗緝寖以大偹其所志先域之所在雖距今百餘年必思博訪而得之卒能不墜先業推及先塋之八世得以嵗時奉祀少慰庸嗣之志向若家牒之不謹祖先文字不𫝊雖有孝於祖先之心欲究其宅兆而嚴事之其可得乎鄧州花蠟燭名著天下雖京兆不能造相𫝊云是冦萊公燭法萊公知鄧州而自少年冨貴不㸃油燈尤好夜宴劇飲寝室亦燃燭達旦毎罷官去後人至官舍見厮溷間燭淚在地徃徃成堆杜祁公衍為人清儉在官未嘗然官燭油燈一炷熒然欲滅與客相對清談而已二公皆為名臣而奢儉不同如此然祁公夀考終吉萊公晚有南遷之禍遂殁不反雖其不幸亦可以為戒也歐陽公歸田録杜祁公食于家惟一麫一飯而已或美其儉公曰衍本一措大耳名位爵禄冠冕服用皆國家俸入之餘以給親族之貧者常恐浮食焉敢以自奉也一旦名位爵禄國家奪之却為一措大又将何以自奉養耶文正范公子純仁娶婦将歸𫝊聞以羅為帷幔者公聞之不恱曰羅綺豈帷幔之物邪吾家素清儉安得亂吾家法持至吾家當火於庭問人能充無受爾汝之實無所徃而不為義爾汝者是相爾汝之小恩愛否曰須是壁立萬仞一介不以取諸人方能如此孟子自有此氣象故説出此等話如我以吾仁我以吾義我所不為皆古之制一聞可使寡人得見之語便更不見大凡事不可放過才放過便受爾汝胡文定問楊訓相知訓言楊宋臣愷悌君子既而宋臣受總司差權湘潭令大熱中之官遇疾而終訓請先生言於總司保任為殁於王事先生曰宋臣固可傷然凡事不必如此計較君子愛人以徳使宋臣也决不喜為此等賢能教養其孤足矣齊文宣帝怒臨漳令嵇曄舍人李文師以賜臣下為奴中書侍郎鄭頥私誘祠部尚書王昕曰自古無朝士為奴者昕曰箕子為之奴頥以白帝曰王元景比陛下於紂帝銜之帝與朝臣酣飲昕稱疾不至帝遣騎執之昕方揺膝吟詠遂斬於殿前蘇丞相子容知亳州有豪民婦被罪當杖以病未科毎旬檢校未愈鄧元孚為譙縣簿謂其子曰尊公髙明平昔以政事稱今豈可為一豪婦人所紿賢為公子不可不白但喻醫者如法檢校彼自不誣矣其子白之公曰萬事付公議何容心焉若言語輕重則人有觀望或有可悔既而此婦死元孚大慙服曰吾輩狭小豈可測公之用心也蘇氏談訓畢義雲作書與髙元海入宫不覺遺之給事中李貞得而奏之帝由是踈元海和士開復譛元海帝以馬鞭箠元海六十出為兖州刺史峭直深刻之人明習法令所以檢䕶其身可使無過此其所長然卒用其所長以把持窺刺為心一二聽之𥚹廹不容或善其刻而用其深則必置人主於有過之地士有負俗之累而其心坦明出於愷悌不肯欺負人主以賊其民與彼深刻之人相去萬萬豈可以有瑕之玉而置於碔砆之下乎取人於上者将何擇哉仁宗朝李都尉喜延士夫盡聲色之樂一時館閣清流無不徃者韓魏公於其間最年少獨未嘗造焉李數召數以公事辭人有强之者公曰固欲往但未有名耳公處之不失和李莫能致怨同時諸公亦不以為介也别録下同韓魏公在政府時極有難處置事嘗言天下事無有盡如意湏常隐忍不然不可一日處矣公言徃時同列二三公不相下語常至相擊待其氣定毎為平之以理歸于是而己雖好勝者亦自然不争韓公知歐陽永叔不以繫辭為孔子書又多不以文中子為可取中書相㑹累年未嘗與之言及也韓公在北門一屬官有小才公多委以事人謂公真許之他日或問之公曰某人但任術所為大不敦篤大中其弊韓公為陜西招討時尹師魯與夏英公不相與師魯於公處即論英公事英公於公處亦論師魯公皆納之不形於言遂無事不然不静矣韓公云臨事若慮得是劄定脚更不移成敗則任如此方可成務韓公言王文正弟傲不可訓一日逼冬至祀家廟列百壺於堂前弟皆擊破之家人皇駭文正忽自外入見酒流滿路不可行俱無一言但攝衣歩入堂其後弟忽感悟而復為善終亦不言今之儒者移學文藝干仕進之心以收其放心而善其身則又何古人之不可及也父兄以文藝令其子弟朋友以仕進相招往而不返則心始荒而不治萬事之成咸不逮古先矣胡仁仲知言今喜以直為言是非可否不得所安自墮於小人之偷而愧夫君子之篤敬朱全忠嘗與僚佐及游客坐於大柳之下全忠獨言曰此木宜為車轂衆莫有應有游客数人起應曰宜為車轂全忠勃然厲聲曰書生輩好順口玩人皆此類也車轂須用夾榆柳木豈可為之顧左右曰更何待左右數十人捽言宜為車轂者悉撲殺之桓譚謂秦延君説堯典篇目兩字之説至千餘言但説若稽古三萬言班固歎後世經𫝊既已乖離博學者又不思多聞闕疑之義而務碎義相難便辭巧説破壊形體説五字之文至於二三萬言是今滋蔓傷本之弊古人已深斥之矣又可隨而踵之蹈覆車之轍邪彼方自詫曰前之文士才慳不能宏闡有愧今日之富亦難與言矣卜子夏首作䘮服𫝊記者曰𫝊者𫝊也𫝊其師説云爾唐陸淳於春秋毎一義必稱淳聞于師曰詩則有魯故有韓故有齊后氏故齊孫氏故毛詩故訓𫝊書有大小夏侯解故前人惟故之尚如此敬宗時裴度自興元入覲朝士持兩端者日擁度門一日度留飲酒劉栖楚矯求度之歡曲躬附裴耳而語崔咸疾其諂舉觴罰度曰丞相不當許所由官囁嚅耳語度笑而飲之栖楚不自安趨出坐客皆快之吕正獻書古人詩好衣不近節士體梁肉似怕腹中書兩句書于子舍之屏風家塾記滎陽公居東萊揚州曹官廨舍所居無几案以竹繫架上置書冊器皿之屬悉不能具處之甚安其簡儉如此吕氏録劉器之待制云安世初登科與二同年謁張觀参政三人同起身請教張曰觀自守官以來常持四字曰勤謹和緩中間一後生應聲曰勤謹和既聞命緩之一字如何張曰甚事不因忙後錯了嚴彭祖遷太子太傅亷直不事權貴或説曰天時不勝人事君不以修小禮曲意事貴人左右之助經誼雖髙不至宰相願少自勉强彭祖曰凡通經術固當修行先王之道何可委曲從俗茍求冨貴乎竟以太傅終漢書梁世士大夫皆尚褒衣博帶大冠髙履出則車輿入則扶持郊郭之内無乘馬者周宏正為宣城王所愛給一果下馬常服御之舉朝以為放達乃至尚書郎乘馬則糾之及侯景之亂膚脆骨柔不堪行歩體羸氣弱不耐寒暑坐死倉卒者徃徃而然惠穆公赴人飲食之約未嘗後到曰使主人望望然而客不至吾不忍也家塾記大抵後生為學湏是嚴立課程不可一日放慢毎日須讀一般經書一般子書不湏多只要令精熟湏静室危坐讀取二三百遍字字句句湏要分明又毎日湏連前三五授通讀五七遍湏令成誦不可一字放過也史書湏毎日讀取一卷或半卷以上始見功湏是從人授讀疑難處便質問湏是孜孜就人不可自家先自放慢也然此是學之業又湏理㑹所以為學者何事一行一住一語一黙湏要盡合道理求古聖賢用心竭力從之亦無不至矣夫指引者師之功也行有不至從旁規戒者朋友之任也決意而徃則湏用己力難仰他人矣舍人書見與董生論周易九六義取老而變以為畢中和承一行僧得此説異孔頴達䟽而以為新竒彼畢子董子何膚末於學而遽云云也都不知一行僧承韓氏孔氏而果以為新竒不亦可笑矣哉何畢子董子之不視其書而妄以口承之也栁文張率作賦頌二千餘首有虞訥者見而詆之率乃一旦焚毁更為詩示焉託云沈約訥便句句嗟稱無字不善率曰此吾作也訥慚而退甄琛舉秀才入都積嵗頗以奕棊廢日至乃通夜不止手下蒼頭常令執燭或時睡頓大加其杖如此非一奴不勝楚痛乃曰郎君辭父母仕宦若為讀書執燭不敢辭罪乃以圍棊日夜不息豈是向善之意而賜杖罰不亦非理琛悵然慚感遂從許赤彪假書研習李公擇尚書公家人嘗置聲伎孫中丞莘老不以為然滎公曰此莫是小節不孫中丞曰此一節不小
